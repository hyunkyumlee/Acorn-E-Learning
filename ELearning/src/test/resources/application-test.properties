spring.datasource.url=jdbc:h2:mem:knowva;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

knowva.remember-me.secret=test-only-remember-me-secret
knowva.upload.base-path=${java.io.tmpdir}/knowva-test-uploads

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
knowva.mail.from=test@knowva.local
knowva.mail.from-name=Knowva Test
knowva.app.base-url=http://localhost:8080

knowva.ai.provider=openai
knowva.ai.enabled=false
knowva.ai.api-key=
knowva.ai.base-url=https://api.openai.com/v1
knowva.ai.model=test-model
knowva.ai.max-completion-tokens=1
