<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 시험 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/exam.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell exam-screen">
    <section class="page-heading">
      <span class="eyebrow">SR-008 · AI Coding Test</span>
      <h1>AI 코딩테스트</h1>
      <p>응시 조건을 확인하고 3문항을 순차적으로 풉니다.</p>
    </section>

    <section class="exam-gate">
      <article class="exam-gate-card" th:if="${eligibility != null}">
        <span class="exam-state-badge">응시 가능</span>
        <h2 th:text="${eligibility.message()}">AI 코딩테스트를 시작할 수 있습니다.</h2>
        <p>문제 생성 후 1번 문제부터 순서대로 이동합니다. 제출 후에는 테스트케이스 실행 결과로 채점됩니다.</p>
        <div class="exam-gate-actions">
          <form th:action="@{/exams}" th:object="${form}" method="post" class="exam-create-form">
            <label>
              <span>과목 ID</span>
              <input type="number" th:field="*{subjectId}" min="1" required>
            </label>
            <label>
              <span>레벨</span>
              <select th:field="*{levelCode}" required>
                <option value="">선택</option>
                <option value="BEGINNER">BEGINNER</option>
                <option value="INTERMEDIATE">INTERMEDIATE</option>
                <option value="ADVANCED">ADVANCED</option>
              </select>
            </label>
            <button type="submit" class="button primary">시험 시작</button>
          </form>
          <a class="button"
             th:if="${eligibility.latestExamId() != null}"
             th:href="${eligibility.latestStatus() == 'GRADED'} ? @{/exams/{examId}/result(examId=${eligibility.latestExamId()})} : @{/exams/{examId}/problems/1(examId=${eligibility.latestExamId()})}">
            최근 시험 이어가기
          </a>
        </div>
      </article>
      <aside class="exam-gate-card is-locked">
        <span class="exam-state-badge is-warning">응시 조건 미달 예시</span>
        <h2>필수 이론 학습 완료 후 응시</h2>
        <p>학습 진행률 조건을 충족하지 못하면 코딩테스트 대신 학습 화면으로 이동합니다.</p>
        <a class="button" th:href="@{/learning}">학습 이어가기</a>
      </aside>
    </section>
  </main>
</body>
</html>
