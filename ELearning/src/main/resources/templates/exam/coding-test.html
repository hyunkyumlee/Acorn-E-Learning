<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 시험 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/exam.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
  <script defer th:src="@{/js/exam/exam-loading.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell exam-screen">
    <section class="page-heading">
      <span class="eyebrow">SR-008 · AI Coding Test</span>
      <h1>AI 코딩테스트</h1>
      <p>응시 조건을 확인하고 3문항을 순차적으로 풉니다.</p>
    </section>

    <div class="exam-alert is-danger" th:if="${errorMessage != null}" th:text="${errorMessage}">
      시험을 시작할 수 없습니다.
    </div>

    <section class="exam-gate">
      <article class="exam-gate-card" th:if="${eligibility != null && eligibility.eligible()}">
        <span class="exam-state-badge">응시 가능</span>
        <h2 th:text="${eligibility.message()}">AI 코딩테스트를 시작할 수 있습니다.</h2>
        <p>문제 생성 후 1번 문제부터 순서대로 이동합니다. 제출 후에는 테스트케이스 실행 결과로 채점됩니다.</p>
        <div class="exam-gate-actions">
          <form th:action="@{/exams}"
                th:object="${form}"
                method="post"
                class="exam-create-form"
                data-loading-form
                data-loading-title="문제 생성 중입니다"
                data-loading-message="학습 범위를 확인하고 AI 코딩테스트 문제와 테스트케이스를 생성하고 있습니다.">
            <input type="hidden" th:field="*{idempotencyToken}">
            <label>
              <span>과목 ID</span>
              <input type="number" th:field="*{subjectId}" min="1" required>
            </label>
            <label>
              <span>레벨</span>
              <select th:field="*{levelCode}" required>
                <option value="">선택</option>
                <option value="BRONZE">BRONZE</option>
                <option value="SILVER">SILVER</option>
                <option value="GOLD">GOLD</option>
              </select>
            </label>
            <button type="submit" class="button primary">시험 시작</button>
          </form>
          <a class="button"
             th:if="${eligibility.latestExamId() != null}"
             th:href="${eligibility.latestStatus() == 'GRADED'} ? @{/exams/{examId}/result(examId=${eligibility.latestExamId()})} : @{/exams/{examId}/problems/1(examId=${eligibility.latestExamId()})}">
            최근 시험 이어가기
          </a>
        </div>
      </article>
      <aside class="exam-gate-card is-locked" th:if="${eligibility == null || !eligibility.eligible()}">
        <span class="exam-state-badge is-warning">응시 조건 미달</span>
        <h2 th:text="${eligibility == null ? '로그인이 필요합니다.' : eligibility.message()}">필수 이론 학습 완료 후 응시</h2>
        <p>완료한 이론 학습 또는 통과한 문제풀이 범위가 있어야 AI 코딩테스트 문제를 생성할 수 있습니다.</p>
        <a class="button" th:href="@{/learning}">학습 이어가기</a>
      </aside>
    </section>

    <section class="exam-loading-modal"
             data-exam-loading-modal
             hidden
             aria-hidden="true"
             aria-labelledby="exam-loading-title">
      <div class="exam-loading-card" role="dialog" aria-modal="true">
        <div class="exam-loading-spinner" aria-hidden="true"></div>
        <span class="exam-state-badge">처리 중</span>
        <h2 id="exam-loading-title" data-exam-loading-title>처리 중입니다</h2>
        <p data-exam-loading-message>잠시만 기다려 주세요.</p>
        <div class="exam-loading-progress" aria-hidden="true"><span></span></div>
      </div>
    </section>
  </main>
</body>
</html>
