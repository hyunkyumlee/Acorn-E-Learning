<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>카카오페이 결제 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/payment.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <main class="payment-screen">
    <section class="figma-payment-page">
      <div class="figma-payment-step is-half" aria-label="결제 진행 1단계, 총 2단계"><strong>1 / 2</strong><span aria-hidden="true"></span></div>
      <header class="figma-payment-head">
        <h1>결제 진행</h1>
        <p>카카오페이 결제창에서 Premium 결제를 진행합니다.</p>
      </header>
      <section class="figma-payment-layout">
        <form class="figma-payment-form kakao-payment-form" method="post" th:action="@{/payments/kakao-pay/ready}" action="/payments/kakao-pay/ready">
          <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="hidden" name="productCode" th:value="${productCode ?: 'PREMIUM_LIFETIME'}" value="PREMIUM_LIFETIME">
          <input type="hidden" name="paymentMethod" value="KAKAO_PAY">
          <input type="hidden" name="memo" value="카카오페이 단건 결제">
          <input type="hidden" name="idempotencyToken" th:value="${idempotencyToken}" value="">
          <div class="figma-method-row">
            <a class="figma-button" th:href="@{/payments/card}" href="/payments/card">일반 카드 결제</a>
            <a class="figma-button kakao-pay-button active" th:href="@{/payments/kakao-pay}" href="/payments/kakao-pay">카카오페이</a>
          </div>
          <section class="figma-kakao-guide" aria-label="카카오페이 결제 안내">
            <span class="kakao-pay-badge">pay</span>
            <h2>카카오페이로 결제</h2>
            <p>버튼을 누르면 카카오페이 결제창으로 이동합니다. 결제 인증이 끝나면 Knowva로 돌아와 Premium 권한이 활성화됩니다.</p>
          </section>
          <p class="figma-payment-alert" th:if="${premiumActive}" role="alert">이미 Premium 권한이 활성화되어 있습니다.</p>
          <p class="figma-payment-alert" th:if="${paymentError}" th:text="${paymentError}" role="alert">카카오페이 결제를 진행할 수 없습니다.</p>
          <button class="figma-button kakao-pay-button kakao-pay-submit" type="submit" th:disabled="${premiumActive}">카카오페이로 결제</button>
        </form>
        <aside class="figma-order-panel">
          <h2>상품 정보</h2>
          <dl>
            <div><dt>주문 번호</dt><dd>결제 시 자동 생성</dd></div>
            <div><dt>결제 방식</dt><dd>카카오페이</dd></div>
            <div><dt>상품명</dt><dd th:text="${productName ?: 'Premium Lifetime'}">Premium Lifetime</dd></div>
            <div><dt>결제 금액</dt><dd th:text="${productPriceLabel ?: '9,900원'}">9,900원</dd></div>
          </dl>
        </aside>
      </section>
    </section>
  </main>
</body>
</html>
