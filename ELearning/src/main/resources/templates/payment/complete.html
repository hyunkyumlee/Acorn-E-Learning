<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>결제 완료 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/payment.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <main class="payment-screen">
    <section class="figma-payment-page">
      <div class="figma-payment-step"><strong>2 / 2</strong><span></span></div>
      <section class="figma-payment-complete">
        <h1>결제가 완료 되었습니다!</h1>
        <p th:text="${detail != null && detail.productName() != null ? detail.productName() + '이 활성화되었습니다. 결제가 정상 처리되어 바로 Premium 기능을 사용할 수 있습니다.' : '상세 분석 이용권이 활성화되었습니다. 결제가 정상 처리되어 바로 Premium 기능을 사용할 수 있습니다.'}">상세 분석 이용권이 활성화되었습니다. 결제가 정상 처리되어 바로 Premium 기능을 사용할 수 있습니다.</p>
        <div class="figma-complete-mark">OK</div>
        <div class="figma-payment-history">
          <span th:text="${detail != null ? detail.orderNo() : (result != null ? result.orderNo() : '완료 상태')}">완료 상태</span>
          <strong th:text="${detail != null && detail.premiumActive() ? 'Premium 상세 분석 접근 가능' : (result != null && result.premiumActive() ? 'Premium 상세 분석 접근 가능' : '결제 내역을 확인하세요')}">Premium 상세 분석 접근 가능</strong>
          <b th:text="${detail != null ? detail.paymentStatus() : (result != null ? result.paymentStatus() : 'dummy')}">dummy</b>
        </div>
        <div class="button-row">
          <a class="figma-button primary" th:href="@{/analysis}" href="/analysis">AI 분석 보기</a>
          <a class="figma-button" th:href="@{/mypage}" href="/mypage">마이페이지</a>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
