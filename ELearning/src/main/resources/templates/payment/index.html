<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>결제 진행 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/payment.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <main class="payment-screen">
    <section class="figma-payment-page">
      <div class="figma-payment-step"><strong>1 / 2</strong><span></span></div>
      <header class="figma-payment-head">
        <h1>결제 진행</h1>
        <p>Premium 상세 분석 이용권 결제 수단을 선택합니다.</p>
      </header>
      <section class="figma-payment-choice">
        <article class="figma-method-card">
          <span>VISA</span>
          <h2>신용카드 결제</h2>
          <p>카드 정보를 입력하고 결제를 완료합니다.</p>
          <a class="figma-button primary" th:href="@{/payments/card}" href="/payments/card">신용카드</a>
        </article>
        <article class="figma-method-card">
          <span>BANK</span>
          <h2>무통장 입금</h2>
          <p>입금자명과 계좌 정보를 확인합니다.</p>
          <a class="figma-button" th:href="@{/payments/bank}" href="/payments/bank">무통장 입금</a>
        </article>
        <aside class="figma-order-panel">
          <h2>상품 정보</h2>
          <dl>
            <div><dt>주문 번호</dt><dd>결제 시 자동 생성</dd></div>
            <div><dt>결제 구분</dt><dd>Dummy Premium</dd></div>
            <div><dt>상품명</dt><dd th:text="${productName ?: 'Premium Lifetime'}">Premium Lifetime</dd></div>
            <div><dt>결제 금액</dt><dd th:text="${productPriceLabel ?: '9,900원'}">9,900원</dd></div>
          </dl>
        </aside>
      </section>
    </section>
  </main>
</body>
</html>
