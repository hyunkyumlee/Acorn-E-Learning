<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="adminSidebar" class="admin-sidebar" aria-label="관리자 메뉴">
  <div class="admin-sidebar-brand">
    <img class="admin-sidebar-logo" th:src="@{/assets/images/icons/header_logo_light.svg}" alt="KNOWVA">
    <span>관리자</span>
  </div>

  <nav class="admin-sidebar-nav">
    <a class="admin-sidebar-link"
       th:href="@{/admin}"
       th:classappend="${screen == 'admin/dashboard'} ? ' is-active'">
      관리자 홈
    </a>

    <a class="admin-sidebar-link"
       th:href="@{/admin/stats}"
       th:classappend="${screen == 'admin/stats'} ? ' is-active'">
      통계
    </a>

    <div class="admin-sidebar-group">
      <div class="admin-sidebar-group-title">학습 콘텐츠 관리</div>
      <a class="admin-sidebar-link"
         th:href="@{/admin/courses}"
         th:classappend="${screen == 'admin/courses'} ? ' is-active'">
        과목/커리큘럼 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/theory}"
         th:classappend="${screen == 'admin/theory'} ? ' is-active'">
        이론 자료 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/problems}"
         th:classappend="${screen == 'admin/problems'} ? ' is-active'">
        일반 문제 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/recommendations}"
         th:classappend="${screen == 'admin/recommendations'} ? ' is-active'">
        추천 콘텐츠 관리
      </a>
    </div>

    <div class="admin-sidebar-group">
      <div class="admin-sidebar-group-title">운영 관리</div>
      <a class="admin-sidebar-link"
         th:href="@{/admin/users}"
         th:classappend="${screen == 'admin/users'} ? ' is-active'">
        사용자 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/community}"
         th:classappend="${screen == 'admin/community'} ? ' is-active'">
        커뮤니티 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/reports}"
         th:classappend="${screen == 'admin/reports'} ? ' is-active'">
        신고 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/notices}"
         th:classappend="${screen == 'admin/notices'} ? ' is-active'">
        공지사항 관리
      </a>
      <a class="admin-sidebar-link"
         th:href="@{/admin/operation-logs}"
         th:classappend="${screen == 'admin/operation-logs'} ? ' is-active'">
        관리자 운영 로그
      </a>
    </div>
  </nav>

  <form class="admin-sidebar-logout-form" method="post" th:action="@{/logout}">
    <button type="submit" class="admin-sidebar-logout">
      로그아웃
    </button>
  </form>
  <script th:if="${message != null}" th:inline="javascript">
    window.addEventListener("DOMContentLoaded", () => {
      const message = /*[[${message}]]*/ "";
      alert(message);
    });
  </script>
  <script th:if="${errorMessage != null}" th:inline="javascript">
    window.addEventListener("DOMContentLoaded", () => {
      const errorMessage = /*[[${errorMessage}]]*/ "";
      alert(errorMessage);
    });
  </script>
</aside>
</body>
</html>
