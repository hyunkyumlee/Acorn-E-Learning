<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" data-theme="knowva-ion-light" style="color-scheme: light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>일반 학습 문제 관리 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/admin.css}">
  <link rel="stylesheet" th:href="@{/css/screens/problems.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<main class="page-shell admin-screen problem-manage-screen">
  <section class="problem-manage-header">
    <h1>일반 학습 문제 관리</h1>
  </section>

  <p class="problem-note">* 일반 문제는 AI 채점 미사용 - 등록된 정답/해설 기준으로 채점</p>

  <section class="problem-toolbar">
    <form method="get" action="/admin/problems" class="problem-filter" id="problemFilterForm">
      <input type="hidden" name="page" value="1">
      <input type="hidden" name="size" th:value="${problemPage.pageSize}">

      <input type="search"
             name="keyword"
             id="searchProblem"
             placeholder="문제 내용 검색"
             th:value="${selectedKeyword}">

      <select name="subjectId" id="problemSubjectFilter">
        <option value="">과목</option>
        <option th:each="subject : ${subjectList}"
                th:value="${subject.subjectId}"
                th:text="${subject.subjectName}"
                th:selected="${selectedSubjectId != null and selectedSubjectId == subject.subjectId}">
          Java
        </option>
      </select>

      <select name="nodeId" id="problemCurriculumFilter">
        <option value="">커리큘럼</option>
        <option th:each="node : ${curriculumList}"
                th:value="${node.nodeId}"
                th:text="${node.title}"
                th:data-subject-id="${node.subjectId}"
                th:selected="${selectedNodeId != null and selectedNodeId == node.nodeId}">
          Java 기초
        </option>
      </select>

      <select name="problemType" id="problemTypeFilter">
        <option value="">문제 유형</option>
        <option value="MULTIPLE_CHOICE" th:selected="${selectedProblemType == 'MULTIPLE_CHOICE'}">객관식</option>
        <option value="FILL_BLANK" th:selected="${selectedProblemType == 'FILL_BLANK'}">빈칸</option>
        <option value="CODE_OUTPUT" th:selected="${selectedProblemType == 'CODE_OUTPUT'}">코드 결과 예측</option>
        <option value="CODE_SHORT" th:selected="${selectedProblemType == 'CODE_SHORT'}">간단 코드 입력</option>
      </select>

      <select name="difficultyCode" id="problemDifficultyFilter">
        <option value="">난이도</option>
        <option value="BRONZE" th:selected="${selectedDifficultyCode == 'BRONZE'}">BRONZE</option>
        <option value="SILVER" th:selected="${selectedDifficultyCode == 'SILVER'}">SILVER</option>
        <option value="GOLD" th:selected="${selectedDifficultyCode == 'GOLD'}">GOLD</option>
      </select>

      <select name="isActive" id="problemActiveFilter">
        <option value="">활성화 상태</option>
        <option value="true" th:selected="${selectedIsActive != null and selectedIsActive == true}">활성</option>
        <option value="false" th:selected="${selectedIsActive != null and selectedIsActive == false}">비활성</option>
      </select>

      <button type="submit" class="problem-filter-button">검색</button>
    </form>
    <button type="button" id="problemCreateButton" class="problem-primary-button">+ 문제 등록</button>
  </section>

  <section class="problem-section">
    <div class="problem-section-title">
      <h2>문제 목록</h2>
    </div>

    <div class="problem-table-wrap">
      <table class="problem-table">
        <thead>
        <tr>
          <th>번호</th>
          <th>과목</th>
          <th>커리큘럼</th>
          <th>유형</th>
          <th>문제 내용 요약</th>
          <th>난이도</th>
          <th>활성화</th>
          <th>관리</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="problem, stat : ${problemPage.items}" class="problem-row"
            th:data-subject-id="${problem.subjectId}"
            th:data-node-id="${problem.nodeId}"
            th:data-lesson-id="${problem.lessonId}"
            th:data-problem-type="${problem.problemType}"
            th:data-question="${problem.question}"
            th:data-difficulty-code="${problem.difficultyCode}"
            th:data-is-active="${problem.isActive}">
          <td th:text="${((problemPage.currentPage - 1) * problemPage.pageSize) + stat.count}">1</td>
          <td th:text="${problem.subjectName}">Java</td>
          <td th:text="${problem.curriculumTitle}">변수와 자료형</td>
          <td th:switch="${problem.problemType}">
            <span th:case="'MULTIPLE_CHOICE'">객관식</span>
            <span th:case="'FILL_BLANK'">빈칸</span>
            <span th:case="'CODE_OUTPUT'">코드 결과 예측</span>
            <span th:case="'CODE_SHORT'">간단 코드 입력</span>
            <span th:case="'SHORT_CODE'">간단 코드 입력</span>
            <span th:case="*" th:text="${problem.problemType}">객관식</span>
          </td>
          <td class="problem-question" th:text="${problem.question}">Java에서 정수형 변수를 선언하는 키워드는?</td>
          <td th:text="${problem.difficultyCode}">BRONZE</td>
          <td th:text="${problem.isActive} ? '활성' : '비활성'">활성</td>
          <td>
            <div class="problem-table-actions">
              <button type="button"
                      class="problem-table-button problem-edit-button"
                      th:data-problem-id="${problem.problemId}"
                      th:data-subject-id="${problem.subjectId}"
                      th:data-node-id="${problem.nodeId}"
                      th:data-lesson-id="${problem.lessonId}"
                      th:data-problem-type="${problem.problemType}"
                      th:data-question="${problem.question}"
                      th:data-answer-text="${problem.answerText}"
                      th:data-explanation="${problem.explanation}"
                      th:data-difficulty-code="${problem.difficultyCode}"
                      th:data-is-active="${problem.isActive}">
                <span class="problem-edit-choice"
                      th:each="choice : ${problem.choices}"
                      th:data-choice-text="${choice.choiceText}"
                      th:data-correct="${choice.isCorrect}"></span>
                수정
              </button>
              <form method="post"
                    th:action="@{/admin/problems/{problemId}/delete(problemId=${problem.problemId})}"
                    onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="problem-table-button">삭제</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(problemPage.items)}">
          <td colspan="8" class="problem-empty">등록된 문제가 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <nav class="admin-pagination" th:if="${problemPage.totalPages >= 1}" aria-label="일반 문제 관리 페이지">
      <a class="admin-page-link"
         th:if="${problemPage.hasPrevious}"
         th:href="@{/admin/problems(
                    page=${problemPage.currentPage - 1},
                    size=${problemPage.pageSize},
                    keyword=${selectedKeyword},
                    subjectId=${selectedSubjectId},
                    nodeId=${selectedNodeId},
                    problemType=${selectedProblemType},
                    difficultyCode=${selectedDifficultyCode},
                    isActive=${selectedIsActive}
                  )}">
        &lt;
      </a>

      <span th:each="pageNumber : ${#numbers.sequence(problemPage.startPage, problemPage.endPage)}">
        <a class="admin-page-link"
           th:if="${pageNumber != problemPage.currentPage}"
           th:href="@{/admin/problems(
                      page=${pageNumber},
                      size=${problemPage.pageSize},
                      keyword=${selectedKeyword},
                      subjectId=${selectedSubjectId},
                      nodeId=${selectedNodeId},
                      problemType=${selectedProblemType},
                      difficultyCode=${selectedDifficultyCode},
                      isActive=${selectedIsActive}
                    )}"
           th:text="${pageNumber}">
          1
        </a>

        <strong class="admin-page-link admin-page-current"
                th:if="${pageNumber == problemPage.currentPage}"
                th:text="${pageNumber}">
          1
        </strong>
      </span>

      <a class="admin-page-link"
         th:if="${problemPage.hasNext}"
         th:href="@{/admin/problems(
                    page=${problemPage.currentPage + 1},
                    size=${problemPage.pageSize},
                    keyword=${selectedKeyword},
                    subjectId=${selectedSubjectId},
                    nodeId=${selectedNodeId},
                    problemType=${selectedProblemType},
                    difficultyCode=${selectedDifficultyCode},
                    isActive=${selectedIsActive}
                  )}">
        &gt;
      </a>
    </nav>
  </section>

  <section class="problem-form-panel">
    <h2>문제 등록 / 수정 폼</h2>

    <form method="post" action="/admin/problems" id="problemManageForm" th:object="${problemForm}"
          onsubmit="return confirm('문제를 저장하시겠습니까?');">
      <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="problem-form-layout">
        <div class="problem-form-fields">
          <input type="hidden" name="problemId" id="problemId">
          <select name="problemType" id="problemType">
            <option value="">문제 유형 선택 (객관식 / 빈칸 / 코드 결과 예측 / 간단 코드 입력)</option>
            <option value="MULTIPLE_CHOICE">객관식</option>
            <option value="FILL_BLANK">빈칸</option>
            <option value="CODE_OUTPUT">코드 결과 예측</option>
            <option value="CODE_SHORT">간단 코드 입력</option>
          </select>

          <textarea name="question" id="problemQuestion" class="problem-question-input" placeholder="문제 내용 입력"></textarea>

          <div id="multipleChoiceField" class="problem-multiple-choice" hidden>
            <div class="problem-choice-header">
              <strong>답안 목록</strong>
              <button type="button" id="addProblemChoiceButton" class="problem-choice-add-button">+ 답안 추가</button>
            </div>
            <div id="problemChoiceList" class="problem-choice-list"></div>
          </div>

          <div class="problem-form-row">
            <input type="text" name="answerText" id="problemAnswerText" placeholder="정답 입력">
            <select name="difficultyCode" id="problemDifficultyCode">
              <option value="">난이도 선택</option>
              <option value="BRONZE">BRONZE</option>
              <option value="SILVER">SILVER</option>
              <option value="GOLD">GOLD</option>
            </select>
          </div>

          <div class="problem-form-row">
            <select name="subjectId" id="problemSubjectId">
              <option value="">과목 선택</option>
              <option th:each="subject : ${subjectList}" th:value="${subject.subjectId}" th:text="${subject.subjectName}">Java</option>
            </select>
            <select name="nodeId" id="problemNodeId">
              <option value="">커리큘럼 선택</option>
              <option th:each="node : ${curriculumList}"
                      th:value="${node.nodeId}"
                      th:text="${node.title}"
                      th:data-subject-id="${node.subjectId}">Java 기초</option>
            </select>
            <select name="lessonId" id="problemLessonId">
              <option value="">레슨 선택</option>
              <option th:each="lesson : ${lessonList}"
                      th:value="${lesson.lessonId}"
                      th:text="${lesson.lessonTitle}"
                      th:data-node-id="${lesson.nodeId}">
                레슨
              </option>
            </select>
          </div>

          <div class="problem-form-row">
            <select name="isActive" id="problemIsActive">
              <option value="">활성화 상태</option>
              <option value="true">활성</option>
              <option value="false">비활성</option>
            </select>
          </div>

          <div class="problem-form-actions">
            <button type="submit" class="problem-primary-button">저장</button>
            <button type="button" id="problemCancelButton" class="problem-secondary-button">취소</button>
          </div>
        </div>

        <textarea name="explanation" id="problemExplanation" class="problem-explanation-area" placeholder="해설 입력 영역"></textarea>
      </div>
    </form>
  </section>
</main>

<script>
  const problemTypeCodeMap = {
    "객관식": "MULTIPLE_CHOICE",
    "빈칸": "FILL_BLANK",
    "코드 결과 예측": "CODE_OUTPUT",
    "간단 코드 입력": "CODE_SHORT",
    "SHORT_CODE": "CODE_SHORT",
    "CODE_SHORT": "CODE_SHORT"
  };

  const problemFilterForm = document.querySelector("#problemFilterForm");
  const problemManageForm = document.querySelector("#problemManageForm");
  const problemTypeSelect = document.querySelector("#problemType");
  const multipleChoiceField = document.querySelector("#multipleChoiceField");
  const problemChoiceList = document.querySelector("#problemChoiceList");
  const problemAnswerText = document.querySelector("#problemAnswerText");

  function updateMultipleChoiceAnswer() {
    const rows = Array.from(problemChoiceList.querySelectorAll(".problem-choice-row"));
    rows.forEach((row, index) => {
      const number = index + 1;
      row.querySelector(".problem-choice-number").textContent = `${number}번`;
      row.querySelector("input[type='radio']").value = String(number);
    });

    const checked = problemChoiceList.querySelector("input[type='radio']:checked");
    const checkedRow = checked?.closest(".problem-choice-row");
    const choiceText = checkedRow?.querySelector("input[type='text']").value.trim() || "";
    problemAnswerText.value = checked ? `${checked.value}. ${choiceText}` : "";
  }

  function addProblemChoice(choiceText = "", isCorrect = false) {
    const row = document.createElement("div");
    row.className = "problem-choice-row";

    const radio = document.createElement("input");
    radio.type = "radio";
    radio.name = "correctChoiceNumber";
    radio.setAttribute("aria-label", "정답 선택");
    radio.checked = isCorrect;

    const number = document.createElement("span");
    number.className = "problem-choice-number";

    const input = document.createElement("input");
    input.type = "text";
    input.name = "choiceTexts";
    input.value = choiceText;
    input.placeholder = "답안 내용 입력";
    input.required = true;

    const removeButton = document.createElement("button");
    removeButton.type = "button";
    removeButton.className = "problem-choice-remove-button";
    removeButton.textContent = "삭제";

    radio.addEventListener("change", updateMultipleChoiceAnswer);
    input.addEventListener("input", updateMultipleChoiceAnswer);
    removeButton.addEventListener("click", () => {
      if (problemChoiceList.children.length <= 2) {
        alert("객관식 답안은 두 개 이상 필요합니다.");
        return;
      }
      row.remove();
      updateMultipleChoiceAnswer();
    });

    row.append(radio, number, input, removeButton);
    problemChoiceList.appendChild(row);
    updateMultipleChoiceAnswer();
  }

  function resetMultipleChoiceRows(choices = []) {
    problemChoiceList.replaceChildren();
    if (choices.length > 0) {
      choices.forEach((choice) => addProblemChoice(choice.text, choice.correct));
    } else {
      addProblemChoice();
      addProblemChoice();
    }
    updateMultipleChoiceAnswer();
  }

  function syncProblemTypeForm() {
    const problemType = problemTypeSelect.value;
    const isMultipleChoice = problemType === "MULTIPLE_CHOICE";

    multipleChoiceField.hidden = !isMultipleChoice;
    problemAnswerText.readOnly = isMultipleChoice;
    problemAnswerText.placeholder = isMultipleChoice
            ? "정답을 선택하면 '번호. 정답 내용'으로 표시됩니다."
            : "정답 입력";

    if (isMultipleChoice) {
      if (problemChoiceList.children.length === 0) {
        resetMultipleChoiceRows();
      }
      updateMultipleChoiceAnswer();
    }
  }

  document.querySelector("#addProblemChoiceButton")
          ?.addEventListener("click", () => addProblemChoice());
  problemTypeSelect?.addEventListener("change", () => {
    if (problemTypeSelect.value === "MULTIPLE_CHOICE") {
      resetMultipleChoiceRows();
    } else {
      problemAnswerText.value = "";
    }
    syncProblemTypeForm();
  });

  function syncProblemFilterCurriculumOptions() {
    const selectedSubjectId = document.querySelector("#problemSubjectFilter")?.value || "";
    const curriculumFilter = document.querySelector("#problemCurriculumFilter");

    curriculumFilter?.querySelectorAll("option").forEach((option) => {
      option.hidden = selectedSubjectId !== ""
              && option.value !== ""
              && option.dataset.subjectId !== selectedSubjectId;
    });

    if (curriculumFilter?.selectedOptions[0]?.hidden) {
      curriculumFilter.value = "";
    }
  }

  document.querySelector("#problemSubjectFilter")
          ?.addEventListener("change", syncProblemFilterCurriculumOptions);
  syncProblemFilterCurriculumOptions();

  problemFilterForm?.addEventListener("submit", () => {
    const pageInput = problemFilterForm.querySelector("input[name='page']");
    if (pageInput) {
      pageInput.value = "1";
    }
  });

  document.querySelector("#problemNodeId")?.addEventListener("change", (event) => {
    const selectedOption = event.target.selectedOptions[0];
    document.querySelector("#problemSubjectId").value = selectedOption?.dataset.subjectId || "";
    syncProblemCurriculumOptions();
    syncProblemLessonOptions();
  });

  function syncProblemCurriculumOptions() {
    const selectedSubjectId = document.querySelector("#problemSubjectId").value;
    const problemNodeSelect = document.querySelector("#problemNodeId");

    problemNodeSelect.querySelectorAll("option").forEach((option) => {
      option.hidden = selectedSubjectId !== "" && option.value !== "" && option.dataset.subjectId !== selectedSubjectId;
    });

    const selectedNode = problemNodeSelect.selectedOptions[0];
    if (selectedNode?.hidden) {
      problemNodeSelect.value = "";
    }
  }

  function syncProblemLessonOptions() {
    const selectedNodeId = document.querySelector("#problemNodeId").value;
    const problemLessonSelect = document.querySelector("#problemLessonId");

    problemLessonSelect.querySelectorAll("option").forEach((option) => {
      option.hidden = selectedNodeId !== "" && option.value !== "" && option.dataset.nodeId !== selectedNodeId;
    });

    const selectedLesson = problemLessonSelect.selectedOptions[0];
    if (selectedLesson?.hidden) {
      problemLessonSelect.value = "";
    }
  }

  document.querySelector("#problemSubjectId")?.addEventListener("change", () => {
    syncProblemCurriculumOptions();
    syncProblemLessonOptions();
  });

  function resetProblemManageForm() {
    problemManageForm.action = "/admin/problems";
    problemManageForm.reset();
    document.querySelector("#problemId").value = "";
    document.querySelector("#problemSubjectId").value = "";
    document.querySelector("#problemNodeId").value = "";
    syncProblemCurriculumOptions();
    syncProblemLessonOptions();
    document.querySelector("#problemLessonId").value = "";
    document.querySelector("#problemType").value = "";
    document.querySelector("#problemQuestion").value = "";
    document.querySelector("#problemAnswerText").value = "";
    document.querySelector("#problemExplanation").value = "";
    document.querySelector("#problemDifficultyCode").value = "";
    document.querySelector("#problemIsActive").value = "";
    problemChoiceList.replaceChildren();
    syncProblemTypeForm();
  }

  document.querySelector("#problemCreateButton")?.addEventListener("click", () => {
    resetProblemManageForm();

    document.querySelector("#problemType").scrollIntoView({ behavior: "smooth", block: "center" });
    document.querySelector("#problemType").focus({ preventScroll: true });
  });

  document.querySelector("#problemCancelButton")?.addEventListener("click", resetProblemManageForm);

  document.querySelectorAll(".problem-edit-button").forEach((button) => {
    button.addEventListener("click", () => {
      const problemId = button.dataset.problemId;
      problemManageForm.action = `/admin/problems/${problemId}`;
      document.querySelector("#problemId").value = problemId;
      document.querySelector("#problemSubjectId").value = button.dataset.subjectId;
      document.querySelector("#problemNodeId").value = button.dataset.nodeId;
      syncProblemCurriculumOptions();
      syncProblemLessonOptions();
      document.querySelector("#problemLessonId").value = button.dataset.lessonId || "";
      document.querySelector("#problemType").value = problemTypeCodeMap[button.dataset.problemType] || button.dataset.problemType;
      document.querySelector("#problemQuestion").value = button.dataset.question || "";
      document.querySelector("#problemAnswerText").value = button.dataset.answerText || "";
      document.querySelector("#problemExplanation").value = button.dataset.explanation || "";
      document.querySelector("#problemDifficultyCode").value = button.dataset.difficultyCode;
      document.querySelector("#problemIsActive").value = button.dataset.isActive;

      const choices = Array.from(button.querySelectorAll(".problem-edit-choice")).map((choice) => ({
        text: choice.dataset.choiceText || "",
        correct: choice.dataset.correct === "true"
      }));
      if (problemTypeSelect.value === "MULTIPLE_CHOICE") {
        resetMultipleChoiceRows(choices);
      }
      syncProblemTypeForm();

      document.querySelector("#problemType").scrollIntoView({ behavior: "smooth", block: "center" });
      document.querySelector("#problemType").focus({ preventScroll: true });
    });
  });

  problemManageForm?.addEventListener("submit", (event) => {
    if (problemTypeSelect.value !== "MULTIPLE_CHOICE") {
      return;
    }
    const choices = problemChoiceList.querySelectorAll("input[name='choiceTexts']");
    const correctChoice = problemChoiceList.querySelector("input[name='correctChoiceNumber']:checked");
    if (choices.length < 2 || !correctChoice) {
      event.preventDefault();
      alert("객관식 답안을 두 개 이상 입력하고 정답을 선택해 주세요.");
    }
  });

  syncProblemTypeForm();
</script>
</body>
</html>
