<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>사용자 관리 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/admin.css}">
  <link rel="stylesheet" th:href="@{/css/screens/adminUsers.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<main class="page-shell admin-screen admin-user-screen">
  <section class="admin-user-header">
    <h1>사용자 관리</h1>
  </section>

  <section class="admin-user-toolbar">
    <form method="get" action="/admin/users" class="admin-user-filter" id="userFilterForm">
      <input type="hidden" name="page" value="1">
      <input type="hidden" name="size" th:value="${userPage.pageSize}">

      <input type="search"
             name="keyword"
             id="searchUser"
             placeholder="이메일 / 닉네임 검색"
             th:value="${selectedKeyword}">

      <select name="subjectName" id="userSubjectFilter">
        <option value="">관심 과목</option>
        <option th:each="subject : ${subjectList}"
                th:value="${subject.subjectName}"
                th:text="${subject.subjectName}"
                th:selected="${selectedSubjectName != null and selectedSubjectName == subject.subjectName}">
          Java
        </option>
      </select>

      <select name="gradeCode" id="userGradeFilter">
        <option value="">등급</option>
        <option value="BEGINNER" th:selected="${selectedGradeCode == 'BEGINNER'}">BEGINNER</option>
        <option value="INTERMEDIATE" th:selected="${selectedGradeCode == 'INTERMEDIATE'}">INTERMEDIATE</option>
        <option value="ADVANCED" th:selected="${selectedGradeCode == 'ADVANCED'}">ADVANCED</option>
      </select>

      <select name="role" id="userRoleFilter">
        <option value="">권한</option>
        <option value="ROLE_USER" th:selected="${selectedRole == 'ROLE_USER'}">ROLE_USER</option>
        <option value="ROLE_ADMIN" th:selected="${selectedRole == 'ROLE_ADMIN'}">ROLE_ADMIN</option>
      </select>

      <select name="status" id="userStatusFilter">
        <option value="">상태</option>
        <option value="ACTIVE" th:selected="${selectedStatus == 'ACTIVE'}">정상</option>
        <option value="SUSPENDED" th:selected="${selectedStatus == 'SUSPENDED'}">정지</option>
        <option value="WITHDRAWN" th:selected="${selectedStatus == 'WITHDRAWN'}">탈퇴</option>
      </select>

      <button type="submit" class="admin-user-filter-button">검색</button>
    </form>
  </section>

  <section class="admin-user-section">
    <div class="admin-user-section-title">
      <h2>사용자 목록</h2>
    </div>

    <div class="admin-user-table-wrap">
      <table class="admin-user-table">
        <thead>
        <tr>
          <th>사용자 ID</th>
          <th>이메일</th>
          <th>닉네임</th>
          <th>관심 과목</th>
          <th>등급</th>
          <th>점수</th>
          <th>권한</th>
          <th>가입일</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user : ${userPage.items}" class="admin-user-row"
            th:data-user-id="${user.userId}"
            th:data-email="${user.email}"
            th:data-nickname="${user.nickname}"
            th:data-subject-name="${user.subjectName}"
            th:data-grade-code="${user.gradeCode}"
            th:data-total-score="${user.totalScore}"
            th:data-role="${user.role}"
            th:data-created-at="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"
            th:data-status="${user.status}"
            th:data-progress-count="${user.progressCount}"
            th:data-completed-count="${user.completedCount}"
            th:data-average-progress-rate="${user.averageProgressRate}">
          <td th:text="${'#' + user.userId}">#001</td>
          <td th:text="${user.email}">user01@email.com</td>
          <td th:text="${user.nickname}">닉네임1</td>
          <td th:text="${user.subjectName ?: '-'}">Java</td>
          <td th:text="${user.gradeCode ?: '-'}">Silver</td>
          <td th:text="${user.totalScore ?: 0}">1200</td>
          <td th:text="${user.role}">ROLE_USER</td>
          <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}">2026-05-01</td>
          <td th:text="${user.status == 'SUSPENDED' ? '정지' : (user.status == 'WITHDRAWN' ? '탈퇴' : '정상')}"
              th:classappend="${user.status == 'SUSPENDED'} ? ' admin-user-status-danger'">정상</td>
          <td>
            <div class="admin-user-table-actions">
              <button type="button"
                      class="admin-user-table-button admin-user-detail-button"
                      th:data-user-id="${user.userId}"
                      th:data-email="${user.email}"
                      th:data-nickname="${user.nickname}"
                      th:data-subject-name="${user.subjectName}"
                      th:data-grade-code="${user.gradeCode}"
                      th:data-total-score="${user.totalScore}"
                      th:data-role="${user.role}"
                      th:data-created-at="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"
                      th:data-status="${user.status}"
                      th:data-progress-count="${user.progressCount}"
                      th:data-completed-count="${user.completedCount}"
                      th:data-average-progress-rate="${user.averageProgressRate}">
                상세보기
              </button>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(userPage.items)}">
          <td colspan="10" class="admin-user-empty">등록된 사용자가 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <nav class="admin-pagination" th:if="${userPage.totalPages >= 1}" aria-label="사용자 관리 페이지">
      <a class="admin-page-link"
         th:if="${userPage.hasPrevious}"
         th:href="@{/admin/users(
                    page=${userPage.currentPage - 1},
                    size=${userPage.pageSize},
                    keyword=${selectedKeyword},
                    subjectName=${selectedSubjectName},
                    gradeCode=${selectedGradeCode},
                    role=${selectedRole},
                    status=${selectedStatus}
                  )}">
        &lt;
      </a>

      <span th:each="pageNumber : ${#numbers.sequence(userPage.startPage, userPage.endPage)}">
        <a class="admin-page-link"
           th:if="${pageNumber != userPage.currentPage}"
           th:href="@{/admin/users(
                      page=${pageNumber},
                      size=${userPage.pageSize},
                      keyword=${selectedKeyword},
                      subjectName=${selectedSubjectName},
                      gradeCode=${selectedGradeCode},
                      role=${selectedRole},
                      status=${selectedStatus}
                    )}"
           th:text="${pageNumber}">
          1
        </a>

        <strong class="admin-page-link admin-page-current"
                th:if="${pageNumber == userPage.currentPage}"
                th:text="${pageNumber}">
          1
        </strong>
      </span>

      <a class="admin-page-link"
         th:if="${userPage.hasNext}"
         th:href="@{/admin/users(
                    page=${userPage.currentPage + 1},
                    size=${userPage.pageSize},
                    keyword=${selectedKeyword},
                    subjectName=${selectedSubjectName},
                    gradeCode=${selectedGradeCode},
                    role=${selectedRole},
                    status=${selectedStatus}
                  )}">
        &gt;
      </a>
    </nav>
  </section>

  <section class="admin-user-detail-panel">
    <h2>사용자 상세 패널</h2>

    <div class="admin-user-detail-top">
      <input type="text" id="userProfileSummary" readonly
             placeholder="프로필 정보 (이메일, 닉네임, 관심 과목, 가입일)">
      <div class="admin-user-detail-actions">
        <form id="userStatusForm" method="post" action="/admin/users/0/status">
          <input type="hidden" name="status" id="userStatusValue" value="SUSPENDED">
          <button type="submit" id="userStatusButton" class="admin-user-primary-button" disabled>계정 정지</button>
        </form>
        <form id="userRoleForm" method="post" action="/admin/users/0/role">
          <select name="role" id="userRoleValue">
            <option value="ROLE_ADMIN">ROLE_ADMIN</option>
            <option value="ROLE_USER">ROLE_USER</option>
          </select>
          <button type="submit" id="userRoleButton" class="admin-user-secondary-button" disabled>권한 변경</button>
        </form>
      </div>
    </div>

    <input type="text" id="userLearningSummary" readonly placeholder="학습 진행률 요약">
    <textarea id="userActivitySummary" readonly placeholder="작성 글 수 / 신고-제재 이력"></textarea>
  </section>
</main>

<script>
  const userFilterForm = document.querySelector("#userFilterForm");

  userFilterForm?.addEventListener("submit", () => {
    const pageInput = userFilterForm.querySelector("input[name='page']");
    if (pageInput) {
      pageInput.value = "1";
    }
  });

  document.querySelectorAll(".admin-user-detail-button").forEach((button) => {
    button.addEventListener("click", () => {
      const progressCount = button.dataset.progressCount || "0";
      const completedCount = button.dataset.completedCount || "0";
      const averageProgressRate = Math.round(Number(button.dataset.averageProgressRate || 0));

      document.querySelector("#userProfileSummary").value =
          `${button.dataset.email || "-"} / ${button.dataset.nickname || "-"} / ${button.dataset.subjectName || "-"} / ${button.dataset.createdAt || "-"}`;

      document.querySelector("#userLearningSummary").value =
              `진행 ${progressCount}개 / 완료 ${completedCount}개 / 평균 ${averageProgressRate}%`;

      document.querySelector("#userActivitySummary").value =
          "작성 글 수, 신고 내역, 관리자 제재 이력은 후속 데이터 연결 예정";

      const statusForm = document.querySelector("#userStatusForm");
      const statusValue = document.querySelector("#userStatusValue");
      const statusButton = document.querySelector("#userStatusButton");
      const userId = button.dataset.userId;
      const currentStatus = button.dataset.status;

      statusForm.action = `/admin/users/${userId}/status`;
      statusButton.disabled = false;

      if (currentStatus === "SUSPENDED") {
        statusValue.value = "ACTIVE";
        statusButton.textContent = "정지 해제";
        statusForm.onsubmit = () => confirm("정지를 해제하시겠습니까?");
      } else if (currentStatus === "WITHDRAWN") {
        statusValue.value = "";
        statusButton.textContent = "탈퇴 계정";
        statusButton.disabled = true;
        statusForm.onsubmit = () => false;
      } else {
        statusValue.value = "SUSPENDED";
        statusButton.textContent = "계정 정지";
        statusForm.onsubmit = () => confirm("계정을 정지하시겠습니까?");
      }

      const roleForm = document.querySelector("#userRoleForm");
      const roleValue = document.querySelector("#userRoleValue");
      const userRoleButton = document.querySelector("#userRoleButton");

      roleForm.action = `/admin/users/${userId}/role`;
      roleValue.value = button.dataset.role || "ROLE_USER";
      userRoleButton.disabled = false;

      roleForm.onsubmit = () => confirm("권한을 변경하시겠습니까?");
      document.querySelector(".admin-user-detail-panel").scrollIntoView({ behavior: "smooth", block: "center" });
    });
  });
</script>
</body>
</html>
