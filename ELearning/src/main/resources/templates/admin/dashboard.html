<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 홈 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/admin.css}">
  <link rel="stylesheet" th:href="@{/css/screens/dashboard.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<main class="page-shell admin-screen admin-dashboard-screen">
  <section class="admin-dashboard-header">
    <h1>관리자 홈</h1>
  </section>

  <section class="admin-dashboard-summary" aria-label="관리자 주요 지표">
    <article class="admin-dashboard-stat">
      <span>전체 사용자 수</span>
      <strong th:text="${totalUserCount}">0</strong>
    </article>
    <article class="admin-dashboard-stat">
      <span>오늘 학습 수</span>
      <strong th:text="${todayLearningCount}">0</strong>
    </article>
    <article class="admin-dashboard-stat">
      <span>오늘 문제 제출 수</span>
      <strong th:text="${todaySubmissionCount}">0</strong>
    </article>
    <article class="admin-dashboard-stat">
      <span>신고 대기 수</span>
      <strong th:text="${pendingReportCount}">0</strong>
    </article>
  </section>

  <section class="admin-dashboard-analytics" aria-label="학습 통계">
    <article class="admin-dashboard-card admin-dashboard-chart-card">
      <div class="admin-dashboard-card-head">
        <h2>일별 학습 활동</h2>
      </div>
      <div class="admin-dashboard-chart admin-dashboard-chart-centered" aria-label="일별 학습 활동 막대 그래프">
        <div th:each="point : ${dailyLearningChart}"
             class="admin-dashboard-bar"
             th:style="'--bar-height: ' + ${point.percent} + '%'">
          <strong class="admin-dashboard-bar-value" th:text="${point.value}">0</strong>
          <i th:if="${point.value > 0}"></i>
          <span th:text="${point.label}">06/29</span>
        </div>
        <p th:if="${#lists.isEmpty(dailyLearningChart)}">표시할 데이터가 없습니다.</p>
      </div>
    </article>

    <article class="admin-dashboard-card admin-dashboard-chart-card">
      <div class="admin-dashboard-card-head">
        <h2>과목별 학습 완료 수</h2>
      </div>
      <div class="admin-dashboard-chart admin-dashboard-chart-centered" aria-label="과목별 학습 완료 수 막대 그래프">
        <div th:each="point : ${subjectCompleteChart}"
             class="admin-dashboard-bar"
             th:style="'--bar-height: ' + ${point.percent} + '%'">
          <strong class="admin-dashboard-bar-value" th:text="${point.value}">0</strong>
          <i th:if="${point.value > 0}"></i>
          <span th:text="${point.label}">Java</span>
        </div>
        <p th:if="${#lists.isEmpty(subjectCompleteChart)}">표시할 데이터가 없습니다.</p>
      </div>
    </article>
  </section>

  <section class="admin-dashboard-quick" aria-label="빠른 이동">
    <h2>빠른 이동</h2>
    <div class="admin-dashboard-quick-grid">
      <a th:href="@{/admin/problems}" class="admin-dashboard-quick-link">문제 등록</a>
      <a th:href="@{/admin/theory}" class="admin-dashboard-quick-link">이론 자료 등록</a>
      <a th:href="@{/admin/reports}" class="admin-dashboard-quick-link">신고 확인</a>
      <a th:href="@{/admin/notices}" class="admin-dashboard-quick-link">공지 작성</a>
    </div>
  </section>

  <section class="admin-dashboard-recent" aria-label="최근 항목">
    <article class="admin-dashboard-card admin-dashboard-table-card">
      <h2>최근 신고 목록</h2>
      <div class="admin-dashboard-table-wrap">
        <table>
          <thead>
          <tr>
            <th>번호</th>
            <th>내용 요약</th>
            <th>처리 상태</th>
            <th>일시</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="report, stat : ${recentReports}">
            <td th:text="${stat.count}">1</td>
            <td th:text="${(report.targetType == 'POST' ? '게시글' : (report.targetType == 'COMMENT' ? '댓글' : report.targetType))
              + ' / ' +
              (report.reasonCode == 'SPAM' ? '스팸' : (report.reasonCode == 'ABUSE' ? '부적절한 내용' : (report.reasonCode == 'AD' ? '광고' : report.reasonCode)))}">
              게시글 / 스팸
            </td>
            <td th:text="${report.status == 'PENDING' ? '대기' : (report.status == 'RESOLVED' ? '처리 완료' : report.status)}">처리 완료</td>
            <td th:text="${report.createdAt != null ? #temporals.format(report.createdAt, 'MM/dd') : '-'}">06/15</td>
          </tr>
          <tr th:if="${#lists.isEmpty(recentReports)}">
            <td colspan="4">최근 신고 목록이 없습니다.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </article>

    <article class="admin-dashboard-card admin-dashboard-table-card">
      <h2>최근 공지사항</h2>
      <div class="admin-dashboard-table-wrap">
        <table>
          <thead>
          <tr>
            <th>번호</th>
            <th>제목</th>
            <th>상태</th>
            <th>작성일</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="notice, stat : ${recentNotices}">
            <td th:text="${stat.count}">1</td>
            <td th:text="${notice.title}">KNOWVA 이용약관 변경 안내</td>
            <td th:text="${notice.status == 'PUBLISHED' ? '공개' : '비공개'}">공개</td>
            <td th:text="${notice.createdAt != null ? #temporals.format(notice.createdAt, 'MM/dd') : '-'}">06/15</td>
          </tr>
          <tr th:if="${#lists.isEmpty(recentNotices)}">
            <td colspan="4">최근에 등록된 공지사항이 없습니다.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </article>
  </section>
</main>
</body>
</html>
