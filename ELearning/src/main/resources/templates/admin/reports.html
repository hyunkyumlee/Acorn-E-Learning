<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" data-theme="knowva-ion-light" style="color-scheme: light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>신고 관리 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/admin.css}">
  <link rel="stylesheet" th:href="@{/css/screens/reports.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<main class="page-shell admin-screen admin-report-screen">
  <section class="admin-report-header">
    <h1>신고 관리</h1>
  </section>

  <form method="get" action="/admin/reports" class="admin-report-toolbar" aria-label="신고 검색 조건">
    <input type="hidden" name="size" th:value="${reportPage.pageSize}">
    <select id="reportTypeFilter" name="targetType" aria-label="신고 유형">
      <option value="">신고 유형</option>
      <option value="POST" th:selected="${selectedTargetType == 'POST'}">게시글</option>
      <option value="COMMENT" th:selected="${selectedTargetType == 'COMMENT'}">댓글</option>
    </select>
    <select id="reportStatusFilter" name="status" aria-label="처리 상태">
      <option value="">처리 상태</option>
      <option value="PENDING" th:selected="${selectedReportStatus == 'PENDING'}">대기</option>
      <option value="IN_PROGRESS" th:selected="${selectedReportStatus == 'IN_PROGRESS'}">검토 중</option>
      <option value="RESOLVED" th:selected="${selectedReportStatus == 'RESOLVED'}">처리 완료</option>
      <option value="REJECTED" th:selected="${selectedReportStatus == 'REJECTED'}">반려</option>
    </select>
    <input type="date" id="reportDateFilter" name="reportDate" th:value="${selectedReportDate}" aria-label="검색 날짜">
    <button type="submit" class="admin-report-filter-button">검색</button>
  </form>

  <section class="admin-report-section" aria-label="신고 목록">
    <h2>신고 목록</h2>
    <div class="admin-report-table-wrap">
      <table class="admin-report-table">
        <thead>
        <tr>
          <th>번호</th>
          <th>신고자</th>
          <th>신고 대상 유형</th>
          <th>신고 대상</th>
          <th>신고 사유</th>
          <th>신고 일시</th>
          <th>처리 상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="report, stat : ${reportPage.items}"
            class="admin-report-row"
            th:data-report-id="${report.reportId}"
            th:data-reporter="${report.reporterNickname}"
            th:data-type="${report.targetTypeLabel()}"
            th:data-type-code="${report.targetType}"
            th:data-date="${report.createdAt != null ? #temporals.format(report.createdAt, 'MM/dd') : '-'}"
            th:data-full-date="${report.createdAt != null ? #temporals.format(report.createdAt, 'yyyy-MM-dd') : ''}"
            th:data-status-code="${report.status}"
            th:data-status="${report.statusLabel()}"
            th:data-target="${report.targetSummary}"
            th:data-reason="${report.reasonLabel()}"
            th:data-content="${report.targetSummary}">
          <td th:text="${((reportPage.currentPage - 1) * reportPage.pageSize) + stat.count}">1</td>
          <td th:text="${report.reporterNickname}">닉네임1</td>
          <td th:text="${report.targetTypeLabel()}">게시글</td>
          <td th:text="${report.targetSummary}">신고 대상</td>
          <td th:text="${report.reasonLabel()}">신고 사유</td>
          <td th:text="${report.createdAt != null ? #temporals.format(report.createdAt, 'MM/dd') : '-'}">07/04</td>
          <td>
            <span class="admin-report-status"
                  th:classappend="${report.statusClass()}"
                  th:text="${report.statusLabel()}">처리 완료</span>
          </td>
          <td>
            <button type="button" class="admin-report-table-button admin-report-detail-button">상세보기</button>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reportPage.items)}">
          <td colspan="8" class="admin-report-empty">등록된 신고가 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <nav class="admin-pagination" th:if="${reportPage.totalPages >= 1}" aria-label="신고관리 페이지">
      <a class="admin-page-link"
         th:if="${reportPage.hasPrevious}"
         th:href="@{/admin/reports(page=${reportPage.currentPage - 1}, size=${reportPage.pageSize}, targetType=${selectedTargetType}, status=${selectedReportStatus}, reportDate=${selectedReportDate})}">
        &lt;
      </a>

      <span th:each="pageNumber : ${#numbers.sequence(reportPage.startPage, reportPage.endPage)}">
        <a class="admin-page-link"
           th:if="${pageNumber != reportPage.currentPage}"
           th:href="@{/admin/reports(page=${pageNumber}, size=${reportPage.pageSize}, targetType=${selectedTargetType}, status=${selectedReportStatus}, reportDate=${selectedReportDate})}"
           th:text="${pageNumber}">
          1
        </a>

        <strong class="admin-page-link admin-page-current"
                th:if="${pageNumber == reportPage.currentPage}"
                th:text="${pageNumber}">
          1
        </strong>
      </span>

      <a class="admin-page-link"
         th:if="${reportPage.hasNext}"
         th:href="@{/admin/reports(page=${reportPage.currentPage + 1}, size=${reportPage.pageSize}, targetType=${selectedTargetType}, status=${selectedReportStatus}, reportDate=${selectedReportDate})}">
        &gt;
      </a>
    </nav>
  </section>

  <section class="admin-report-detail" aria-label="신고 상세 보기">
    <h2>신고 상세 보기</h2>
    <div class="admin-report-detail-card">
      <dl class="admin-report-meta">
        <div>
          <dt>신고자</dt>
          <dd id="reportDetailReporter">-</dd>
        </div>
        <div>
          <dt>신고 유형</dt>
          <dd id="reportDetailType">-</dd>
        </div>
        <div>
          <dt>신고 일시</dt>
          <dd id="reportDetailDate">-</dd>
        </div>
        <div>
          <dt>처리 상태</dt>
          <dd id="reportDetailStatus">-</dd>
        </div>
      </dl>

      <div class="admin-report-content">
        <h3>신고 대상 내용</h3>
        <div class="admin-report-content-box">
          <p id="reportDetailContent">목록에서 신고 항목을 선택하세요.</p>
          <span id="reportDetailReason">신고 사유: -</span>
        </div>
      </div>

      <div class="admin-report-process">
        <h3>처리 결과 입력</h3>
        <form id="reportHandleForm" method="post" action="/admin/reports/0" class="admin-report-process-row"
              onsubmit="return confirm('신고 처리 상태를 변경하시겠습니까?');">
          <select name="status" id="reportHandleStatus" aria-label="처리 상태 선택" required>
            <option value="">처리 상태 선택</option>
            <option value="PENDING">대기</option>
            <option value="IN_PROGRESS">검토 중</option>
            <option value="RESOLVED">처리 완료</option>
            <option value="REJECTED">반려</option>
          </select>
          <input type="text" name="memo" placeholder="처리 메모를 입력하세요">
          <button type="submit" id="reportHandleSubmit" disabled>처리 확정</button>
          <button type="button" class="admin-report-secondary-button" id="reportDetailClose">닫기</button>
        </form>
      </div>

      <div class="admin-report-history">
        <h3>처리 이력</h3>
        <ul>
          <li>상세보기를 선택하면 처리 대상 신고가 지정됩니다.</li>
        </ul>
      </div>
    </div>
  </section>
</main>

<script>
  const detailPanel = document.querySelector(".admin-report-detail");
  const reporter = document.querySelector("#reportDetailReporter");
  const type = document.querySelector("#reportDetailType");
  const date = document.querySelector("#reportDetailDate");
  const status = document.querySelector("#reportDetailStatus");
  const content = document.querySelector("#reportDetailContent");
  const reason = document.querySelector("#reportDetailReason");
  const closeButton = document.querySelector("#reportDetailClose");
  const handleForm = document.querySelector("#reportHandleForm");
  const handleStatus = document.querySelector("#reportHandleStatus");
  const handleSubmit = document.querySelector("#reportHandleSubmit");
  const resetDetail = () => {
    reporter.textContent = "-";
    type.textContent = "-";
    date.textContent = "-";
    status.textContent = "-";
    content.textContent = "목록에서 신고 항목을 선택하세요.";
    reason.textContent = "신고 사유: -";
    handleStatus.value = "";
    handleForm.action = "/admin/reports/0";
    handleSubmit.disabled = true;
    document.querySelectorAll(".admin-report-row").forEach((item) => item.classList.remove("is-selected"));
  };

  document.querySelectorAll(".admin-report-detail-button").forEach((button) => {
    button.addEventListener("click", () => {
      const row = button.closest(".admin-report-row");
      const reportId = row.dataset.reportId;

      reporter.textContent = row.dataset.reporter || "-";
      type.textContent = row.dataset.type || "-";
      date.textContent = row.dataset.date || "-";
      status.textContent = row.dataset.status || "-";
      content.textContent = row.dataset.content || row.dataset.target || "-";
      reason.textContent = `신고 사유: ${row.dataset.reason || "-"}`;
      handleStatus.value = row.dataset.statusCode || "";
      handleForm.action = `/admin/reports/${reportId}`;
      handleSubmit.disabled = !reportId;

      document.querySelectorAll(".admin-report-row").forEach((item) => item.classList.remove("is-selected"));
      row.classList.add("is-selected");
      detailPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  closeButton?.addEventListener("click", () => {
    resetDetail();
  });

</script>
</body>
</html>
