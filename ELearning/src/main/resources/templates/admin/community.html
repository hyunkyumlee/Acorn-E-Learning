<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>커뮤니티 관리 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/admin.css}">
  <link rel="stylesheet" th:href="@{/css/screens/adminCommunity.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<main class="page-shell admin-screen admin-community-screen" th:data-selected-tab="${selectedTab}">
  <section class="admin-community-header">
    <h1>커뮤니티 관리</h1>
  </section>

  <section class="admin-community-tabs" aria-label="커뮤니티 관리 탭">
    <button type="button"
            class="admin-community-tab"
            th:classappend="${selectedTab == 'posts'} ? ' is-active' : ''"
            data-tab="posts">게시글 관리</button>
    <button type="button"
            class="admin-community-tab"
            th:classappend="${selectedTab == 'comments'} ? ' is-active' : ''"
            data-tab="comments">댓글 관리</button>
  </section>

  <form method="get" action="/admin/community" class="admin-community-toolbar" aria-label="커뮤니티 검색 조건">
    <input type="hidden" name="size" th:value="${communityPage.posts.pageSize}">
    <input type="hidden" name="tab" id="communitySelectedTab" th:value="${selectedTab}">

    <select id="communityBoardFilter" name="boardType" class="community-board-filter" aria-label="게시판 유형" onchange="this.form.submit()">
      <option value="">게시판 유형</option>
      <option value="FREE" th:selected="${selectedBoardType == 'FREE'}">자유</option>
      <option value="QUESTION" th:selected="${selectedBoardType == 'QUESTION'}">질문</option>
      <option value="QNA" th:selected="${selectedBoardType == 'QNA'}">질문</option>
      <option value="STUDY_LOG" th:selected="${selectedBoardType == 'STUDY_LOG'}">공부 일지</option>
    </select>

    <select id="communityStatusFilter" name="status" aria-label="공개 상태" onchange="this.form.submit()">
      <option value="">공개 상태</option>
      <option value="ACTIVE" th:selected="${selectedStatus == 'ACTIVE'}">공개</option>
      <option value="HIDDEN" th:selected="${selectedStatus == 'HIDDEN'}">숨김</option>
      <option value="DELETED" th:selected="${selectedStatus == 'DELETED'}">삭제</option>
    </select>

    <input type="search"
           id="communityKeywordFilter"
           name="keyword"
           th:value="${selectedKeyword}"
           placeholder="키워드 검색"
           aria-label="키워드 검색"
           onchange="this.form.submit()">
  </form>

  <section class="admin-community-panel"
           th:classappend="${selectedTab == 'posts'} ? '' : ' is-hidden'"
           data-panel="posts"
           aria-label="게시글 목록">
    <h2>게시글 목록</h2>
    <div class="admin-community-table-wrap">
      <table class="admin-community-table">
        <thead>
        <tr>
          <th>게시글 ID</th>
          <th>작성자</th>
          <th>제목</th>
          <th>게시판</th>
          <th>좋아요</th>
          <th>댓글</th>
          <th>신고</th>
          <th>작성일</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${communityPage.posts.items}"
            class="admin-community-post-row"
            th:data-board="${post.boardType}"
            th:data-status="${post.status}"
            th:data-keyword="${post.title + ' ' + post.writerNickname}">
          <td th:text="${'#' + post.postId}">#001</td>
          <td th:text="${post.writerNickname}">닉네임</td>
          <td th:text="${post.title}">게시글 제목</td>
          <td th:text="${post.boardTypeLabel()}">자유</td>
          <td th:text="${post.likeCount}">0</td>
          <td th:text="${post.commentCount}">0</td>
          <td th:text="${post.reportCount}">0</td>
          <td th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd') : '-'}">2026-06-01</td>
          <td>
            <span class="admin-community-status"
                  th:classappend="${post.statusClass()}"
                  th:text="${post.statusLabel()}">공개</span>
          </td>
          <td>
            <div class="admin-community-actions">
              <form method="post"
                    th:action="@{/admin/community/posts/{postId}/status(postId=${post.postId})}"
                    onsubmit="return confirm('이 게시글을 공개 상태로 변경할까요?');">
                <input type="hidden" name="status" value="ACTIVE">
                <button type="submit">공개</button>
              </form>
              <form method="post"
                    th:action="@{/admin/community/posts/{postId}/status(postId=${post.postId})}"
                    onsubmit="return confirm('이 게시글을 숨김 상태로 변경할까요?');">
                <input type="hidden" name="status" value="HIDDEN">
                <button type="submit">숨김</button>
              </form>
              <form method="post"
                    th:action="@{/admin/community/posts/{postId}/status(postId=${post.postId})}"
                    onsubmit="return confirm('이 게시글을 삭제 상태로 변경할까요?');">
                <input type="hidden" name="status" value="DELETED">
                <button type="submit">삭제</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(communityPage.posts.items)}">
          <td colspan="10" class="admin-community-empty">게시글이 없습니다.</td>
        </tr>
        <tr class="admin-community-post-empty is-hidden">
          <td colspan="10" class="admin-community-empty">조건에 맞는 게시글이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <nav class="admin-pagination" th:if="${communityPage.posts.totalPages >= 1}" aria-label="게시글 페이지">
      <a class="admin-page-link"
         th:if="${communityPage.posts.hasPrevious}"
         th:href="@{/admin/community(tab='posts', postPage=${communityPage.posts.currentPage - 1}, commentPage=${communityPage.comments.currentPage}, size=${communityPage.posts.pageSize}, boardType=${selectedBoardType}, status=${selectedStatus}, keyword=${selectedKeyword})}">&lt;</a>

      <span th:each="pageNumber : ${#numbers.sequence(communityPage.posts.startPage, communityPage.posts.endPage)}">
        <a class="admin-page-link"
           th:if="${pageNumber != communityPage.posts.currentPage}"
           th:href="@{/admin/community(tab='posts', postPage=${pageNumber}, commentPage=${communityPage.comments.currentPage}, size=${communityPage.posts.pageSize}, boardType=${selectedBoardType}, status=${selectedStatus}, keyword=${selectedKeyword})}"
           th:text="${pageNumber}">1</a>
        <strong class="admin-page-link admin-page-current"
                th:if="${pageNumber == communityPage.posts.currentPage}"
                th:text="${pageNumber}">1</strong>
      </span>

      <a class="admin-page-link"
         th:if="${communityPage.posts.hasNext}"
         th:href="@{/admin/community(tab='posts', postPage=${communityPage.posts.currentPage + 1}, commentPage=${communityPage.comments.currentPage}, size=${communityPage.posts.pageSize}, boardType=${selectedBoardType}, status=${selectedStatus}, keyword=${selectedKeyword})}">&gt;</a>
    </nav>
  </section>

  <section class="admin-community-panel"
           th:classappend="${selectedTab == 'comments'} ? '' : ' is-hidden'"
           data-panel="comments"
           aria-label="댓글 목록">
    <h2>댓글 목록</h2>
    <div class="admin-community-table-wrap">
      <table class="admin-community-table">
        <thead>
        <tr>
          <th>댓글 ID</th>
          <th>게시글 ID</th>
          <th>작성자</th>
          <th>댓글 내용 요약</th>
          <th>신고 수</th>
          <th>작성일</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comment : ${communityPage.comments.items}"
            class="admin-community-comment-row"
            th:data-status="${comment.status}"
            th:data-keyword="${comment.content + ' ' + comment.writerNickname}">
          <td th:text="${'#' + comment.commentId}">#C001</td>
          <td th:text="${'#' + comment.postId}">#001</td>
          <td th:text="${comment.writerNickname}">닉네임</td>
          <td th:text="${comment.contentSummary()}">댓글 내용</td>
          <td th:text="${comment.reportCount}">0</td>
          <td th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'yyyy-MM-dd') : '-'}">2026-06-01</td>
          <td>
            <span class="admin-community-status"
                  th:classappend="${comment.statusClass()}"
                  th:text="${comment.statusLabel()}">공개</span>
          </td>
          <td>
            <div class="admin-community-actions">
              <form method="post"
                    th:action="@{/admin/community/comments/{commentId}/status(commentId=${comment.commentId})}"
                    onsubmit="return confirm('이 댓글을 공개 상태로 변경할까요?');">
                <input type="hidden" name="status" value="ACTIVE">
                <button type="submit">공개</button>
              </form>
              <form method="post"
                    th:action="@{/admin/community/comments/{commentId}/status(commentId=${comment.commentId})}"
                    onsubmit="return confirm('이 댓글을 숨김 상태로 변경할까요?');">
                <input type="hidden" name="status" value="HIDDEN">
                <button type="submit">숨김</button>
              </form>
              <form method="post"
                    th:action="@{/admin/community/comments/{commentId}/status(commentId=${comment.commentId})}"
                    onsubmit="return confirm('이 댓글을 삭제 상태로 변경할까요?');">
                <input type="hidden" name="status" value="DELETED">
                <button type="submit">삭제</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(communityPage.comments.items)}">
          <td colspan="8" class="admin-community-empty">댓글이 없습니다.</td>
        </tr>
        <tr class="admin-community-comment-empty is-hidden">
          <td colspan="8" class="admin-community-empty">조건에 맞는 댓글이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <nav class="admin-pagination" th:if="${communityPage.comments.totalPages >= 1}" aria-label="댓글 페이지">
      <a class="admin-page-link"
         th:if="${communityPage.comments.hasPrevious}"
         th:href="@{/admin/community(tab='comments', postPage=${communityPage.posts.currentPage}, commentPage=${communityPage.comments.currentPage - 1}, size=${communityPage.comments.pageSize}, boardType=${selectedBoardType}, status=${selectedStatus}, keyword=${selectedKeyword})}">&lt;</a>

      <span th:each="pageNumber : ${#numbers.sequence(communityPage.comments.startPage, communityPage.comments.endPage)}">
        <a class="admin-page-link"
           th:if="${pageNumber != communityPage.comments.currentPage}"
           th:href="@{/admin/community(tab='comments', postPage=${communityPage.posts.currentPage}, commentPage=${pageNumber}, size=${communityPage.comments.pageSize}, boardType=${selectedBoardType}, status=${selectedStatus}, keyword=${selectedKeyword})}"
           th:text="${pageNumber}">1</a>
        <strong class="admin-page-link admin-page-current"
                th:if="${pageNumber == communityPage.comments.currentPage}"
                th:text="${pageNumber}">1</strong>
      </span>

      <a class="admin-page-link"
         th:if="${communityPage.comments.hasNext}"
         th:href="@{/admin/community(tab='comments', postPage=${communityPage.posts.currentPage}, commentPage=${communityPage.comments.currentPage + 1}, size=${communityPage.comments.pageSize}, boardType=${selectedBoardType}, status=${selectedStatus}, keyword=${selectedKeyword})}">&gt;</a>
    </nav>
  </section>
</main>

<script>
  const main = document.querySelector(".admin-community-screen");
  const tabs = document.querySelectorAll(".admin-community-tab");
  const panels = document.querySelectorAll(".admin-community-panel");
  const selectedTabInput = document.querySelector("#communitySelectedTab");
  const boardFilter = document.querySelector("#communityBoardFilter");
  const statusFilter = document.querySelector("#communityStatusFilter");
  const keywordFilter = document.querySelector("#communityKeywordFilter");
  let activeTab = main?.dataset.selectedTab || "posts";

  const syncCommunityFilterVisibility = () => {
    const postTab = activeTab === "posts";
    boardFilter.hidden = !postTab;

    if (!postTab) {
      boardFilter.value = "";
    }
  };

  const applyCommunityFilter = () => {
    const selectedBoard = boardFilter.value;
    const selectedStatus = statusFilter.value;
    const keyword = keywordFilter.value.trim().toLowerCase();
    const rowSelector = activeTab === "posts" ? ".admin-community-post-row" : ".admin-community-comment-row";
    const emptyRow = document.querySelector(activeTab === "posts" ? ".admin-community-post-empty" : ".admin-community-comment-empty");
    let visibleCount = 0;

    document.querySelectorAll(rowSelector).forEach((row) => {
      const matchesBoard = activeTab !== "posts" || selectedBoard === "" || row.dataset.board === selectedBoard;
      const matchesStatus = selectedStatus === "" || row.dataset.status === selectedStatus;
      const matchesKeyword = keyword === "" || (row.dataset.keyword || "").toLowerCase().includes(keyword);
      const visible = matchesBoard && matchesStatus && matchesKeyword;

      row.hidden = !visible;
      if (visible) {
        visibleCount += 1;
      }
    });

    emptyRow?.classList.toggle("is-hidden", visibleCount > 0);
  };

  tabs.forEach((tab) => {
    tab.addEventListener("click", () => {
      activeTab = tab.dataset.tab;
      selectedTabInput.value = activeTab;
      tabs.forEach((item) => item.classList.toggle("is-active", item === tab));
      panels.forEach((panel) => panel.classList.toggle("is-hidden", panel.dataset.panel !== activeTab));
      syncCommunityFilterVisibility();
      applyCommunityFilter();
    });
  });

  boardFilter?.addEventListener("change", applyCommunityFilter);
  statusFilter?.addEventListener("change", applyCommunityFilter);
  keywordFilter?.addEventListener("input", applyCommunityFilter);

  panels.forEach((panel) => panel.classList.toggle("is-hidden", panel.dataset.panel !== activeTab));
  tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.tab === activeTab));
  syncCommunityFilterVisibility();
  applyCommunityFilter();
</script>
</body>
</html>
