<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원 탈퇴 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/settings.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <main class="settings-screen" th:with="profile=${view != null ? view.profile() : null}">
    <section class="figma-settings-page">
      <a class="figma-logout" th:href="@{/login}">로그아웃</a>
      <aside class="figma-settings-sidebar">
        <h1>설정</h1>
        <nav aria-label="설정 메뉴">
          <a th:href="@{/settings/profile}">회원 정보</a>
          <a th:href="@{/settings/security}">이메일 / 비밀번호</a>
          <a th:href="@{/settings/social}">연동된 소셜 계정</a>
          <a th:href="@{/settings/system}">시스템 설정</a>
          <a th:href="@{/settings/payment}">결제 정보</a>
        </nav>
      </aside>
      <section class="figma-settings-main">
        <article class="figma-settings-panel">
          <h1>회원 탈퇴</h1>
          <p>탈퇴 요청 전 학습 기록 보관/마스킹 안내를 확인합니다.</p>
          <section class="figma-settings-box">
            <div class="figma-setting-row"><strong>계정 상태</strong><span th:text="${profile != null ? profile.statusLabel() : '활성'}">활성</span></div>
            <div class="figma-setting-row"><strong>학습 기록</strong><span th:text="${profile != null ? profile.learningGoalLabel() : '탈퇴 후 보관 정책에 따라 처리됩니다.'}">탈퇴 후 보관 정책에 따라 처리됩니다.</span></div>
            <div class="figma-payment-plan">
              <strong>탈퇴 요청</strong>
              <span>탈퇴하면 로그인과 학습 기록 수정이 제한됩니다.</span>
              <a class="figma-button danger" th:href="@{/settings/profile}">탈퇴 요청</a>
            </div>
          </section>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
