<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>연동된 소셜 계정 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/settings.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="settings-screen">
    <section class="figma-settings-page">
      <div class="figma-settings-side">
      <aside class="figma-settings-sidebar">
        <h1>설정</h1>
        <nav aria-label="설정 메뉴">
          <a th:href="@{/settings/profile}">회원 정보</a>
          <a th:href="@{/settings/security}">이메일 / 비밀번호</a>
          <a class="is-active" th:href="@{/settings/social}">연동된 소셜 계정</a>
          <a th:href="@{/settings/system}">시스템 설정</a>
          <a th:href="@{/settings/payment}">결제 정보</a>
        </nav>
      </aside>
        <form class="figma-settings-logout-form" method="post" th:action="@{/logout}">
          <input type="hidden" name="redirect" value="/login">
          <button class="figma-logout-button" type="submit">로그아웃</button>
        </form>
      </div>
      <section class="figma-settings-main">
        <article class="figma-settings-panel">
          <h1>연동된 소셜 계정</h1>
          <p>소셜 로그인 계정을 연동하거나 해제합니다.</p>
          <p class="figma-flash" th:if="${message != null}" th:text="${message}">처리되었습니다.</p>
          <section class="figma-social-grid">
            <article class="figma-social-card">
              <div>
                <h2>Google</h2>
                <p th:text="${view != null ? view.accountLabel('google') : '연동되지 않음'}">연동되지 않음</p>
              </div>
              <form method="post" th:action="@{/settings/social/google/disconnect}">
                <button class="figma-button figma-social-disconnect" type="submit">연동 해제</button>
              </form>
            </article>
            <article class="figma-social-card">
              <div>
                <h2>GitHub</h2>
                <p th:text="${view != null ? view.accountLabel('github') : '연동되지 않음'}">연동되지 않음</p>
              </div>
              <form method="post" th:action="@{/settings/social/github/disconnect}">
                <button class="figma-button figma-social-disconnect" type="submit">연동 해제</button>
              </form>
            </article>
          </section>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
