<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시스템 설정 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/settings.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <main class="settings-screen" th:with="settings=${view}">
    <section class="figma-settings-page">
      <a class="figma-logout" th:href="@{/login}">로그아웃</a>
      <aside class="figma-settings-sidebar">
        <h1>설정</h1>
        <nav aria-label="설정 메뉴">
          <a th:href="@{/settings/profile}">회원 정보</a>
          <a th:href="@{/settings/security}">이메일 / 비밀번호</a>
          <a th:href="@{/settings/social}">연동된 소셜 계정</a>
          <a class="is-active" th:href="@{/settings/system}">시스템 설정</a>
          <a th:href="@{/settings/payment}">결제 정보</a>
        </nav>
      </aside>
      <section class="figma-settings-main">
        <article class="figma-settings-panel">
          <h1>시스템 설정</h1>
          <p>알림, 화면 모드, 접근성 옵션을 관리합니다.</p>
          <p class="figma-flash" th:if="${message != null}" th:text="${message}">저장되었습니다.</p>
          <form class="figma-settings-box" method="post" th:action="@{/settings/system}" th:object="${form}">
            <label class="figma-setting-row">
              <strong>학습 알림</strong>
              <span>
                <select class="figma-field" th:field="*{notificationEnabled}">
                  <option th:value="true">켜짐</option>
                  <option th:value="false">꺼짐</option>
                </select>
                <small class="figma-field-error" th:if="${#fields.hasErrors('notificationEnabled')}" th:errors="*{notificationEnabled}">학습 알림 오류</small>
              </span>
            </label>
            <label class="figma-setting-row">
              <strong>테마</strong>
              <span>
                <select class="figma-field" th:field="*{theme}">
                  <option value="SYSTEM">시스템 설정 따름</option>
                  <option value="LIGHT">라이트</option>
                  <option value="DARK">다크</option>
                </select>
                <small class="figma-field-error" th:if="${#fields.hasErrors('theme')}" th:errors="*{theme}">테마 오류</small>
              </span>
            </label>
            <label class="figma-setting-row">
              <strong>모션 줄이기</strong>
              <span>
                <select class="figma-field" th:field="*{reducedMotionEnabled}">
                  <option th:value="false">꺼짐</option>
                  <option th:value="true">켜짐</option>
                </select>
                <small class="figma-field-error" th:if="${#fields.hasErrors('reducedMotionEnabled')}" th:errors="*{reducedMotionEnabled}">모션 줄이기 오류</small>
              </span>
            </label>
            <button class="figma-button primary" type="submit">저장</button>
          </form>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
