<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>결제 정보 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/settings.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <main class="settings-screen">
    <section class="figma-settings-page">
      <a class="figma-logout" th:href="@{/login}">로그아웃</a>
      <aside class="figma-settings-sidebar">
        <h1>설정</h1>
        <nav aria-label="설정 메뉴">
          <a th:href="@{/settings/profile}">회원 정보</a>
          <a th:href="@{/settings/security}">이메일 / 비밀번호</a>
          <a th:href="@{/settings/social}">연동된 소셜 계정</a>
          <a th:href="@{/settings/system}">시스템 설정</a>
          <a class="is-active" th:href="@{/settings/payment}">결제 정보</a>
        </nav>
      </aside>
      <section class="figma-settings-main">
        <article class="figma-settings-panel">
          <h1>결제 정보</h1>
          <p>결제 내역과 이용 중인 서비스를 확인합니다.</p>
          <section class="figma-settings-box">
            <div class="figma-payment-plan">
              <strong>상세 분석 이용권</strong>
              <span th:if="${view != null}" th:text="|${view.premiumStatusLabel()} · ${view.premiumGrantTypeLabel()} · 만료 ${view.premiumExpiresAtLabel()}|">결제일 2026.06.05 · 9,900원 · 더미 결제</span>
              <span th:if="${view == null}">결제일 2026.06.05 · 9,900원 · 더미 결제</span>
              <a class="figma-button" th:href="@{/payments}">결제 내역</a>
            </div>
            <div class="figma-payment-history" th:if="${view == null}">
              <span>2026.06.05</span><strong>상세 분석 이용권</strong><b>9,900원</b>
            </div>
            <div class="figma-payment-history" th:if="${view != null and view.empty()}">
              <span>-</span><strong>결제 내역 없음</strong><b>0원</b>
            </div>
            <th:block th:if="${view != null}">
              <div class="figma-payment-history" th:each="payment : ${view.payments()}">
                <span th:text="${payment.paidAtLabel()}">2026.06.05</span>
                <strong th:text="${payment.productNameLabel()}">상세 분석 이용권</strong>
                <b th:text="${payment.amountLabel()}">9,900원</b>
              </div>
            </th:block>
          </section>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
