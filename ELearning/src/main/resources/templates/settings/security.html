<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 설정 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/settings.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="settings-screen" th:with="profile=${view}">
    <section class="figma-settings-page">
      <div class="figma-settings-side">
      <aside class="figma-settings-sidebar">
        <h1>설정</h1>
        <nav aria-label="설정 메뉴">
          <a th:href="@{/settings/profile}">회원 정보</a>
          <a class="is-active" th:href="@{/settings/security}">비밀번호 설정</a>
          <a th:href="@{/settings/social}">연동된 소셜 계정</a>
          <a th:href="@{/settings/system}">시스템 설정</a>
          <a th:href="@{/settings/payment}">결제 정보</a>
        </nav>
      </aside>
        <form class="figma-settings-logout-form" method="post" th:action="@{/logout}">
          <input type="hidden" name="redirect" value="/login">
          <button class="figma-logout-button" type="submit">로그아웃</button>
        </form>
      </div>
      <section class="figma-settings-main">
        <article class="figma-settings-panel">
          <h1>비밀번호 설정</h1>
          <p>로그인 비밀번호를 변경하고 관리합니다.</p>
          <p class="figma-flash" th:if="${message != null}" th:text="${message}">저장되었습니다.</p>
          <form class="figma-settings-box figma-password-box" method="post" th:action="@{/settings/security/password}" th:object="${passwordForm}">
            <div class="figma-settings-box-title">
              <h2>비밀번호 변경</h2>
              <span>••••••••••</span>
            </div>
            <div class="figma-form-error" th:if="${#fields.hasGlobalErrors()}">
              <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">비밀번호 변경 오류</p>
            </div>
            <label class="figma-setting-row">
              <strong>현재 비밀번호</strong>
              <span>
                <input class="figma-field" id="currentPassword" name="currentPassword" type="password" autocomplete="current-password">
                <small class="figma-field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}">현재 비밀번호 오류</small>
              </span>
            </label>
            <label class="figma-setting-row">
              <strong>새 비밀번호</strong>
              <span>
                <input class="figma-field" id="newPassword" name="newPassword" type="password" minlength="8" maxlength="72" autocomplete="new-password">
                <small class="figma-field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">새 비밀번호 오류</small>
              </span>
            </label>
            <label class="figma-setting-row">
              <strong>새 비밀번호 확인</strong>
              <span>
                <input class="figma-field" id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password">
                <small class="figma-field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">새 비밀번호 확인 오류</small>
                <small class="figma-field-error" th:if="${#fields.hasErrors('passwordConfirmed')}" th:errors="*{passwordConfirmed}">새 비밀번호 확인 오류</small>
              </span>
            </label>
            <button class="figma-button primary figma-security-action" type="submit">비밀번호 변경</button>
          </form>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
