<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>연습 문제 | Knowva</title>

  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/learning.css}">

  <script defer th:src="@{/js/common/theme.js}"></script>
</head>

<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page-shell learning-screen">

  <section class="practice-header">
    <h1>연습 문제</h1>
  </section>

  <section class="practice-body">

    <div th:if="${completed}">
      <h2>연습이 완료되었습니다.</h2>

      <p th:if="${completeResult != null}">
        <span th:text="${completeResult.data()['passed']} ? '통과했습니다.' : '아쉽게도 통과하지 못했습니다.'">
          통과했습니다.
        </span>
      </p>



      <p th:if="${completeResult != null}">
        다음 이동 경로:
        <span th:text="${completeResult.data()['nextPath']}">/learning/next</span>
      </p>

      <div class="practice-footer">
        <a th:href="@{/learning/review/list}">오답노트 보기</a>
        <a th:if="${completeResult != null}"
           th:href="${completeResult.data()['nextPath']}">다음 학습으로 이동</a>
      </div>
    </div>

    <div th:if="${!completed and problem == null}">
      <p>연습 문제를 시작해보세요.</p>

      <form th:action="@{/learning/practice/sets}" method="post">
        <input type="hidden" name="subjectId" value="1">
        <input type="hidden" name="nodeId" value="1">
        <input type="hidden" name="difficultyCode" value="BRONZE">

        <div class="practice-footer">
          <button type="submit">연습 시작</button>
        </div>
      </form>
    </div>

    <div th:if="${!completed and problem != null}">
      <p>
        문제
        <span th:text="${currentIndex + 1}">1</span>
        /
        <span th:text="${totalCount}">10</span>
      </p>

      <progress th:value="${currentIndex + 1}" th:max="${totalCount}"></progress>

      <p th:text="${problem['problemType']}">문제유형</p>
      <h2 th:text="${problem['question']}">문제 내용</h2>

      <div th:if="${!answered}">
        <form th:action="@{|/learning/practice/sets/${setAttemptId}/answers|}" method="post">
          <input type="hidden" name="problemId" th:value="${problem['problemId']}">
          <input type="hidden" name="index" th:value="${currentIndex}">

          <div th:if="${problem['problemType'] == 'MULTIPLE_CHOICE'}">
            <div th:each="choice : ${problem['choices']}">
              <label>
                <input type="radio"
                       name="submittedAnswer"
                       th:value="${choice['choiceLabel']}"
                       required>
                <span th:text="${choice['choiceLabel']}">A</span>
                <span th:text="${choice['choiceText']}">보기 내용</span>
              </label>
            </div>
          </div>

          <div th:if="${problem['problemType'] == 'FILL_BLANK'}">
            <input type="text"
                   name="submittedAnswer"
                   placeholder="정답을 입력하세요."
                   required>
          </div>

          <div th:if="${problem['problemType'] == 'SHORT_ANSWER'}">
            <textarea name="submittedAnswer"
                      placeholder="답안을 입력하세요."
                      required></textarea>
          </div>

          <div th:if="${problem['problemType'] != 'MULTIPLE_CHOICE'
                and problem['problemType'] != 'FILL_BLANK'
                and problem['problemType'] != 'SHORT_ANSWER'}">
            <input type="text"
                   name="submittedAnswer"
                   placeholder="답안을 입력하세요."
                   required>
          </div>

          <section class="practice-footer">
            <button type="submit">제출</button>
          </section>
        </form>
      </div>

      <div th:if="${answered and lastResult != null}">
        <section class="practice-result">
          <p th:if="${lastResult.data()['correct']}">정답입니다.</p>
          <p th:if="${!lastResult.data()['correct']}">오답입니다.</p>

          <p>
            제출한 답:
            <strong th:text="${lastResult.data()['submittedAnswer']}">A</strong>
          </p>

          <p th:if="${!lastResult.data()['correct']}">
            정답:
            <strong th:text="${lastResult.data()['correctAnswer']}">B</strong>
          </p>

          <p th:if="${lastResult.data()['explanation'] != null and lastResult.data()['explanation'] != ''}">
            해설:
            <span th:text="${lastResult.data()['explanation']}">해설 내용</span>
          </p>
        </section>

        <section class="practice-footer">
          <form th:if="${!isLastProblem}"
                th:action="@{|/learning/practice/problems/${nextProblemId}|}"
                method="get">
            <input type="hidden" name="setAttemptId" th:value="${setAttemptId}">
            <input type="hidden" name="index" th:value="${currentIndex + 1}">
            <button type="submit">다음 문제</button>
          </form>

          <form th:if="${isLastProblem}"
                th:action="@{|/learning/practice/sets/${setAttemptId}/complete|}"
                method="post">
            <button type="submit">결과 보기</button>
          </form>
        </section>
      </div>
    </div>

  </section>
</main>
</body>
</html>
