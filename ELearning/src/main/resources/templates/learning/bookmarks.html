<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>북마크한 이론 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/learning.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell learning-screen">
    <a class="lesson-back-link" th:href="@{/learning}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 6l-6 6 6 6"></path></svg>
      학습 로드맵으로
    </a>

    <section class="page-heading bookmark-heading">
      <span class="eyebrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"></path></svg>
        Learning
      </span>
      <h1>북마크한 이론</h1>
      <p class="page-heading-sub">이론 학습 중 저장해 둔 레슨을 한곳에서 다시 펼쳐 볼 수 있어요.</p>
    </section>

    <section class="panel bookmark-panel" th:if="${bookmarks != null and !bookmarks.items.isEmpty()}">
      <div class="bookmark-count">저장한 이론 <strong th:text="${bookmarks.totalCount}">0</strong>개</div>
      <ul class="bookmark-list">
        <li class="bookmark-item" th:each="item : ${bookmarks.items}"
            th:classappend="${item.levelCode != null ? ' level-' + #strings.toLowerCase(item.levelCode) : ''}">
          <span class="bookmark-ribbon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"></path></svg>
          </span>
          <span class="bookmark-body">
            <span class="bookmark-level" th:text="${item.levelCode}">BRONZE</span>
            <span class="bookmark-title" th:text="${item.lessonTitle}">레슨 제목</span>
            <span class="bookmark-node" th:if="${item.nodeTitle != null}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="7"></circle><ellipse cx="12" cy="12" rx="11" ry="4" transform="rotate(-22 12 12)"></ellipse></svg>
              <span th:text="${item.nodeTitle}">행성</span>
            </span>
          </span>
          <a class="button primary bookmark-cta"
             th:href="@{/learning/lessons/{id}(id=${item.lessonId})}">이어보기</a>
        </li>
      </ul>
    </section>

    <section class="panel bookmark-empty-panel" th:if="${bookmarks == null or bookmarks.items.isEmpty()}">
      <span class="empty-illo" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"></path></svg>
      </span>
      <p class="empty-title">아직 북마크한 이론이 없어요</p>
      <p class="empty-sub">이론 학습 화면에서 리본 아이콘을 누르면 저장되어 여기 모여요.</p>
      <a class="button primary" th:href="@{/learning}">학습 로드맵으로 가기</a>
    </section>
  </main>
</body>
</html>
