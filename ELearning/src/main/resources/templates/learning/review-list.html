<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오답 목록 | Knowva</title>

  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/learning.css}">

  <script defer th:src="@{/js/common/theme.js}"></script>

  <!-- 추가: review 전용 css -->
  <link rel="stylesheet" th:href="@{/css/screens/review.css}">
</head>

<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page-shell learning-screen">

  <section class="practice-header">
    <p class="practice-eyebrow">Review</p>

    <h1 th:text="${lesson != null ? lesson.title : view.title()}">오답 목록</h1>

    <div class="lesson-context" th:if="${node != null}">
    <span class="lesson-context-level"
          th:classappend="${'level-' + #strings.toLowerCase(node.levelCode)}"
          th:text="${node.levelCode}">
      LEVEL
    </span>
      <span class="lesson-context-node" th:text="${node.title}">
      단원
    </span>
    </div>

    <p th:if="${lesson == null and node == null}">
      다시 확인이 필요한 문제들만 모았어요!
    </p>
  </section>

  <section class="practice-body">
    <div class="practice-footer">
      <a th:href="@{/learning}">학습 메인으로</a>
      <a th:href="@{/learning/review}">오답 요약 보기</a>
    </div>

    <div th:if="${#lists.isEmpty(view.attributes()['wrongAnswers'])}">
      <!-- 수정: 빈 상태 문구 스타일링용 class 추가 -->
      <p class="review-empty">아직 저장된 오답이 없습니다.</p>
    </div>

    <div th:if="${!#lists.isEmpty(view.attributes()['wrongAnswers'])}" class="review-grid-shell">
      <div class="review-grid">
        <article class="review-list-item"
                 th:each="item : ${view.attributes()['wrongAnswers']}">
          <h2 th:text="${item['question']}">문제 내용</h2>

          <p th:if="${item.lessonId != null}">
            레슨 ID: <span th:text="${item.lessonId}">0</span>
          </p>

          <p>
            문제 ID:
            <span th:text="${item['problemId']}">1</span>
          </p>



          <p>
            오답 횟수:
            <span th:text="${item['wrongCount']}">1</span>
          </p>

          <p>
            상태:
            <!-- 수정: 상태 스타일링용 class 추가 -->
            <span class="review-status"
                  th:classappend="${item['reviewStatus'] == 'SOLVED'} ? ' is-solved' : ' is-pending'"
                  th:text="${item['reviewStatus']}">PENDING</span>
          </p>

          <a th:href="@{|/learning/review/${item['wrongAnswerId']}|}">상세 보기</a>
        </article>
        <hr>
      </div>
    </div>
  </section>
</main>
</body>
</html>
