<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이론 학습 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/learning.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell learning-screen lesson-reading">
    <a class="lesson-back-link" th:href="${lesson != null ? '/learning/nodes/' + lesson.nodeId + '/lessons' : '/learning'}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 6l-6 6 6 6"></path></svg>
      <span th:text="${lesson != null ? '레슨 목록으로' : '학습 로드맵으로'}">레슨 목록으로</span>
    </a>
    <section class="page-heading">
      <span class="eyebrow">이론 학습</span>
      <h1 th:text="${lesson != null ? lesson.title : '이론 학습'}">이론 학습</h1>

      <!-- 읽는 위치 맥락: 레벨 · 단원(행성) · 레슨 순번 -->
      <div class="lesson-context" th:if="${lesson != null}">
        <span class="lesson-context-level" th:if="${node != null}"
              th:classappend="${'level-' + #strings.toLowerCase(node.levelCode)}"
              th:text="${node.levelCode}">BRONZE</span>
        <span class="lesson-context-node" th:if="${node != null}" th:text="${node.title}">단원</span>
        <span class="lesson-context-step" th:if="${lessonIndex != null}">
          레슨 <strong th:text="${lessonIndex}">1</strong> / <span th:text="${lessonTotal}">10</span>
        </span>
      </div>
    </section>

    <!-- 이론 완료(LEARN-005) 후 redirect flash 메시지 -->
    <p class="flash-message" th:if="${message != null}" th:text="${message}">처리되었습니다.</p>

    <section class="panel" th:if="${lesson != null}">
      <div class="lesson-head">
        <p class="lesson-summary" th:if="${lesson.summary != null}" th:text="${lesson.summary}">요약</p>
        <span th:if="${lessonCompleted}" class="lesson-status-chip">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12l5 5L20 6"></path></svg>
          이론 완료됨
        </span>
      </div>
      <hr/>
      <textarea hidden
                data-community-markdown-source
                th:data-target="${'#lesson-content-' + lesson.lessonId}"
                th:text="${lesson.content}"></textarea>
      <div class="lesson-content"
           th:id="${'lesson-content-' + lesson.lessonId}">
        <p th:text="${lesson.content}">본문</p>
      </div>
      <pre class="lesson-example-code"
           th:if="${lesson.exampleCode != null and !#strings.contains(lesson.content, '```')}"><code th:text="${lesson.exampleCode}">예시 코드</code></pre>

      <!--
        액션 한 줄(버튼 높이 통일): (미완) 이론 완료 → 문제 풀이 → 북마크 / (완료) 문제 풀이(primary) → 북마크.
        문제 풀이 = /learning/practice(practice 도메인). 이론만 하면 단원 미완(50%)이라 여기서 이어짐.
      -->
      <div class="lesson-actions">
        <form th:unless="${lessonCompleted}" th:action="@{/learning/lessons/{id}/complete(id=${lesson.lessonId})}" method="post">
          <button type="submit" class="button primary">이론 완료</button>
        </form>
        <a class="button"
           th:classappend="${lessonCompleted} ? ' primary' : ''"
           th:href="@{/learning/practice(nodeId=${lesson.nodeId}, lessonId=${lesson.lessonId})}">
        문제 풀이 하러 가기
          <svg class="cta-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
        </a>
        <form th:action="@{/learning/lessons/{id}/bookmark(id=${lesson.lessonId})}" method="post">
          <!-- 별표 대신 북마크 리본 아이콘: 채움(fill)=북마크됨 / 외곽선(none)=미북마크 -->
          <button type="submit" class="button bookmark-toggle" th:classappend="${bookmarked} ? ' is-bookmarked' : ''"
                  th:attr="aria-label=${bookmarked} ? '북마크 해제' : '북마크 추가'">
            <svg class="bookmark-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"
                 th:attr="fill=${bookmarked} ? 'currentColor' : 'none'"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"></path>
            </svg>
            <span th:text="${bookmarked} ? '북마크됨' : '북마크'">북마크</span>
          </button>
        </form>

        <!-- 같은 행성의 다음 레슨으로 바로 이어 읽기 -->
        <a class="lesson-next-link" th:if="${nextLessonId != null}"
           th:href="@{/learning/lessons/{id}(id=${nextLessonId})}">
          다음 레슨
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
        </a>
      </div>
    </section>

    <section class="panel bookmark-empty-panel" th:if="${lesson == null}">
      <span class="empty-illo" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      </span>
      <p class="empty-title">이론을 찾을 수 없어요</p>
      <p class="empty-sub">요청한 레슨이 없거나 아직 준비 중이에요. 학습 로드맵에서 다시 선택해 주세요.</p>
      <a class="button primary" th:href="@{/learning}">학습 로드맵으로 가기</a>
    </section>
  </main>
  <script type="module" th:src="@{/js/vendor/community-markdown-viewer.bundle.js}"></script>
</body>
</html>
