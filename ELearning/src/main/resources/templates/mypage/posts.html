<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${view.title()} + ' | Knowva'">작성한 글 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}"><link rel="stylesheet" th:href="@{/css/common/reset.css}"><link rel="stylesheet" th:href="@{/css/common/base.css}"><link rel="stylesheet" th:href="@{/css/common/components.css}"><link rel="stylesheet" th:href="@{/css/common/themes.css}"><link rel="stylesheet" th:href="@{/css/screens/mypage.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell mypage-screen community-activity-page">
    <section class="mypage-page">
      <header class="mypage-heading community-activity-heading">
        <div class="community-activity-title-row">
          <a class="learning-status-back" th:href="@{/mypage}" aria-label="마이페이지로 이동">←</a>
          <div>
            <h1 th:text="${view.title()}">작성한 글</h1>
            <p th:text="${view.description()}">내가 커뮤니티에 작성한 글을 확인하세요.</p>
          </div>
        </div>
      </header>

      <form class="community-search-form" method="get" th:action="${view.path()}">
        <input type="hidden" name="category" th:value="${view.selectedCategory()}">
        <input class="community-search-field" type="search" name="q" th:value="${view.query()}" placeholder="제목 또는 내용을 검색하세요." autocomplete="off">
        <button class="community-search-button" type="submit">검색</button>
      </form>

      <nav class="learning-filter-tabs" aria-label="커뮤니티 카테고리 필터">
        <a th:each="filter : ${view.filters()}"
           th:href="${filter.url()}"
           th:classappend="${filter.active()} ? 'is-active' : ''"
           th:text="${filter.label()}">전체</a>
      </nav>

      <section class="community-activity-post-list" aria-label="커뮤니티 활동 목록">
        <article class="community-post-card" th:each="item : ${view.items()}" th:classappend="${view.type() == 'POSTS'} ? ' written' : ''">
          <span class="community-post-category" th:text="${item.categoryLabel()}">질문</span>
          <div class="community-post-body">
            <h2 th:text="${item.title()}">Python 리스트 질문 있어요</h2>
            <p th:if="${!#strings.isEmpty(item.excerpt())}" th:text="${item.excerpt()}">게시글 요약</p>
            <span class="community-post-meta" th:if="${view.type() != 'POSTS'}" th:text="|${item.boardLabel()} - ${item.authorLabel()} - 좋아요 ${item.likeCount()} - 댓글 ${item.commentCount()}|">Java 질문 게시판 - 작성자 - 좋아요 12 - 댓글 2</span>
            <span class="community-post-meta" th:if="${view.type() == 'POSTS'}" th:text="|${item.authorLabel()} ${item.dateLabel()} - 좋아요 ${item.likeCount()} - 댓글 ${item.commentCount()}|">작성일 2026.06.10 - 좋아요 5 - 댓글 4</span>
          </div>
          <time class="community-post-date" th:if="${view.type() != 'POSTS'}" th:text="${item.dateLabel()}">2026.06.14</time>
          <span class="activity-row-marker" th:if="${view.type() != 'POSTS'}" th:classappend="| ${view.markerClass()}|" aria-hidden="true"></span>
          <a class="community-row-button" th:if="${view.type() == 'POSTS'}" th:href="${item.detailUrl()}">보기</a>
        </article>

        <article class="learning-empty" th:if="${view.empty()}">
          <strong>표시할 게시글이 없습니다.</strong>
          <p>검색어나 필터를 바꾸면 다른 게시글을 확인할 수 있어요.</p>
        </article>
      </section>

      <div class="community-list-actions">
        <a class="mini-button" th:href="${view.communityUrl()}">커뮤니티에서 보기</a>
      </div>

      <nav class="learning-pagination community-activity-pagination" aria-label="커뮤니티 활동 페이지">
        <a th:classappend="${view.first()} ? 'is-disabled' : ''" th:href="${view.previousUrl()}">이전</a>
        <a th:each="pageItem : ${view.pageNumbers()}"
           th:href="${pageItem.url()}"
           th:classappend="${pageItem.active()} ? 'is-active' : ''"
           th:text="${pageItem.label()}">1</a>
        <a th:classappend="${view.last()} ? 'is-disabled' : ''" th:href="${view.nextUrl()}">다음 &gt;</a>
      </nav>
    </section>
  </main>
</body>
</html>
