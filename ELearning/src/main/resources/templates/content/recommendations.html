<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>콘텐츠 추천 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/content.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="content-recommend-screen">
    <div class="content-recommend-shell">
      <a class="button content-back-button" th:href="@{/community(subjectId=${activeSubjectId})}" aria-label="커뮤니티로 돌아가기" title="커뮤니티로 돌아가기">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19-7-7 7-7"></path>
          <path d="M19 12H5"></path>
        </svg>
        <span>커뮤니티로 돌아가기</span>
      </a>

      <section class="content-recommend-layout" aria-label="콘텐츠 추천">
        <aside class="content-subject-sidebar" aria-label="과목 선택">
          <nav class="content-subject-nav">
            <h2>과목 선택</h2>

          <a class="content-subject-card"
             th:classappend="${activeSubjectId == 1} ? ' is-active'"
             th:href="@{/content/recommendations(subjectId=1)}">
            <span class="content-subject-card-visual">
              <img th:src="@{/assets/images/icons/subject/java.png}" alt="" loading="lazy">
            </span>
            <span class="content-subject-card-copy">
              <strong>Java</strong>
              <span>영상 · 문서 · 학습 루틴</span>
            </span>
          </a>

          <a class="content-subject-card"
             th:classappend="${activeSubjectId == 4} ? ' is-active'"
             th:href="@{/content/recommendations(subjectId=4)}">
            <span class="content-subject-card-visual">
              <img th:src="@{/assets/images/icons/subject/sql.png}" alt="" loading="lazy">
            </span>
            <span class="content-subject-card-copy">
              <strong>SQL</strong>
              <span>영상 · 문서 · 학습 루틴</span>
            </span>
          </a>

          <a class="content-subject-card"
             th:classappend="${activeSubjectId == 3} ? ' is-active'"
             th:href="@{/content/recommendations(subjectId=3)}">
            <span class="content-subject-card-visual">
              <img th:src="@{/assets/images/icons/subject/web.png}" alt="" loading="lazy">
            </span>
            <span class="content-subject-card-copy">
              <strong>HTML/CSS/JS</strong>
              <span>영상 · 문서 · 학습 루틴</span>
            </span>
          </a>

          <a class="content-subject-card"
             th:classappend="${activeSubjectId == 2} ? ' is-active'"
             th:href="@{/content/recommendations(subjectId=2)}">
            <span class="content-subject-card-visual">
              <img th:src="@{/assets/images/icons/subject/python.png}" alt="" loading="lazy">
            </span>
            <span class="content-subject-card-copy">
              <strong>Python</strong>
              <span>영상 · 문서 · 학습 루틴</span>
            </span>
          </a>
          </nav>
        </aside>

        <section class="content-main-panel">
          <header class="content-page-heading">
            <div>
              <span class="eyebrow">Content</span>
              <h1 th:text="|${subjectLabel} 추천 콘텐츠|">Java 추천 콘텐츠</h1>
            </div>
          </header>

          <section class="content-card-grid" aria-label="추천 콘텐츠 목록">
            <article class="content-recommend-card content-video-card">
              <h2>영상 추천</h2>
              <ul>
                <li th:each="item : ${videoView.recommendations}">
                  <a class="content-video-link" th:href="${item.url}" target="_blank" rel="noopener">
                    <span class="content-video-thumbnail">
                      <img th:if="${item.youtubeThumbnailUrl() != null}"
                           th:src="${item.youtubeThumbnailUrl()}"
                           alt=""
                           th:alt="${item.title}"
                           loading="lazy">
                      <span class="content-video-placeholder" th:unless="${item.youtubeThumbnailUrl() != null}"></span>
                      <span class="content-video-play" aria-hidden="true"></span>
                    </span>
                    <span class="content-video-copy">
                      <strong th:text="${item.title}">자바지향 기초</strong>
                      <small th:text="${item.recommendationSlot != null ? item.recommendationSlot : '추천 영상'}">추천 영상</small>
                    </span>
                  </a>
                </li>
              </ul>
            </article>

            <article class="content-recommend-card content-practice-card">
              <h2>실습 자료</h2>
              <ul>
                <li th:each="item : ${articleView.recommendations}">
                  <a th:href="${item.url}" target="_blank" rel="noopener">
                    <i></i>
                    <strong th:text="${item.title}">수업 실습 자료</strong>
                    <small th:text="${item.recommendationSlot != null ? item.recommendationSlot : '실습 자료'}">실습 자료</small>
                  </a>
                </li>
              </ul>
            </article>
          </section>
        </section>
      </section>
    </div>
  </main>
</body>
</html>
