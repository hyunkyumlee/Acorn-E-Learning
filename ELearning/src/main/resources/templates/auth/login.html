<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/auth.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body class="auth-bg">
<div class="bg-fx" aria-hidden="true">
  <span class="blob blob-1"></span>
  <span class="blob blob-2"></span>
  <span class="blob blob-3"></span>
</div>
<button class="header-icon theme-toggle theme-toggle-floating" type="button" data-theme-toggle aria-pressed="false" aria-label="다크모드로 전환">
  <span class="theme-symbol" aria-hidden="true">
    <svg class="theme-symbol-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
      <title>다크모드</title>
      <path d="M20.4 14.7A7.7 7.7 0 0 1 9.3 3.6 8.7 8.7 0 1 0 20.4 14.7Z"></path>
      <path d="M16.7 3.8h.01M19.4 6.7h.01"></path>
    </svg>
    <svg class="theme-symbol-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
      <title>라이트모드</title>
      <circle cx="12" cy="12" r="4.2"></circle>
      <path d="M12 2.5v2.1M12 19.4v2.1M4.6 4.6l1.5 1.5M17.9 17.9l1.5 1.5M2.5 12h2.1M19.4 12h2.1M4.6 19.4l1.5-1.5M17.9 6.1l1.5-1.5"></path>
    </svg>
  </span>
</button>
<!-- [추가] 테스트 계정 박스 토글 버튼 (다크모드 버튼 아래) -->
<button class="header-icon test-accounts-toggle" type="button" data-test-accounts-toggle
        aria-controls="testAccounts" aria-expanded="false" aria-label="테스트 계정 보기">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <title>테스트 계정</title>
    <circle cx="12" cy="8" r="4"></circle>
    <path d="M4 20c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"></path>
  </svg>
</button>
<main class="page-shell auth-screen login-screen">
  <section class="auth-grid">
    <div class="form-panel">
      <h3>로그인</h3>

      <p class="form-success" th:if="${successMessage}" th:text="${successMessage}">가입 완료 메시지</p>
      <p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}">오류 메시지</p>

      <form th:action="@{/login}" th:object="${loginForm}" method="post">
        <input type="hidden" name="redirect" th:value="${redirect}" th:if="${redirect}">
        <label class="field">
          <span>이메일</span>
          <input type="email" th:field="*{email}" placeholder="learner@knowva.local" autocomplete="email">
        </label>
        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

        <label class="field">
          <span>비밀번호</span>
          <input type="password" th:field="*{password}" placeholder="비밀번호" autocomplete="current-password">
        </label>
        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

        <label class="checkbox">
          <input type="checkbox" th:field="*{rememberMe}"> 로그인 상태 유지
        </label>

        <button class="button primary" type="submit">로그인</button>
      </form>

      <div class="social-login-row" aria-label="소셜 로그인">
        <!-- [수정] 텍스트 버튼 → 로고만 보이는 원형 버튼. 로고는 assets/images/icons/social 에 저장 -->
        <a class="social-login-icon google" th:href="@{/oauth/google}" aria-label="Google로 계속" title="Google로 계속">
          <img th:src="@{/assets/images/icons/social/google.svg}" alt="Google" width="26" height="26">
        </a>
        <a class="social-login-icon github" th:href="@{/oauth/github}" aria-label="GitHub로 계속" title="GitHub로 계속">
          <img th:src="@{/assets/images/icons/social/github.svg}" alt="GitHub" width="26" height="26">
        </a>
      </div>

      <p class="form-foot">계정이 없으신가요? <a th:href="@{/signup}">회원가입</a></p>
    </div>

    <!-- 로컬/데모용 테스트 계정: 칩을 클릭하면 클립보드로 복사됨 (sample data 기준) -->
    <aside id="testAccounts" class="login-test-accounts" aria-label="로컬 테스트 계정" hidden>
      <div class="test-accounts-head">
        <strong>테스트 계정</strong>
        <span>로컬/데모용 · 클릭하면 복사돼요</span>
      </div>
      <ul class="test-accounts-list">
        <li>
          <span class="acc-tag acc-admin">관리자</span>
          <button type="button" class="copy-chip" data-copy="admin@knowva.local">admin@knowva.local</button>
          <button type="button" class="copy-chip" data-copy="Knowva1234!">Knowva1234!</button>
        </li>
        <li>
          <span class="acc-tag">일반</span>
          <button type="button" class="copy-chip" data-copy="learner@knowva.local">learner@knowva.local</button>
          <button type="button" class="copy-chip" data-copy="Knowva1234!">Knowva1234!</button>
        </li>
        <li>
          <span class="acc-tag acc-premium">프리미엄</span>
          <button type="button" class="copy-chip" data-copy="premium@knowva.local">premium@knowva.local</button>
          <button type="button" class="copy-chip" data-copy="Knowva1234!">Knowva1234!</button>
        </li>
      </ul>
    </aside>
  </section>
</main>

<!-- 테스트 계정 칩 클립보드 복사 (로컬 개발 편의) -->
<script th:inline="none">
  document.querySelectorAll('.login-test-accounts .copy-chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      var text = chip.dataset.copy;
      navigator.clipboard.writeText(text).then(function () {
        chip.classList.add('is-copied');
        chip.textContent = '복사됨!';
        setTimeout(function () {
          chip.textContent = text;
          chip.classList.remove('is-copied');
        }, 900);
      });
    });
  });
</script>

<!-- [추가] 테스트 계정 박스 토글 (아이콘 버튼 클릭 시 표시/숨김) -->
<script th:inline="none">
  (function () {
    var btn = document.querySelector('[data-test-accounts-toggle]');
    var box = document.getElementById('testAccounts');
    if (!btn || !box) return;
    btn.addEventListener('click', function () {
      var willShow = box.hasAttribute('hidden');
      if (willShow) box.removeAttribute('hidden');
      else box.setAttribute('hidden', '');
      btn.setAttribute('aria-expanded', String(willShow));
      btn.classList.toggle('is-active', willShow);
    });
  })();
</script>
</body>
</html>
