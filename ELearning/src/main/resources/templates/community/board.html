<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글 목록 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/community.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell community-screen community-listing-screen">
    <section class="community-listing-layout" aria-label="게시글 목록">
      <aside class="community-listing-left-rail">
        <div th:replace="~{community/fragments/sidebar :: sidebar(${activeSubjectId}, ${activeBoardType}, ${profileName}, ${profileEmail}, ${profileImageUrl}, ${profileSummary}, false)}"></div>
        <a class="community-content-recommend-link" th:href="@{/content/recommendations(subjectId=${activeSubjectId})}">
          <span class="community-content-recommend-copy">
            <strong class="community-content-recommend-title">Knowva의 과목 콘텐츠 추천</strong>
            <span class="community-video-icon" aria-hidden="true">
              <span class="community-video-body"><span class="community-video-play"></span></span>
            </span>
            <span class="community-video-caption"><i aria-hidden="true"></i> 동영상 재생</span>
          </span>
        </a>
      </aside>

      <section class="community-listing-main">
        <div class="community-listing-filter-row">
          <nav class="community-listing-tabs" aria-label="게시판 탭">
            <a th:classappend="${activeBoardType == '' and condition.sort != 'hot'} ? ' is-active'"
               th:attr="aria-current=${activeBoardType == '' and condition.sort != 'hot'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},keyword=${condition.keyword},sort='latest')}">전체</a>
            <a th:classappend="${activeBoardType == '' and condition.sort == 'hot'} ? ' is-active'"
               th:attr="aria-current=${activeBoardType == '' and condition.sort == 'hot'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},keyword=${condition.keyword},sort='hot',period='week')}">인기글</a>
            <a th:classappend="${activeBoardType == 'FREE'} ? ' is-active'"
               th:attr="aria-current=${activeBoardType == 'FREE'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType='FREE',keyword=${condition.keyword},sort='latest')}">자유</a>
            <a th:classappend="${activeBoardType == 'QUESTION'} ? ' is-active'"
               th:attr="aria-current=${activeBoardType == 'QUESTION'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType='QUESTION',keyword=${condition.keyword},sort='latest')}">질문</a>
            <a th:classappend="${activeBoardType == 'STUDY_LOG'} ? ' is-active'"
               th:attr="aria-current=${activeBoardType == 'STUDY_LOG'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType='STUDY_LOG',keyword=${condition.keyword},sort='latest')}">공부 일지</a>
          </nav>
          <a class="button primary community-write-button" th:href="@{/community/write}">글쓰기</a>
        </div>

        <section class="panel community-listing-panel">
          <div class="community-listing-heading">
            <h1>게시글 목록</h1>
            <span th:text="${view.total + '개'}">0개</span>
          </div>

          <section class="community-notice-strip" th:if="${notices != null and !#lists.isEmpty(notices)}" aria-label="공지사항">
            <div class="community-notice-strip-heading">
              <span>NOTICE</span>
              <strong>공지사항</strong>
            </div>
            <ul>
              <li th:each="notice : ${notices}">
                <a class="community-notice-title"
                   th:href="@{/community/notices/{id}(id=${notice.noticeId},subjectId=${condition.subjectId})}"
                   th:text="${notice.title}">공지사항 제목</a>
                <small>
                  <span th:text="${notice.writerNickname}">관리자</span>
                  <span th:if="${notice.publishedAt != null}" th:text="${#temporals.format(notice.publishedAt, 'yyyy.MM.dd')}">2026.07.16</span>
                </small>
              </li>
            </ul>
          </section>

          <form method="get" th:action="@{/community/board}" class="community-search-form">
            <input type="hidden" name="subjectId" th:value="${condition.subjectId}">
            <input type="hidden" name="boardType" th:value="${condition.boardType}">
            <input type="hidden" name="sort" th:value="${condition.sort}">
            <input type="hidden" name="period" th:value="${condition.period}">
            <input name="keyword" th:value="${condition.keyword}" placeholder="검색어를 입력하세요" aria-label="게시글 검색">
            <button class="button" type="submit">검색</button>
          </form>

          <nav class="community-sort-tabs" aria-label="게시글 정렬">
            <a th:classappend="${condition.sort == 'latest'} ? ' is-active'"
               th:attr="aria-current=${condition.sort == 'latest'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType=${condition.boardType},keyword=${condition.keyword},sort='latest')}">최신순</a>
            <a th:classappend="${condition.sort == 'likes'} ? ' is-active'"
               th:attr="aria-current=${condition.sort == 'likes'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType=${condition.boardType},keyword=${condition.keyword},sort='likes')}">공감순</a>
            <a th:classappend="${condition.sort == 'views'} ? ' is-active'"
               th:attr="aria-current=${condition.sort == 'views'} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType=${condition.boardType},keyword=${condition.keyword},sort='views')}">조회수 순</a>
          </nav>

          <ul class="community-post-list community-listing-post-list">
            <li th:each="post : ${view.posts}">
              <div class="community-post-title-row">
                <a th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">게시글 제목</a>
                <span class="community-popular-badge" th:if="${post.popular}" th:text="${post.popularLabel}">주간 인기</span>
              </div>
              <span>
                작성자: <b th:text="${writerNicknames.get(post.writerId)}">nova_learner</b>
                · <b th:text="${post.boardType == 'FREE' ? '자유' : (post.boardType == 'QUESTION' ? '질문' : (post.boardType == 'STUDY_LOG' ? '공부 일지' : post.boardType))}">자유</b>
                · 조회수 <b th:text="${post.viewCount}">0</b>
                · 댓글 <b th:text="${post.commentCount}">0</b>
                · 좋아요 <b th:text="${post.likeCount}">0</b>
              </span>
            </li>
            <li class="community-empty" th:if="${#lists.isEmpty(view.posts)}">조건에 맞는 게시글이 없어.</li>
          </ul>

          <nav class="community-pagination" aria-label="게시글 페이지" th:if="${view.totalPages > 1}">
            <a th:if="${view.page > 1}"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType=${condition.boardType},keyword=${condition.keyword},sort=${condition.sort},period=${condition.period},page=${view.page - 1})}">이전</a>
            <span th:if="${view.page <= 1}" aria-hidden="true">이전</span>
            <a th:each="pageNumber : ${#numbers.sequence(pageStart, pageEnd)}"
               th:classappend="${pageNumber == view.page} ? ' is-active'"
               th:attr="aria-current=${pageNumber == view.page} ? 'page' : null"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType=${condition.boardType},keyword=${condition.keyword},sort=${condition.sort},period=${condition.period},page=${pageNumber})}"
               th:text="${pageNumber}">1</a>
            <a th:if="${view.page < view.totalPages}"
               th:href="@{/community/board(subjectId=${condition.subjectId},boardType=${condition.boardType},keyword=${condition.keyword},sort=${condition.sort},period=${condition.period},page=${view.page + 1})}">다음</a>
            <span th:if="${view.page >= view.totalPages}" aria-hidden="true">다음</span>
          </nav>
        </section>
      </section>
    </section>
  </main>
</body>
</html>
