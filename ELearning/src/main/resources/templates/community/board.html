<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>커뮤니티 게시판 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/community.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell community-screen community-board-screen">
    <section class="community-board-layout" aria-label="커뮤니티 게시판">
      <div th:replace="~{community/fragments/sidebar :: sidebar(${activeSubjectId}, ${activeBoardType}, ${profileName}, ${profileEmail}, ${profileSummary})}"></div>

      <section class="panel community-panel community-board-main">
        <div class="community-board-toolbar">
          <form method="get" th:action="@{/community/board}" class="community-search-form">
            <input type="hidden" name="subjectId" th:value="${condition.subjectId}">
            <input type="hidden" name="boardType" th:value="${condition.boardType}">
            <input type="hidden" name="sort" th:value="${condition.sort}">
            <input name="keyword" th:value="${condition.keyword}" placeholder="검색어를 입력하세요" aria-label="게시글 검색">
            <button class="button" type="submit">검색</button>
          </form>
          <a class="button primary community-write-button" th:href="@{/community/write}">글쓰기</a>
        </div>

        <div class="community-board-tabs" aria-label="게시판 필터">
          <a th:classappend="${activeBoardType == ''} ? ' is-active'"
             th:href="@{/community/board(subjectId=${condition.subjectId})}">전체</a>
          <a th:classappend="${activeBoardType == 'FREE'} ? ' is-active'"
             th:href="@{/community/board(subjectId=${condition.subjectId},boardType='FREE')}">자유</a>
          <a th:classappend="${activeBoardType == 'QUESTION'} ? ' is-active'"
             th:href="@{/community/board(subjectId=${condition.subjectId},boardType='QUESTION')}">질문</a>
          <a th:classappend="${activeBoardType == 'STUDY_LOG'} ? ' is-active'"
             th:href="@{/community/board(subjectId=${condition.subjectId},boardType='STUDY_LOG')}">공부 일지</a>
        </div>

        <section class="community-feed-card">
          <div class="community-feed-heading">
            <h2>게시글 목록</h2>
            <p>학습 중 떠오른 이야기와 공부 기록을 자유롭게 나눠.</p>
          </div>

          <ul class="community-post-list">
            <li th:each="post : ${view.posts}">
              <a th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">게시글 제목</a>
              <span>
                작성자 <b th:text="${post.writerId}">1</b>
                · 댓글 <b th:text="${post.commentCount}">0</b>
                · 좋아요 <b th:text="${post.likeCount}">0</b>
              </span>
            </li>
            <li th:if="${#lists.isEmpty(view.posts)}" class="community-empty">게시글이 없어.</li>
          </ul>
        </section>
      </section>

      <div class="community-side-rail">
        <aside class="panel community-panel community-hot-panel" aria-label="HOT 게시물">
          <div class="community-hot-heading">
            <span class="community-hot-tag">HOT</span>
          </div>
          <ol class="community-hot-list">
            <li th:each="post : ${hotView.posts}">
              <a class="community-hot-title" th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">게시글 제목</a>
            </li>
            <li th:if="${#lists.isEmpty(hotView.posts)}" class="community-empty">HOT 게시물이 없어.</li>
          </ol>
        </aside>

        <a class="community-content-recommend-link" th:href="@{/content/recommendations}">
          <strong>Knowva의 과목 콘텐츠 추천 영상</strong>
          <span><i aria-hidden="true"></i> 동영상 재생</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
