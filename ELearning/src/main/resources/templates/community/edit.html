<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글 수정 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/community.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell community-screen">
    <section class="page-heading">
      <span class="eyebrow">Community</span>
      <h1>게시글 수정</h1>
    </section>

    <div class="community-content-layout">
      <aside th:replace="~{community/fragments/sidebar :: sidebar(${activeSubjectId}, ${activeBoardType}, ${profileName}, ${profileEmail}, ${profileImageUrl}, ${profileSummary}, false)}"></aside>

      <section class="panel community-panel community-form-panel">
        <div class="community-panel-header">
          <div>
            <h2>글 수정</h2>
          </div>
          <a class="button" th:href="@{/community/posts/{id}(id=${view.post.postId})}">상세</a>
        </div>

        <form method="post" th:action="@{/community/posts/{id}/update(id=${view.post.postId})}" th:object="${form}" enctype="multipart/form-data" class="community-form">
          <div class="community-form-grid">
            <label class="wide">제목
              <input th:field="*{title}" maxlength="200" required>
            </label>
            <label>언어
              <select th:field="*{subjectId}" required>
                <option value="1">Java</option>
                <option value="4">SQL</option>
                <option value="3">HTML/CSS/JS</option>
                <option value="2">Python</option>
              </select>
            </label>
            <label>게시판
              <select th:field="*{boardType}" required>
                <option value="FREE">자유</option>
                <option value="QUESTION">질문</option>
                <option value="STUDY_LOG">공부 일지</option>
              </select>
            </label>
            <label class="wide">내용
              <textarea th:field="*{content}" rows="12" required></textarea>
            </label>
            <label class="wide">첨부 파일 추가
              <input th:field="*{files}" type="file" multiple>
            </label>
            <div class="wide community-edit-attachments" th:if="${!#lists.isEmpty(view.attachments)}">
              <h3>현재 첨부 이미지</h3>
              <div class="community-edit-attachment-grid">
                <label class="community-edit-attachment-card" th:each="file : ${view.attachments}">
                  <span class="community-edit-attachment-preview" th:if="${file.image}">
                    <img th:src="${file.fileUrl}" th:alt="${file.originalName}">
                  </span>
                  <span class="community-edit-attachment-preview file" th:unless="${file.image}">
                    <span th:text="${file.originalName}">file.txt</span>
                  </span>
                  <span class="community-edit-attachment-control">
                    <input type="checkbox" th:field="*{deleteAttachmentIds}" th:value="${file.attachmentId}">
                    <span>삭제</span>
                  </span>
                </label>
              </div>
            </div>
          </div>
          <div class="community-actions right">
            <a class="button" th:href="@{/community/posts/{id}(id=${view.post.postId})}">취소</a>
            <button class="button primary" type="submit">저장</button>
          </div>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
