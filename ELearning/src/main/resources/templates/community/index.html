<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>커뮤니티 홈 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/community.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell community-screen">
    <section class="page-heading">
      <span class="eyebrow">Community</span>
      <h1>커뮤니티 홈</h1>
      <p>최근 커뮤니티 활동을 빠르게 확인할 수 있어.</p>
    </section>

    <section class="panel community-panel">
      <div class="community-panel-header">
        <div>
          <h2>최근 커뮤니티 글</h2>
          <p>최신 게시글을 확인하고 목록으로 이동할 수 있어.</p>
        </div>
        <a class="button primary" th:href="@{/community/board}">전체 보기</a>
      </div>
      <ul class="community-list">
        <li th:each="post : ${view.posts}">
          <a th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">게시글</a>
          <span class="community-badge" th:text="${post.boardType == 'FREE' ? '자유' : (post.boardType == 'QUESTION' ? '질문' : (post.boardType == 'STUDY_LOG' ? '공부 일지' : post.boardType))}">자유</span>
        </li>
        <li th:if="${#lists.isEmpty(view.posts)}" class="community-empty">게시글이 없습니다.</li>
      </ul>
    </section>
  </main>
</body>
</html>
