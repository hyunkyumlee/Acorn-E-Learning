<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>커뮤니티 프로필 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/community.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell community-screen">
    <section class="page-heading">
      <span class="eyebrow">Community Profile</span>
      <h1>내 커뮤니티 프로필</h1>
      <p>작성 글, 댓글, 받은 공감, 스크랩 활동을 커뮤니티 DB 기준으로 보여줘.</p>
    </section>

    <section class="community-content-layout" aria-label="커뮤니티 프로필">
      <div th:replace="~{community/fragments/sidebar :: sidebar(${activeSubjectId}, ${activeBoardType}, ${profileName}, ${profileEmail}, ${profileSummary})}"></div>

      <section class="panel community-panel community-profile-panel" th:if="${view != null}">
        <div class="community-panel-header">
          <div>
            <h2 th:text="${profileName}">nova_learner</h2>
            <p>게시판 활동을 자동 집계하는 커뮤니티 전용 프로필이야.</p>
          </div>
          <a class="button" th:href="@{/community/board}">게시판으로</a>
        </div>

        <div class="community-profile-stats">
          <article><span>작성 글</span><strong th:text="${view.postCount()}">0</strong></article>
          <article><span>작성 댓글</span><strong th:text="${view.commentCount()}">0</strong></article>
          <article><span>받은 공감</span><strong th:text="${view.receivedLikeCount()}">0</strong></article>
          <article><span>받은 댓글</span><strong th:text="${view.receivedCommentCount()}">0</strong></article>
          <article><span>좋아요한 글</span><strong th:text="${view.likedCount()}">0</strong></article>
          <article><span>스크랩</span><strong th:text="${view.scrapCount()}">0</strong></article>
        </div>

        <div class="community-profile-grid">
          <section class="community-subsection">
            <h3>내가 쓴 글</h3>
            <ul class="community-list compact community-profile-list">
              <li th:each="post : ${view.myPosts}">
                <a th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">글</a>
                <span class="community-badge" th:text="|공감 ${post.likeCount}|"></span>
              </li>
              <li th:if="${#lists.isEmpty(view.myPosts)}" class="community-empty">작성한 글이 없어.</li>
            </ul>
          </section>
          <section class="community-subsection">
            <h3>내 댓글</h3>
            <ul class="community-list compact community-profile-list">
              <li th:each="comment : ${view.myComments}">
                <a th:href="@{/community/posts/{id}(id=${comment.postId})}" th:text="${comment.content}">댓글</a>
              </li>
              <li th:if="${#lists.isEmpty(view.myComments)}" class="community-empty">작성한 댓글이 없어.</li>
            </ul>
          </section>
          <section class="community-subsection">
            <h3>좋아요한 글</h3>
            <ul class="community-list compact community-profile-list">
              <li th:each="post : ${view.likedPosts}">
                <a th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">글</a>
              </li>
              <li th:if="${#lists.isEmpty(view.likedPosts)}" class="community-empty">좋아요한 글이 없어.</li>
            </ul>
          </section>
          <section class="community-subsection">
            <h3>스크랩한 글</h3>
            <ul class="community-list compact community-profile-list">
              <li th:each="post : ${view.scrapedPosts}">
                <a th:href="@{/community/posts/{id}(id=${post.postId})}" th:text="${post.title}">글</a>
              </li>
              <li th:if="${#lists.isEmpty(view.scrapedPosts)}" class="community-empty">스크랩한 글이 없어.</li>
            </ul>
          </section>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
