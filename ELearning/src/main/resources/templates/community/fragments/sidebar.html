<aside class="panel community-panel community-sidebar"
       th:fragment="sidebar(activeSubjectId, activeBoardType, profileName, profileEmail, profileImageUrl, profileSummary, communityHome)"
       xmlns:th="http://www.thymeleaf.org"
       aria-label="커뮤니티 사이드바">
  <nav class="community-board-nav" aria-label="언어별 게시판">
    <h2>게시판</h2>

    <a class="community-board-card"
       th:classappend="${activeSubjectId == '1'} ? ' is-active'"
       th:attr="aria-current=${activeSubjectId == '1'} ? 'page' : null"
       th:href="${communityHome} ? @{/community(subjectId=1)} : @{/community/board(subjectId=1)}">
      <span class="community-board-card-visual">
        <img th:src="@{/assets/images/icons/subject/java.png}" alt="" loading="lazy">
      </span>
      <span class="community-board-card-copy">
        <strong>Java</strong>
      </span>
    </a>
    <a class="community-board-card"
       th:classappend="${activeSubjectId == '4'} ? ' is-active'"
       th:attr="aria-current=${activeSubjectId == '4'} ? 'page' : null"
       th:href="${communityHome} ? @{/community(subjectId=4)} : @{/community/board(subjectId=4)}">
      <span class="community-board-card-visual">
        <img th:src="@{/assets/images/icons/subject/sql.png}" alt="" loading="lazy">
      </span>
      <span class="community-board-card-copy">
        <strong>SQL</strong>
      </span>
    </a>
    <a class="community-board-card"
       th:classappend="${activeSubjectId == '3'} ? ' is-active'"
       th:attr="aria-current=${activeSubjectId == '3'} ? 'page' : null"
       th:href="${communityHome} ? @{/community(subjectId=3)} : @{/community/board(subjectId=3)}">
      <span class="community-board-card-visual">
        <img th:src="@{/assets/images/icons/subject/web.png}" alt="" loading="lazy">
      </span>
      <span class="community-board-card-copy">
        <strong>HTML/CSS/JS</strong>
      </span>
    </a>
    <a class="community-board-card"
       th:classappend="${activeSubjectId == '2'} ? ' is-active'"
       th:attr="aria-current=${activeSubjectId == '2'} ? 'page' : null"
       th:href="${communityHome} ? @{/community(subjectId=2)} : @{/community/board(subjectId=2)}">
      <span class="community-board-card-visual">
        <img th:src="@{/assets/images/icons/subject/python.png}" alt="" loading="lazy">
      </span>
      <span class="community-board-card-copy">
        <strong>Python</strong>
      </span>
    </a>
  </nav>

  <section class="community-profile-mini" aria-label="커뮤니티 프로필 요약">
    <div class="community-profile-line">
      <span class="community-avatar" th:if="${profileImageUrl == null or #strings.isEmpty(profileImageUrl)}" th:text="${#strings.substring(profileName, 0, 1)}">N</span>
      <img class="community-avatar community-avatar-image" th:if="${profileImageUrl != null and !#strings.isEmpty(profileImageUrl)}" th:src="${profileImageUrl}" alt="" aria-hidden="true">
      <div>
        <strong th:text="${profileName}">nova_learner</strong>
        <small>
          작성 글 <b th:text="${profileSummary != null ? profileSummary.postCount() : 0}">0</b>
          · 스크랩 <b th:text="${profileSummary != null ? profileSummary.scrapCount() : 0}">0</b>
          · 좋아요 <b th:text="${profileSummary != null ? profileSummary.receivedLikeCount() : 0}">0</b>
        </small>
      </div>
    </div>
    <a class="button" th:href="@{/community/profile}">내 커뮤니티 프로필</a>
  </section>
</aside>
