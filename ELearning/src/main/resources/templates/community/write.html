<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글 작성 | Knowva</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/js/vendor/community-editor.bundle.css}">
  <link rel="stylesheet" th:href="@{/css/screens/community.css}">
  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <main class="page-shell community-screen">
    <section class="page-heading">
      <span class="eyebrow">Community</span>
      <h1>게시글 작성</h1>
    </section>

    <div class="community-content-layout">
      <aside th:replace="~{community/fragments/sidebar :: sidebar(${activeSubjectId}, ${activeBoardType}, ${profileName}, ${profileEmail}, ${profileImageUrl}, ${profileSummary}, false)}"></aside>

      <section class="panel community-panel community-form-panel">
        <div class="community-panel-header">
          <div>
            <h2>새 글</h2>
            <p class="community-form-notice" th:if="${communityDraftNotice != null}" th:text="${communityDraftNotice}">
              오답노트 내용을 불러왔습니다. 수정한 뒤 등록해 주세요.
            </p>
          </div>
          <a class="button" th:href="@{/community/board}">목록</a>
        </div>

        <form method="post" th:action="@{/community/posts}" th:object="${form}" class="community-form">
          <input type="hidden" th:field="*{draftPostId}">
          <input type="hidden" th:field="*{idempotencyToken}">
          <div class="community-form-grid">
            <label class="wide">제목
              <input th:field="*{title}" maxlength="200" required>
            </label>
            <label>언어
              <select th:field="*{subjectId}" required>
                <option value="1">Java</option>
                <option value="4">SQL</option>
                <option value="3">HTML/CSS/JS</option>
                <option value="2">Python</option>
              </select>
            </label>
            <label>게시판
              <select th:field="*{boardType}" required>
                <option value="FREE">자유</option>
                <option value="QUESTION">질문</option>
                <option value="STUDY_LOG">공부 일지</option>
              </select>
            </label>
            <div class="wide community-editor-field">
              <label for="content">내용</label>
              <p class="community-editor-help" id="community-editor-help">기본 모드에서는 위 옵션 메뉴를 눌러 본문 서식을 적용할 수 있습니다.</p>
              <div class="community-editor-shell"
                   data-community-editor
                   th:data-create-draft-url="@{/api/community/drafts}"
                   th:data-upload-url-template="@{/api/community/posts/POST_ID_PLACEHOLDER/inline-images}"
                   aria-describedby="community-editor-help">
                <textarea th:field="*{content}" class="community-editor-source" rows="12" maxlength="10000" required></textarea>
                <div class="community-editor-mount" aria-label="게시글 내용 편집기"></div>
              </div>
            </div>
          </div>
          <div class="community-actions right">
            <a class="button" th:href="@{/community/board}">취소</a>
            <button class="button primary" type="submit">등록</button>
          </div>
        </form>
      </section>
    </div>
  </main>
  <script type="module" th:src="@{/js/vendor/community-editor.bundle.js}"></script>
</body>
</html>
