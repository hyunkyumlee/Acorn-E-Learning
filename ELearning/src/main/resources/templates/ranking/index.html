<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>랭킹 | Knowva</title>

  <link rel="icon" type="image/png" th:href="@{/assets/images/icons/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/common/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common/reset.css}">
  <link rel="stylesheet" th:href="@{/css/common/base.css}">
  <link rel="stylesheet" th:href="@{/css/common/components.css}">
  <link rel="stylesheet" th:href="@{/css/common/themes.css}">
  <link rel="stylesheet" th:href="@{/css/screens/learning.css}">
  <link rel="stylesheet" th:href="@{/css/screens/ranking.css}">

  <script defer th:src="@{/js/common/theme.js}"></script>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page-shell learning-screen ranking-screen">

  <section class="page-heading ranking-heading">
    <div class="ranking-heading-row">
      <div>
        <span class="eyebrow">Ranking</span>
        <h1>랭킹</h1>
      </div>

      <a th:href="@{/learning}" class="ranking-back-link">
        <span class="ranking-back-link__icon" aria-hidden="true">←</span>
        <span class="ranking-back-link__label">학습 로드맵으로</span>
      </a>
    </div>
  </section>

  <section class="panel ranking-panel">
    <div class="ranking-filter-bar">
      <div class="ranking-subject-tabs">
        <a th:each="tab : ${view.attributes()['subjectTabs']}"
           th:href="${tab['subjectId'] == ''} ? @{/ranking} : @{/ranking(subjectId=${tab['subjectId']})}"
           th:text="${tab['label']}"
           class="ranking-subject-tab"
           th:classappend="${
             (tab['subjectId'] == '' and view.attributes()['selectedSubjectId'] == null)
             or
             (tab['subjectId'] != '' and tab['subjectId'] == view.attributes()['selectedSubjectId'])
           } ? ' is-active' : ''">
        </a>
      </div>
    </div>

    <div class="ranking-overview-grid">
      <article class="ranking-card ranking-card--summary">
        <h2 class="ranking-card__title">내정보</h2>

        <div class="ranking-mini-stats">
          <article class="ranking-mini-stat">
            <span class="ranking-mini-label">현재순위</span>
            <strong class="ranking-mini-value"
                    th:text="|${view.attributes()['mySummary']['rankNo']}위|">1위</strong>
          </article>

          <article class="ranking-mini-stat">
            <span class="ranking-mini-label">현재 점수</span>
            <strong class="ranking-mini-value"
                    th:text="|${view.attributes()['mySummary']['score']}점|">0점</strong>
          </article>

          <article class="ranking-mini-stat">
            <span class="ranking-mini-label">선순위와 차이</span>
            <strong class="ranking-mini-value"
                    th:text="|${view.attributes()['mySummary']['gapToPrev']}점|">0점</strong>
          </article>
        </div>
      </article>

      <article class="ranking-card ranking-card--top3">
        <h2 class="ranking-card__title">TOP3</h2>

        <div class="ranking-top3-list">
          <article th:each="item : ${view.attributes()['top3']}"
                   class="ranking-top3-item"
                   th:classappend="${
                     item['rankNo'] == 1 ? ' is-first' :
                     (item['rankNo'] == 2 ? ' is-second' : ' is-third')
                   }">
            <span class="ranking-top3-badge" th:text="${item['rankNo']}">1</span>
            <p class="ranking-top3-name" th:text="${item['nickname']}">닉네임</p>
            <p class="ranking-top3-score" th:text="|${item['score']}점|">0점</p>
          </article>
        </div>
      </article>
    </div>

    <article class="ranking-table-wrap">
      <table class="ranking-table">
        <thead>
        <tr>
          <th>순위</th>
          <th>이름</th>
          <th>점수</th>
          <th>변화</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(view.attributes()['rankingList'])}">
          <td colspan="4">4위 이후 데이터가 없습니다.</td>
        </tr>
        <tr th:each="item : ${view.attributes()['rankingList']}">
          <td th:text="${item['rankNo']}"></td>
          <td th:text="${item['nickname']}"></td>
          <td th:text="|${item['score']}점|"></td>
          <td th:text="${item['change']}"></td>
        </tr>
        </tbody>
      </table>
    </article>

    <article class="ranking-card ranking-card--breakdown">
      <h2 class="ranking-card__title">점수구성</h2>

      <div class="ranking-mini-stats">
        <article class="ranking-mini-stat">
          <span class="ranking-mini-label">문제풀이</span>
          <strong class="ranking-mini-value"
                  th:text="|${view.attributes()['scoreBreakdown']['practiceScore']}점|">0점</strong>
        </article>

        <article class="ranking-mini-stat">
          <span class="ranking-mini-label">시험점수</span>
          <strong class="ranking-mini-value"
                  th:text="|${view.attributes()['scoreBreakdown']['examScore']}점|">0점</strong>
        </article>

        <article class="ranking-mini-stat">
          <span class="ranking-mini-label">일일학습</span>
          <strong class="ranking-mini-value"
                  th:text="|${view.attributes()['scoreBreakdown']['dailyScore']}점|">0점</strong>
        </article>
      </div>
    </article>
  </section>
</main>
</body>
</html>
