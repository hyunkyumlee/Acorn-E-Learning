spring.application.name=Knowva ELearning

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/elearning
spring.datasource.username=knowva
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.acorn.elearning
mybatis.configuration.map-underscore-to-camel-case=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
server.error.whitelabel.enabled=false

knowva.security.enforce=false
knowva.dev-session.enabled=${DEV_SESSION_ENABLED:true}
knowva.upload.base-path=${KNOWVA_UPLOAD_PATH:./uploads}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
knowva.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
knowva.mail.from-name=${MAIL_FROM_NAME:Knowva}
knowva.app.base-url=${APP_BASE_URL:http://localhost:8080}

knowva.ai.provider=${AI_PROVIDER:openai}
knowva.ai.enabled=${AI_ENABLED:true}
knowva.ai.api-key=${AI_API_KEY:}
knowva.ai.base-url=${AI_BASE_URL:https://api.openai.com/v1}
knowva.ai.model=${AI_MODEL:}
knowva.ai.max-completion-tokens=${AI_MAX_COMPLETION_TOKENS:800}
