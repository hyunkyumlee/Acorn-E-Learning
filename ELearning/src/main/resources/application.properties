spring.application.name=Knowva ELearning
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.acorn.elearning
mybatis.configuration.map-underscore-to-camel-case=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
server.error.whitelabel.enabled=false

knowva.security.enforce=${SECURITY_ENFORCE:true}
knowva.upload.base-path=${KNOWVA_UPLOAD_PATH}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE}
knowva.mail.from=${MAIL_FROM}
knowva.mail.from-name=${MAIL_FROM_NAME}
knowva.app.base-url=${APP_BASE_URL}

knowva.ai.provider=${AI_PROVIDER}
knowva.ai.enabled=${AI_ENABLED}
knowva.ai.api-key=${AI_API_KEY}
knowva.ai.base-url=${AI_BASE_URL}
knowva.ai.model=${AI_MODEL}
knowva.ai.max-completion-tokens=${AI_MAX_COMPLETION_TOKENS}
