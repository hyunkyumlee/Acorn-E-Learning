spring.application.name=Knowva ELearning
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# [추가] 유휴 세션 만료 사실상 없음. (체크 X는 JSESSIONID 세션쿠키라 브라우저 닫으면 로그아웃됨)
server.servlet.session.timeout=365d
# [추가] remember-me 서명 키 — 기본값 없이 환경변수 필수(실제 배포 예정, 하드코딩 금지). 미설정 시 앱 기동 실패(fail-fast)
knowva.remember-me.secret=${REMEMBER_ME_SECRET}

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.acorn.elearning
mybatis.configuration.map-underscore-to-camel-case=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
server.error.whitelabel.enabled=false

knowva.security.enforce=${SECURITY_ENFORCE:true}
knowva.upload.base-path=${KNOWVA_UPLOAD_PATH}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE}
knowva.mail.from=${MAIL_FROM}
knowva.mail.from-name=${MAIL_FROM_NAME}
knowva.app.base-url=${APP_BASE_URL}

knowva.ai.provider=${AI_PROVIDER}
knowva.ai.enabled=${AI_ENABLED}
knowva.ai.api-key=${AI_API_KEY}
knowva.ai.base-url=${AI_BASE_URL}
knowva.ai.model=${AI_MODEL}
knowva.ai.max-completion-tokens=${AI_MAX_COMPLETION_TOKENS}


# ===== [정하 - 추가] OAuth (소셜 로그인) — client 자격증명은 환경변수로 주입 =====
# Google
oauth.providers.google.client-id=${GOOGLE_CLIENT_ID:}
oauth.providers.google.client-secret=${GOOGLE_CLIENT_SECRET:}
oauth.providers.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/oauth/google/callback}
oauth.providers.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
oauth.providers.google.token-uri=https://oauth2.googleapis.com/token
oauth.providers.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
oauth.providers.google.scope=openid email profile

# [추가] GitHub
oauth.providers.github.client-id=${GITHUB_CLIENT_ID:}
oauth.providers.github.client-secret=${GITHUB_CLIENT_SECRET:}
oauth.providers.github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/oauth/github/callback}
oauth.providers.github.authorization-uri=https://github.com/login/oauth/authorize
oauth.providers.github.token-uri=https://github.com/login/oauth/access_token
oauth.providers.github.user-info-uri=https://api.github.com/user
oauth.providers.github.scope=read:user user:email

# [정하 - 추가] 비밀번호 재설정 링크 유효시간(분) — 요구사항: 30분
knowva.password-reset.token-ttl-minutes=30

# ===== KakaoPay single payment =====
knowva.kakao-pay.cid=${KAKAOPAY_CID:TC0ONETIME}
knowva.kakao-pay.secret-key=${KAKAOPAY_SECRET_KEY:}
knowva.kakao-pay.base-url=${KAKAOPAY_BASE_URL:https://open-api.kakaopay.com}

# ===== Toss Payments standard payment window =====
knowva.toss-payments.client-key=${TOSS_PAYMENTS_CLIENT_KEY:}
knowva.toss-payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:}
knowva.toss-payments.base-url=${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}