name: Deploy Knowva

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: knowva-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ELearning
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
    steps:
      - name: Check deployment configuration
        run: |
          for variable in AWS_REGION AWS_ROLE_TO_ASSUME ECR_REPOSITORY EC2_INSTANCE_ID; do
            if [ -z "${!variable}" ]; then
              echo "::error::GitHub Actions variable ${variable} is required."
              exit 1
            fi
          done

      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build and test
        run: ./gradlew test bootJar

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-knowva-deploy

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${REGISTRY}/${ECR_REPOSITORY}"
          docker build --platform linux/amd64 --tag "${image_uri}:${IMAGE_TAG}" --tag "${image_uri}:latest" .
          docker push "${image_uri}:${IMAGE_TAG}"
          docker push "${image_uri}:latest"
          echo "image_uri=${image_uri}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 through AWS Systems Manager
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          deploy_commands="$(jq -cn \
            --arg region "$AWS_REGION" \
            --arg registry "$REGISTRY" \
            --arg image "$IMAGE_URI" \
            '{
              commands: [
                "set -eu",
                "aws ecr get-login-password --region \($region) | docker login --username AWS --password-stdin \($registry)",
                "docker pull \($image)",
                "docker rm -f knowva-server || true",
                "docker run -d --name knowva-server --restart unless-stopped --network knowva-network --env-file /opt/knowva/.env --volume /opt/knowva/uploads:/app/uploads -p 8080:8080 \($image)",
                "for attempt in $(seq 1 30); do curl --fail --silent --show-error http://localhost:8080/health && exit 0; sleep 2; done; exit 1"
              ]
            }')"

          command_id="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$EC2_INSTANCE_ID" \
            --comment "Deploy Knowva ${GITHUB_SHA}" \
            --parameters "$deploy_commands" \
            --query 'Command.CommandId' \
            --output text)"

          if ! aws ssm wait command-executed --command-id "$command_id" --instance-id "$EC2_INSTANCE_ID"; then
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
              --output json
            exit 1
          fi
