<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Knowva mascot layered source</title>
  <desc id="desc">Layered SVG source intended for import into Rive Editor.</desc>
  <defs>
    <linearGradient id="bodyGradient" x1="128" y1="112" x2="392" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dfff3d"/>
      <stop offset="0.48" stop-color="#8fe82f"/>
      <stop offset="1" stop-color="#21d6b7"/>
    </linearGradient>
    <linearGradient id="antennaGradient" x1="0" y1="0" x2="0" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dfff3d"/>
      <stop offset="1" stop-color="#7bdc29"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#122024" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g id="shadow" opacity="0.22">
    <ellipse cx="256" cy="430" rx="126" ry="28" fill="#101820"/>
  </g>

  <g id="mascot" filter="url(#softShadow)">
    <g id="left-antenna">
      <path id="left-antenna-stem" d="M184 148 C169 104 158 78 143 42" fill="none" stroke="url(#antennaGradient)" stroke-width="18" stroke-linecap="round"/>
      <circle id="left-antenna-tip" cx="136" cy="26" r="27" fill="url(#antennaGradient)"/>
      <circle id="left-antenna-highlight" cx="126" cy="17" r="9" fill="#ffffff" opacity="0.58"/>
    </g>

    <g id="right-antenna">
      <path id="right-antenna-stem" d="M328 148 C343 104 354 78 369 42" fill="none" stroke="url(#antennaGradient)" stroke-width="18" stroke-linecap="round"/>
      <circle id="right-antenna-tip" cx="376" cy="26" r="27" fill="url(#antennaGradient)"/>
      <circle id="right-antenna-highlight" cx="366" cy="17" r="9" fill="#ffffff" opacity="0.58"/>
    </g>

    <g id="body">
      <path id="body-shell" d="M122 264 C122 174 181 122 256 122 C331 122 390 174 390 264 L390 332 C390 392 340 430 256 430 C172 430 122 392 122 332 Z" fill="url(#bodyGradient)"/>
      <ellipse id="body-highlight-main" cx="199" cy="168" rx="42" ry="18" fill="#ffffff" opacity="0.42" transform="rotate(-24 199 168)"/>
      <ellipse id="body-highlight-small" cx="319" cy="178" rx="12" ry="8" fill="#ffffff" opacity="0.25"/>
      <circle id="body-spot-a" cx="166" cy="284" r="15" fill="#6bc41a" opacity="0.42"/>
      <circle id="body-spot-b" cx="342" cy="246" r="11" fill="#6bc41a" opacity="0.35"/>
      <circle id="body-spot-c" cx="320" cy="316" r="8" fill="#6bc41a" opacity="0.32"/>
    </g>

    <g id="left-arm">
      <path id="left-arm-shape" d="M125 272 C84 278 65 303 70 334 C76 370 111 368 132 330 Z" fill="#7fe02e"/>
      <ellipse id="left-arm-highlight" cx="94" cy="300" rx="12" ry="7" fill="#ffffff" opacity="0.3" transform="rotate(-22 94 300)"/>
    </g>

    <g id="right-arm">
      <path id="right-arm-shape" d="M387 272 C428 278 447 303 442 334 C436 370 401 368 380 330 Z" fill="#30d1a6"/>
      <ellipse id="right-arm-highlight" cx="417" cy="300" rx="12" ry="7" fill="#ffffff" opacity="0.3" transform="rotate(22 417 300)"/>
    </g>

    <g id="left-eye">
      <ellipse id="left-eye-white" cx="202" cy="247" rx="38" ry="47" fill="#ffffff"/>
      <ellipse id="left-pupil" cx="208" cy="250" rx="22" ry="30" fill="#101524"/>
      <circle id="left-eye-shine" cx="198" cy="232" r="9" fill="#ffffff"/>
    </g>

    <g id="right-eye">
      <ellipse id="right-eye-white" cx="310" cy="247" rx="38" ry="47" fill="#ffffff"/>
      <ellipse id="right-pupil" cx="304" cy="250" rx="22" ry="30" fill="#101524"/>
      <circle id="right-eye-shine" cx="294" cy="232" r="9" fill="#ffffff"/>
    </g>

    <g id="mouth">
      <path id="mouth-open" d="M228 313 C236 346 276 346 284 313 C273 325 239 325 228 313 Z" fill="#101524"/>
      <path id="tongue" d="M243 334 C249 342 263 342 269 334 C262 330 250 330 243 334 Z" fill="#ff6f9f"/>
    </g>

    <g id="cheeks">
      <ellipse id="left-cheek" cx="169" cy="307" rx="20" ry="12" fill="#ff8ec7" opacity="0.76"/>
      <ellipse id="right-cheek" cx="343" cy="307" rx="20" ry="12" fill="#ff8ec7" opacity="0.76"/>
    </g>

    <g id="star-badge">
      <path id="star" d="M256 342 L271 376 L308 380 L280 404 L288 441 L256 422 L224 441 L232 404 L204 380 L241 376 Z" fill="#ffe761"/>
      <path id="star-shine" d="M251 352 L257 367 L273 369 L261 380 L264 396 L251 388 L238 396 L241 380 L229 369 L245 367 Z" fill="#fff4a8" opacity="0.55"/>
    </g>

    <g id="feet">
      <ellipse id="left-foot" cx="195" cy="414" rx="38" ry="24" fill="#6fdc2d"/>
      <ellipse id="right-foot" cx="317" cy="414" rx="38" ry="24" fill="#25cba4"/>
    </g>
  </g>
</svg>
