<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Alien UFO direction Front right</title>
  <desc id="desc">Alien UFO mascot direction Front right variation, based on the same source proportions.</desc>
  <defs>
    <linearGradient id="ufoTopGradient" x1="108" y1="238" x2="408" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.54" stop-color="#f5fbfa"/>
      <stop offset="1" stop-color="#d7eeee"/>
    </linearGradient>
    <linearGradient id="ufoSideGradient" x1="64" y1="330" x2="448" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1aa0ad"/>
      <stop offset="0.46" stop-color="#23bac0"/>
