<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 E Cute A - Ion Buddy</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.ion-buddy-page {
      --point: #00e5ff;
      --point-2: #b6ff4d;
      --point-3: #4f7cff;
      --soft-cheek: #ff8ec7;
      --paper: #f7fcff;
      --muted-space: rgba(247, 252, 255, 0.7);
      background:
        radial-gradient(circle at 74% 20%, rgba(0, 229, 255, 0.22), transparent 28%),
        radial-gradient(circle at 18% 78%, rgba(182, 255, 77, 0.14), transparent 24%),
        radial-gradient(circle at 56% 60%, rgba(79, 124, 255, 0.18), transparent 32%),
        linear-gradient(135deg, #070a18 0%, #111833 54%, #06131f 100%);
      color: var(--paper);
    }

    .buddy-shell { position: relative; z-index: 1; }
    .buddy-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(390px, 0.98fr);
      gap: 46px;
      align-items: center;
      min-height: calc(100vh - 124px);
      padding: 34px 4vw 46px;
    }

    .buddy-copy { display: grid; gap: 24px; max-width: 760px; }
    .buddy-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: 0.98; letter-spacing: 0; }
    .buddy-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .buddy-primary { border-color: rgba(0, 229, 255, 0.72); background: var(--point); color: #00161a; box-shadow: 0 16px 30px rgba(0, 229, 255, 0.2); }
    .buddy-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .buddy-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .buddy-visual { position: relative; min-height: 560px; }
    .buddy-stage {
      position: absolute;
      inset: 30px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      background:
        radial-gradient(circle at 52% 44%, rgba(0, 229, 255, 0.16), transparent 34%),
        linear-gradient(140deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .buddy-orbit {
      position: absolute;
      inset: 126px 58px;
      border: 2px solid rgba(0,229,255,.24);
      border-left-color: rgba(182,255,77,.62);
      border-right-color: rgba(79,124,255,.5);
      border-radius: 50%;
      transform: rotate(-18deg);
      animation: buddyTilt 8s ease-in-out infinite alternate;
    }

    .buddy-planet {
      position: absolute;
      top: 152px;
      left: 50%;
      width: 218px;
      height: 218px;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 35% 30%, #fff 0 9%, transparent 10%),
        linear-gradient(135deg, var(--point-2), var(--point), var(--point-3));
      box-shadow: inset -24px -30px 42px rgba(0,0,0,.22), 0 0 44px rgba(0,229,255,.28);
      animation: buddyFloat 5.4s ease-in-out infinite;
    }

    .buddy-mascot {
      position: absolute;
      left: 62px;
      bottom: 80px;
      width: 136px;
      height: 150px;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,.24));
      animation: buddyBounce 4.4s ease-in-out infinite;
    }

    .buddy-body {
      position: absolute;
      left: 16px;
      bottom: 0;
      width: 106px;
      height: 116px;
      border-radius: 48% 48% 40% 40%;
      background:
        radial-gradient(circle at 32% 22%, rgba(255,255,255,.82) 0 9%, transparent 10%),
        linear-gradient(135deg, #d9ff56, #8fe82f 48%, #21d6b7);
      box-shadow: inset -16px -20px 26px rgba(0,0,0,.12);
    }

    .buddy-eye {
      position: absolute;
      top: 44px;
      width: 25px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.08);
    }
    .buddy-eye::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 7px;
      width: 12px;
      height: 16px;
      border-radius: 50%;
      background: #0b1020;
    }
    .buddy-eye.left { left: 42px; }
    .buddy-eye.right { right: 42px; }

    .buddy-mouth {
      position: absolute;
      left: 61px;
      top: 82px;
      width: 20px;
      height: 15px;
      border-radius: 0 0 16px 16px;
      background: #101524;
    }
    .buddy-mouth::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: 2px;
      width: 8px;
      height: 5px;
      border-radius: 999px;
      background: #ff6f9f;
    }

    .buddy-cheek {
      position: absolute;
      top: 75px;
      width: 15px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 142, 199, .75);
    }
    .buddy-cheek.left { left: 34px; }
    .buddy-cheek.right { right: 34px; }

    .buddy-ant {
      position: absolute;
      top: 0;
      width: 10px;
      height: 42px;
      border-radius: 999px;
      background: #92df27;
      transform-origin: bottom;
    }
    .buddy-ant::before {
      content: "";
      position: absolute;
      top: -12px;
      left: -7px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dfff3d, #8fe82f);
    }
    .buddy-ant.left { left: 42px; transform: rotate(-17deg); }
    .buddy-ant.right { right: 42px; transform: rotate(17deg); }

    .buddy-arm {
      position: absolute;
      top: 84px;
      width: 20px;
      height: 42px;
      border-radius: 999px;
      background: #4dd58e;
    }
    .buddy-arm.left { left: 6px; transform: rotate(28deg); }
    .buddy-arm.right { right: 6px; transform: rotate(-28deg); }

    .buddy-star {
      position: absolute;
      left: 24px;
      bottom: 26px;
      width: 26px;
      height: 26px;
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      background: #ffe761;
      box-shadow: 0 0 14px rgba(255,231,97,.35);
    }

    .buddy-guide {
      position: absolute;
      right: 28px;
      top: 72px;
      width: min(268px, 48%);
      border: 1px solid rgba(0,229,255,.24);
      border-radius: 8px;
      background: rgba(4, 12, 28, 0.84);
      padding: 16px;
      box-shadow: 0 18px 38px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
    }
    .buddy-guide strong { display: block; margin-bottom: 6px; color: var(--point); }
    .buddy-guide span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes buddyFloat { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -18px); } }
    @keyframes buddyBounce { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-12px) rotate(3deg); } }
    @keyframes buddyTilt { from { transform: rotate(-20deg) scale(.98); } to { transform: rotate(-10deg) scale(1.03); } }

    @media (max-width: 980px) { .buddy-layout { grid-template-columns: 1fr; } .buddy-visual { min-height: 520px; } }
    @media (max-width: 640px) { .buddy-layout { padding-inline: 0; } .buddy-login { grid-template-columns: 1fr; } .buddy-stage { inset: 18px 0; } .buddy-guide { width: min(250px, 70%); } .buddy-mascot { left: 34px; bottom: 58px; transform: scale(.88); } }
  </style>
</head>
<body class="sample-page ion-buddy-page starfield">
  <div class="sample-shell buddy-shell">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Knowva samples"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Ion Buddy</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="buddy-layout">
      <section class="buddy-copy">
        <span class="eyebrow"><i class="dot"></i> 작은 우주 친구와 시작</span>
        <h1 class="buddy-title">코딩 여정을<br>푸른 이온 궤도로.</h1>
        <p>선택한 E 테마는 유지하고, 학습 화면에 들어갈 캐릭터 톤에 맞춰 작은 guide buddy만 더했습니다. 귀엽지만 CTA와 학습 흐름은 그대로 선명합니다.</p>
        <div class="btn-row"><a class="btn buddy-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="buddy-login" aria-label="social login options"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="buddy-visual" aria-label="Knowva ion buddy visual">
        <div class="buddy-stage"></div><div class="buddy-orbit"></div><div class="buddy-planet"></div>
        <div class="buddy-mascot" aria-hidden="true">
          <div class="buddy-ant left"></div><div class="buddy-ant right"></div><div class="buddy-arm left"></div><div class="buddy-arm right"></div><div class="buddy-body"></div>
          <div class="buddy-eye left"></div><div class="buddy-eye right"></div><div class="buddy-cheek left"></div><div class="buddy-cheek right"></div><div class="buddy-mouth"></div><div class="buddy-star"></div>
        </div>
        <aside class="buddy-guide"><strong>Nova Buddy</strong><span>오늘의 mission을 응원하고, 로그인 후 기록 저장을 알려줍니다.</span></aside>
      </section>
    </main>
  </div>
</body>
</html>
