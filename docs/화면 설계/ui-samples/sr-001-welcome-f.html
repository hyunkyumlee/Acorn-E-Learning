<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 F - Solar Bloom</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.solar-page {
      --point: #ffd166;
      --point-2: #ff8a3d;
      --point-3: #41e6b5;
      --paper: #fffaf0;
      --muted-space: rgba(255, 250, 240, 0.72);
      background:
        radial-gradient(circle at 68% 22%, rgba(255, 209, 102, 0.22), transparent 30%),
        radial-gradient(circle at 20% 78%, rgba(65, 230, 181, 0.12), transparent 24%),
        radial-gradient(circle at 50% 56%, rgba(255, 138, 61, 0.18), transparent 34%),
        linear-gradient(135deg, #100b14 0%, #1d1830 54%, #0a1224 100%);
      color: var(--paper);
    }

    .solar-shell { position: relative; z-index: 1; }
    .solar-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(390px, .96fr); gap: 46px; align-items: center; min-height: calc(100vh - 124px); padding: 34px 4vw 46px; }
    .solar-copy { display: grid; gap: 24px; max-width: 760px; }
    .solar-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: .98; letter-spacing: 0; }
    .solar-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .solar-primary { border-color: rgba(255, 209, 102, .75); background: var(--point); color: #211400; box-shadow: 0 16px 30px rgba(255,209,102,.2); }
    .solar-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .solar-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .solar-visual { position: relative; min-height: 560px; }
    .solar-halo {
      position: absolute;
      inset: 32px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .solar-sun {
      position: absolute;
      top: 138px;
      left: 50%;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 38% 30%, #fff9cf 0 10%, transparent 11%),
        linear-gradient(135deg, #fff077, var(--point), var(--point-2));
      box-shadow: 0 0 70px rgba(255, 209, 102, .28), inset -24px -30px 40px rgba(0,0,0,.2);
      animation: solarPulse 4.8s ease-in-out infinite;
    }

    .solar-arc {
      position: absolute;
      border: 2px solid rgba(255, 209, 102, .35);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      animation: solarSpin 10s linear infinite;
    }
    .solar-arc.a { inset: 126px 48px; transform: rotate(-16deg); }
    .solar-arc.b { inset: 92px 86px; border-color: rgba(65, 230, 181, .25); border-top-color: transparent; animation-duration: 14s; animation-direction: reverse; }

    .solar-chip {
      position: absolute;
      left: 34px;
      bottom: 42px;
      display: grid;
      gap: 6px;
      width: min(280px, 58%);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      background: rgba(10, 18, 36, .82);
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .solar-chip strong { color: var(--point); }
    .solar-chip span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    .solar-guide {
      position: absolute;
      right: 28px;
      top: 78px;
      width: min(255px, 48%);
      border: 1px solid rgba(65,230,181,.24);
      border-radius: 8px;
      background: rgba(10, 18, 36, .84);
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .solar-guide strong { display: block; color: var(--point-3); margin-bottom: 6px; }
    .solar-guide span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes solarPulse { 0%, 100% { filter: brightness(1); transform: translate(-50%, 0) scale(1); } 50% { filter: brightness(1.12); transform: translate(-50%, -12px) scale(1.04); } }
    @keyframes solarSpin { from { transform: rotate(-18deg); } to { transform: rotate(342deg); } }

    @media (max-width: 980px) { .solar-layout { grid-template-columns: 1fr; } .solar-visual { min-height: 520px; } }
    @media (max-width: 640px) { .solar-layout { padding-inline: 0; } .solar-login { grid-template-columns: 1fr; } .solar-halo { inset: 18px 0; } .solar-guide { width: min(240px, 68%); } }
  </style>
</head>
<body class="sample-page solar-page starfield">
  <div class="sample-shell solar-shell">
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Solar Bloom</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="solar-layout">
      <section class="solar-copy">
        <span class="eyebrow"><i class="dot"></i> 오늘의 미션 점화</span>
        <h1 class="solar-title">첫 문제를<br>작은 태양처럼<br>켜보세요.</h1>
        <p>밝은 amber 포인트로 시작 버튼의 힘을 키운 버전입니다. 텍스트보다 발광하는 행성과 튜토리얼 진입 애니메이션이 먼저 보이도록 설계했습니다.</p>
        <div class="btn-row"><a class="btn solar-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="solar-login"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="solar-visual" aria-label="Knowva solar launch visual">
        <div class="solar-halo"></div><div class="solar-arc a"></div><div class="solar-arc b"></div><div class="solar-sun"></div>
        <aside class="solar-guide"><strong>Nova Guide</strong><span>학습 경로를 한 문장으로 요약하고 다음 버튼에 시선을 모읍니다.</span></aside>
        <div class="solar-chip"><strong>Mission ignition</strong><span>Java 반복문 튜토리얼, 예상 7분, 로그인 후 기록 저장</span></div>
      </section>
    </main>
  </div>
</body>
</html>
