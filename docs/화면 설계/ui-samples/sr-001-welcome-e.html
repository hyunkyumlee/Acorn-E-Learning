<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 E - Ion Launch</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.ion-page {
      --point: #00e5ff;
      --point-2: #b6ff4d;
      --point-3: #4f7cff;
      --paper: #f7fcff;
      --muted-space: rgba(247, 252, 255, 0.7);
      background:
        radial-gradient(circle at 74% 20%, rgba(0, 229, 255, 0.22), transparent 28%),
        radial-gradient(circle at 18% 78%, rgba(182, 255, 77, 0.14), transparent 24%),
        radial-gradient(circle at 56% 60%, rgba(79, 124, 255, 0.18), transparent 32%),
        linear-gradient(135deg, #070a18 0%, #111833 54%, #06131f 100%);
      color: var(--paper);
    }

    .ion-shell { position: relative; z-index: 1; }
    .ion-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(390px, 0.98fr);
      gap: 46px;
      align-items: center;
      min-height: calc(100vh - 124px);
      padding: 34px 4vw 46px;
    }

    .ion-copy { display: grid; gap: 24px; max-width: 760px; }
    .ion-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: 0.98; letter-spacing: 0; }
    .ion-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .ion-primary { border-color: rgba(0, 229, 255, 0.72); background: var(--point); color: #00161a; box-shadow: 0 16px 30px rgba(0, 229, 255, 0.2); }
    .ion-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .ion-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .ion-visual { position: relative; min-height: 560px; }
    .ion-stage {
      position: absolute;
      inset: 30px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      background:
        radial-gradient(circle at 52% 44%, rgba(0, 229, 255, 0.16), transparent 34%),
        linear-gradient(140deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .ion-orbit {
      position: absolute;
      inset: 126px 58px;
      border: 2px solid rgba(0,229,255,.24);
      border-left-color: rgba(182,255,77,.62);
      border-right-color: rgba(79,124,255,.5);
      border-radius: 50%;
      transform: rotate(-18deg);
      animation: ionTilt 8s ease-in-out infinite alternate;
    }

    .ion-planet {
      position: absolute;
      top: 152px;
      left: 50%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 35% 30%, #fff 0 9%, transparent 10%),
        linear-gradient(135deg, var(--point-2), var(--point), var(--point-3));
      box-shadow: inset -24px -30px 42px rgba(0,0,0,.22), 0 0 44px rgba(0,229,255,.28);
      animation: ionFloat 5.4s ease-in-out infinite;
    }

    .ion-moon {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f9ffbd, var(--point-2));
      box-shadow: 0 0 28px rgba(182,255,77,.24);
    }
    .ion-moon.one { left: 70px; top: 86px; animation: ionDrift 6.2s ease-in-out infinite; }
    .ion-moon.two { right: 76px; bottom: 92px; width: 98px; height: 98px; background: linear-gradient(135deg, #d8f4ff, var(--point-3)); animation: ionDrift 7s ease-in-out infinite reverse; }

    .ion-guide {
      position: absolute;
      right: 28px;
      top: 72px;
      width: min(268px, 48%);
      border: 1px solid rgba(0,229,255,.24);
      border-radius: 8px;
      background: rgba(4, 12, 28, 0.84);
      padding: 16px;
      box-shadow: 0 18px 38px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
    }
    .ion-guide strong { display: block; margin-bottom: 6px; color: var(--point); }
    .ion-guide span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes ionFloat { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -18px); } }
    @keyframes ionDrift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(18px); } }
    @keyframes ionTilt { from { transform: rotate(-20deg) scale(.98); } to { transform: rotate(-10deg) scale(1.03); } }

    @media (max-width: 980px) { .ion-layout { grid-template-columns: 1fr; } .ion-visual { min-height: 520px; } }
    @media (max-width: 640px) { .ion-layout { padding-inline: 0; } .ion-login { grid-template-columns: 1fr; } .ion-stage { inset: 18px 0; } .ion-guide { width: min(250px, 70%); } }
  </style>
</head>
<body class="sample-page ion-page starfield">
  <div class="sample-shell ion-shell">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Knowva samples"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Ion Launch</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="ion-layout">
      <section class="ion-copy">
        <span class="eyebrow"><i class="dot"></i> 빛나는 학습 궤도</span>
        <h1 class="ion-title">코딩 여정을<br>푸른 이온 궤도로.</h1>
        <p>Knowva는 첫 방문자에게 설명을 길게 늘어놓지 않습니다. 움직이는 행성, 짧은 mission, 바로 시작 CTA로 학습 흐름을 먼저 체감하게 합니다.</p>
        <div class="btn-row"><a class="btn ion-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="ion-login" aria-label="social login options"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="ion-visual" aria-label="Knowva ion launch visual">
        <div class="ion-stage"></div><div class="ion-orbit"></div><div class="ion-planet"></div><div class="ion-moon one"></div><div class="ion-moon two"></div>
        <aside class="ion-guide"><strong>Nova Guide</strong><span>오늘의 mission과 test gate를 짧게 보여주고, 로그인 후 기록을 저장합니다.</span></aside>
      </section>
    </main>
  </div>
</body>
</html>
