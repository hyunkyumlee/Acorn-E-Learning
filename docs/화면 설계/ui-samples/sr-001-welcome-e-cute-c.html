<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 E Cute C - Star Hug</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.starhug-page {
      --point: #00e5ff;
      --point-2: #b6ff4d;
      --point-3: #4f7cff;
      --star: #ffe96b;
      --paper: #f7fcff;
      --muted-space: rgba(247, 252, 255, 0.72);
      background:
        radial-gradient(circle at 74% 20%, rgba(0, 229, 255, 0.22), transparent 28%),
        radial-gradient(circle at 18% 78%, rgba(182, 255, 77, 0.14), transparent 24%),
        radial-gradient(circle at 56% 60%, rgba(79, 124, 255, 0.18), transparent 32%),
        linear-gradient(135deg, #070a18 0%, #111833 54%, #06131f 100%);
      color: var(--paper);
    }

    .starhug-shell { position: relative; z-index: 1; }
    .starhug-layout { display: grid; grid-template-columns: minmax(0, 1.02fr) minmax(390px, .98fr); gap: 46px; align-items: center; min-height: calc(100vh - 124px); padding: 34px 4vw 46px; }
    .starhug-copy { display: grid; gap: 24px; max-width: 760px; }
    .starhug-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: .98; letter-spacing: 0; }
    .starhug-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .starhug-primary { border-color: rgba(0,229,255,.72); background: var(--point); color: #00161a; box-shadow: 0 16px 30px rgba(0,229,255,.2); }
    .starhug-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .starhug-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .starhug-visual { position: relative; min-height: 560px; }
    .starhug-stage {
      position: absolute;
      inset: 30px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      background:
        radial-gradient(circle at 52% 44%, rgba(0, 229, 255, 0.16), transparent 34%),
        linear-gradient(140deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .starhug-orbit {
      position: absolute;
      inset: 126px 58px;
      border: 2px solid rgba(0,229,255,.24);
      border-left-color: rgba(182,255,77,.62);
      border-right-color: rgba(79,124,255,.5);
      border-radius: 50%;
      transform: rotate(-18deg);
      animation: starhugTilt 8s ease-in-out infinite alternate;
    }

    .starhug-mascot {
      position: absolute;
      left: 50%;
      top: 132px;
      width: 236px;
      height: 238px;
      transform: translateX(-50%);
      filter: drop-shadow(0 20px 28px rgba(0,0,0,.24));
      animation: starhugFloat 5.4s ease-in-out infinite;
    }

    .starhug-body {
      position: absolute;
      left: 34px;
      top: 54px;
      width: 166px;
      height: 170px;
      border-radius: 48% 48% 42% 42%;
      background:
        radial-gradient(circle at 34% 24%, rgba(255,255,255,.84) 0 8%, transparent 9%),
        linear-gradient(135deg, #d9ff56, #3ee9c2 54%, #21bde0);
      box-shadow: inset -20px -24px 34px rgba(0,0,0,.14), 0 0 40px rgba(0,229,255,.18);
    }

    .starhug-ant {
      position: absolute;
      top: 12px;
      width: 12px;
      height: 52px;
      border-radius: 999px;
      background: #79de40;
      transform-origin: bottom;
    }
    .starhug-ant::before {
      content: "";
      position: absolute;
      top: -13px;
      left: -8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dfff3d, #8fe82f);
    }
    .starhug-ant.left { left: 72px; transform: rotate(-15deg); }
    .starhug-ant.right { right: 72px; transform: rotate(15deg); }

    .starhug-eye {
      position: absolute;
      top: 104px;
      width: 34px;
      height: 42px;
      border-radius: 50%;
      background: #fff;
    }
    .starhug-eye::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 9px;
      width: 16px;
      height: 22px;
      border-radius: 50%;
      background: #07101f;
    }
    .starhug-eye.left { left: 70px; }
    .starhug-eye.right { right: 70px; }

    .starhug-mouth {
      position: absolute;
      left: 107px;
      top: 151px;
      width: 24px;
      height: 16px;
      border-radius: 0 0 16px 16px;
      background: #08101d;
    }

    .starhug-cheek {
      position: absolute;
      top: 142px;
      width: 20px;
      height: 11px;
      border-radius: 999px;
      background: rgba(255, 142, 199, .78);
    }
    .starhug-cheek.left { left: 56px; }
    .starhug-cheek.right { right: 56px; }

    .starhug-star {
      position: absolute;
      left: 92px;
      top: 158px;
      width: 56px;
      height: 56px;
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      background: var(--star);
      box-shadow: 0 0 26px rgba(255,233,107,.35);
      transform: translateY(28px);
    }

    .starhug-arm {
      position: absolute;
      top: 150px;
      width: 32px;
      height: 70px;
      border-radius: 999px;
      background: #38d9b4;
      z-index: 2;
    }
    .starhug-arm.left { left: 56px; transform: rotate(36deg); }
    .starhug-arm.right { right: 56px; transform: rotate(-36deg); }

    .starhug-guide {
      position: absolute;
      right: 28px;
      top: 72px;
      width: min(268px, 48%);
      border: 1px solid rgba(0,229,255,.24);
      border-radius: 8px;
      background: rgba(4, 12, 28, .84);
      padding: 16px;
      box-shadow: 0 18px 38px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
    }
    .starhug-guide strong { display: block; margin-bottom: 6px; color: var(--point); }
    .starhug-guide span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes starhugFloat { 0%,100% { transform: translate(-50%, 0) rotate(-1deg); } 50% { transform: translate(-50%, -16px) rotate(2deg); } }
    @keyframes starhugTilt { from { transform: rotate(-20deg) scale(.98); } to { transform: rotate(-10deg) scale(1.03); } }

    @media (max-width: 980px) { .starhug-layout { grid-template-columns: 1fr; } .starhug-visual { min-height: 520px; } }
    @media (max-width: 640px) { .starhug-layout { padding-inline: 0; } .starhug-login { grid-template-columns: 1fr; } .starhug-stage { inset: 18px 0; } .starhug-guide { width: min(250px, 70%); } .starhug-mascot { transform: translateX(-50%) scale(.88); } }
  </style>
</head>
<body class="sample-page starhug-page starfield">
  <div class="sample-shell starhug-shell">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Knowva samples"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Star Hug</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="starhug-layout">
      <section class="starhug-copy">
        <span class="eyebrow"><i class="dot"></i> 응원하는 작은 별</span>
        <h1 class="starhug-title">코딩 여정을<br>작은 별과 함께.</h1>
        <p>가장 귀여운 쪽으로 한 단계 더 민 버전입니다. 캐릭터가 별을 안고 있지만, 전체 레이아웃은 E의 hero 중심 구조를 그대로 따릅니다.</p>
        <div class="btn-row"><a class="btn starhug-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="starhug-login" aria-label="social login options"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="starhug-visual" aria-label="Knowva star hug visual">
        <div class="starhug-stage"></div><div class="starhug-orbit"></div>
        <div class="starhug-mascot" aria-hidden="true">
          <div class="starhug-ant left"></div><div class="starhug-ant right"></div><div class="starhug-body"></div><div class="starhug-eye left"></div><div class="starhug-eye right"></div><div class="starhug-cheek left"></div><div class="starhug-cheek right"></div><div class="starhug-mouth"></div><div class="starhug-star"></div><div class="starhug-arm left"></div><div class="starhug-arm right"></div>
        </div>
        <aside class="starhug-guide"><strong>Nova Star</strong><span>오늘의 mission을 작은 별처럼 켜고 다음 행동만 안내합니다.</span></aside>
      </section>
    </main>
  </div>
</body>
</html>
