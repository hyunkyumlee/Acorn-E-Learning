<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowva Nuvi High-Resolution Animation Rows</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #5f6b7a;
      --line: #cfe7f5;
      --panel: #ffffff;
      --surface: #edf8fc;
      --blue: #155bb5;
      --teal: #11a7a8;
      --green: #7bcf2b;
      --orange: #ff9d1c;
      --shadow: 0 24px 70px rgba(25, 83, 116, 0.15);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 18% 16%, rgba(123, 207, 43, 0.18), transparent 28rem),
        linear-gradient(135deg, #f8fbff 0%, #eef9fb 52%, #f9fcff 100%);
      color: var(--ink);
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: inherit;
      text-decoration: none;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, #ffffff 0 6%, transparent 7%),
        linear-gradient(145deg, var(--green), var(--teal));
      position: relative;
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.7);
      flex: 0 0 auto;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 14px 7px 13px;
      border-radius: 999px;
      background: var(--blue);
      transform: rotate(-16deg);
    }

    .brand-text {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand-text strong {
      font-size: 20px;
      line-height: 1;
    }

    .brand-text span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .asset-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(17, 91, 181, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: #15527b;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(340px, 0.94fr);
      gap: 34px;
      align-items: center;
    }

    .stage {
      min-height: 660px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(rgba(66, 169, 214, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(66, 169, 214, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(239, 248, 252, 0.96));
      background-size: 32px 32px, 32px 32px, auto;
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: hidden;
    }

    .sprite-card {
      width: min(440px, 76vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      position: relative;
    }

    .sprite-card::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: 9%;
      height: 26px;
      border-radius: 999px;
      background: rgba(32, 103, 131, 0.13);
      filter: blur(10px);
      transform: translateZ(0);
    }

    .sprite-window {
      --stage-size: min(420px, 72vw);
      width: var(--stage-size);
      height: var(--stage-size);
      overflow: hidden;
      position: relative;
      z-index: 1;
      contain: strict;
    }

    .sprite-strip {
      position: absolute;
      left: 0;
      top: 0;
      width: calc(var(--stage-size) * 8);
      height: var(--stage-size);
      max-width: none;
      transform: translate3d(0, 0, 0);
      will-change: transform;
      image-rendering: auto;
      user-select: none;
      pointer-events: none;
    }

    .panel {
      display: grid;
      gap: 22px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      color: #006c9a;
      font-size: 13px;
      font-weight: 900;
      border: 1px solid rgba(36, 166, 218, 0.36);
      border-radius: 999px;
      padding: 8px 12px;
      background: #e7f8ff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1bb6e8;
    }

    h1 {
      margin: 0;
      font-size: 64px;
      line-height: 0.98;
      letter-spacing: 0;
      max-width: 9em;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .title-line {
      display: block;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
      max-width: 48ch;
      font-weight: 650;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .state-btn {
      min-height: 46px;
      border: 1px solid #cbd8e2;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      color: #182235;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease);
    }

    .state-btn:hover {
      transform: translateY(-1px);
      border-color: #4fc3e7;
    }

    .state-btn[aria-pressed="true"] {
      color: #06466d;
      border-color: #24b7e7;
      background: #dff7ff;
      box-shadow: inset 0 0 0 1px rgba(36, 183, 231, 0.34);
    }

    .row-info {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 0;
      border-top: 1px solid #d7e2ea;
      border-bottom: 1px solid #d7e2ea;
    }

    .row-info div {
      padding: 12px 0;
      border-bottom: 1px solid #d7e2ea;
      min-width: 0;
    }

    .row-info div:nth-last-child(-n + 2) {
      border-bottom: 0;
    }

    .row-info .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .row-info .value {
      font: 800 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #101827;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .asset-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      color: #0b5c7f;
      border: 1px solid rgba(15, 129, 169, 0.22);
      background: rgba(255, 255, 255, 0.72);
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 520px;
      }

      .panel {
        order: -1;
      }

      h1 {
        font-size: 56px;
        max-width: 10em;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
      }

      .asset-meta {
        white-space: normal;
        justify-content: flex-end;
        text-align: right;
      }

      .stage {
        min-height: 390px;
        padding: 14px;
      }

      h1 {
        font-size: 34px;
        line-height: 1.08;
        max-width: none;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .sprite-window {
        --stage-size: min(330px, 86vw);
      }

      .row-info {
        grid-template-columns: 88px 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text"><strong>Knowva</strong><span>Nuvi Animation Rows</span></span>
      </a>
      <span class="asset-meta">512px cells · PNG primary</span>
    </header>

    <main class="layout">
      <section class="stage" aria-label="Nuvi animation preview">
        <div class="sprite-card">
          <div class="sprite-window" id="spriteWindow">
            <img class="sprite-strip" id="spriteStrip" src="./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-idle.png" width="4096" height="512" alt="Nuvi idle animation row">
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="pageTitle">
        <span class="kicker"><span class="dot" aria-hidden="true"></span> High-res row atlas</span>
        <h1 id="pageTitle"><span class="title-line">Nuvi 상태별</span><span class="title-line">애니메이션 row</span></h1>
        <p class="summary">일관성이 좋았던 hatch-pet row를 기준으로 512px cell의 프로젝트용 row strip으로 재구성했다. 같은 캐릭터를 유지하면서 대기, 이동, 실패, 입력 대기, 검토 상태를 전환한다.</p>

        <div class="controls" aria-label="Nuvi animation states">
          <button class="state-btn" type="button" data-state="idle" aria-pressed="true">Idle</button>
          <button class="state-btn" type="button" data-state="move-right" aria-pressed="false">Right</button>
          <button class="state-btn" type="button" data-state="move-left" aria-pressed="false">Left</button>
          <button class="state-btn" type="button" data-state="waiting" aria-pressed="false">Waiting</button>
          <button class="state-btn" type="button" data-state="failed" aria-pressed="false">Failed</button>
          <button class="state-btn" type="button" data-state="review" aria-pressed="false">Review</button>
        </div>

        <div class="row-info" aria-label="selected row metadata">
          <div class="label">state</div><div class="value" id="infoState">idle</div>
          <div class="label">frames</div><div class="value" id="infoFrames">6</div>
          <div class="label">source</div><div class="value" id="infoSource">row 0</div>
          <div class="label">file</div><div class="value" id="infoFile">nuvi-idle.png</div>
        </div>

        <div class="links" aria-label="asset links">
          <a class="asset-link" href="./assets/rive/alien-ufo/highres-animation-rows/nuvi-highres-atlas.png">Atlas PNG</a>
          <a class="asset-link" href="./assets/rive/alien-ufo/highres-animation-rows/nuvi-highres-contact-sheet.png">Contact Sheet</a>
          <a class="asset-link" href="./assets/rive/alien-ufo/highres-animation-rows/nuvi-highres-animation-rows.json">Metadata JSON</a>
        </div>
      </section>
    </main>
  </div>

  <script>
    const rows = {
      "idle": {
        label: "Idle",
        frames: 6,
        source: "row 0",
        file: "nuvi-idle.png",
        src: "./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-idle.png",
        durations: [280, 110, 110, 140, 140, 320]
      },
      "move-right": {
        label: "Move Right",
        frames: 8,
        source: "row 1",
        file: "nuvi-move-right.png",
        src: "./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-move-right.png",
        durations: [120, 120, 120, 120, 120, 120, 120, 220]
      },
      "move-left": {
        label: "Move Left",
        frames: 8,
        source: "row 2",
        file: "nuvi-move-left.png",
        src: "./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-move-left.png",
        durations: [120, 120, 120, 120, 120, 120, 120, 220]
      },
      "failed": {
        label: "Failed",
        frames: 8,
        source: "row 5",
        file: "nuvi-failed.png",
        src: "./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-failed.png",
        durations: [140, 140, 140, 140, 140, 140, 140, 240]
      },
      "waiting": {
        label: "Waiting",
        frames: 6,
        source: "row 6",
        file: "nuvi-waiting.png",
        src: "./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-waiting.png",
        durations: [150, 150, 150, 150, 150, 260]
      },
      "review": {
        label: "Review",
        frames: 6,
        source: "row 8",
        file: "nuvi-review.png",
        src: "./assets/rive/alien-ufo/highres-animation-rows/rows/nuvi-review.png",
        durations: [150, 150, 150, 150, 150, 280]
      }
    };

    const strip = document.getElementById("spriteStrip");
    const buttons = Array.from(document.querySelectorAll("[data-state]"));
    const infoState = document.getElementById("infoState");
    const infoFrames = document.getElementById("infoFrames");
    const infoSource = document.getElementById("infoSource");
    const infoFile = document.getElementById("infoFile");
    let active = rows.idle;
    let frame = 0;
    let timer = null;

    function stageSize() {
      return document.getElementById("spriteWindow").getBoundingClientRect().width;
    }

    function drawFrame() {
      strip.style.transform = `translate3d(${-frame * stageSize()}px, 0, 0)`;
    }

    function tick() {
      frame = (frame + 1) % active.frames;
      drawFrame();
      timer = window.setTimeout(tick, active.durations[frame] || 140);
    }

    function setState(id) {
      active = rows[id];
      frame = 0;
      window.clearTimeout(timer);
      strip.src = active.src;
      strip.alt = `Nuvi ${active.label} animation row`;
      infoState.textContent = id;
      infoFrames.textContent = String(active.frames);
      infoSource.textContent = active.source;
      infoFile.textContent = active.file;
      buttons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.state === id));
      });
      drawFrame();
      timer = window.setTimeout(tick, active.durations[0] || 140);
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => setState(button.dataset.state));
    });

    window.addEventListener("resize", drawFrame);
    setState("idle");
  </script>
</body>
</html>
