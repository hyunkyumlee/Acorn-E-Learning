<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 E Cute B - Bubble Pod</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.bubble-page {
      --point: #00e5ff;
      --point-2: #b6ff4d;
      --point-3: #4f7cff;
      --bubble: rgba(255,255,255,.2);
      --paper: #f7fcff;
      --muted-space: rgba(247, 252, 255, 0.72);
      background:
        radial-gradient(circle at 74% 20%, rgba(0, 229, 255, 0.22), transparent 28%),
        radial-gradient(circle at 18% 78%, rgba(182, 255, 77, 0.14), transparent 24%),
        radial-gradient(circle at 56% 60%, rgba(79, 124, 255, 0.18), transparent 32%),
        linear-gradient(135deg, #070a18 0%, #111833 54%, #06131f 100%);
      color: var(--paper);
    }

    .bubble-shell { position: relative; z-index: 1; }
    .bubble-layout { display: grid; grid-template-columns: minmax(0, 1.02fr) minmax(390px, .98fr); gap: 46px; align-items: center; min-height: calc(100vh - 124px); padding: 34px 4vw 46px; }
    .bubble-copy { display: grid; gap: 24px; max-width: 760px; }
    .bubble-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: .98; letter-spacing: 0; }
    .bubble-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .bubble-primary { border-color: rgba(0,229,255,.72); background: var(--point); color: #00161a; box-shadow: 0 16px 30px rgba(0,229,255,.2); }
    .bubble-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .bubble-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .bubble-visual { position: relative; min-height: 560px; }
    .bubble-stage {
      position: absolute;
      inset: 30px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      background:
        radial-gradient(circle at 52% 44%, rgba(0, 229, 255, 0.16), transparent 34%),
        linear-gradient(140deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .bubble-dome {
      position: absolute;
      left: 50%;
      top: 88px;
      width: 286px;
      height: 286px;
      border-radius: 50%;
      transform: translateX(-50%);
      border: 2px solid rgba(255,255,255,.34);
      background:
        radial-gradient(circle at 30% 22%, rgba(255,255,255,.62), transparent 14%),
        radial-gradient(circle at 66% 76%, rgba(0,229,255,.2), transparent 28%),
        rgba(255,255,255,.08);
      box-shadow: inset 0 0 28px rgba(255,255,255,.08), 0 0 44px rgba(0,229,255,.16);
      animation: bubbleDome 6s ease-in-out infinite;
    }

    .bubble-mascot {
      position: absolute;
      left: 50%;
      top: 176px;
      width: 170px;
      height: 154px;
      transform: translateX(-50%);
      filter: drop-shadow(0 20px 24px rgba(0,0,0,.24));
      animation: bubbleBob 4.8s ease-in-out infinite;
    }

    .bubble-body {
      position: absolute;
      inset: 20px 16px 0;
      border-radius: 48% 48% 42% 42%;
      background:
        radial-gradient(circle at 32% 25%, rgba(255,255,255,.84) 0 8%, transparent 9%),
        linear-gradient(135deg, #8ff6ff, #19d4ff 45%, #4478ff);
      box-shadow: inset -18px -22px 30px rgba(0,0,0,.14);
    }

    .bubble-ear {
      position: absolute;
      top: 10px;
      width: 28px;
      height: 50px;
      border-radius: 999px;
      background: linear-gradient(135deg, #8ff6ff, #19d4ff);
    }
    .bubble-ear::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 1px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #58e3ff;
    }
    .bubble-ear.left { left: 42px; transform: rotate(-20deg); }
    .bubble-ear.right { right: 42px; transform: rotate(20deg); }

    .bubble-eye {
      position: absolute;
      top: 62px;
      width: 31px;
      height: 38px;
      border-radius: 50%;
      background: #fff;
    }
    .bubble-eye::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 8px;
      width: 14px;
      height: 19px;
      border-radius: 50%;
      background: #07101f;
    }
    .bubble-eye.left { left: 47px; }
    .bubble-eye.right { right: 47px; }

    .bubble-mouth {
      position: absolute;
      left: 75px;
      top: 104px;
      width: 22px;
      height: 15px;
      border-radius: 0 0 16px 16px;
      background: #08101d;
    }

    .bubble-cheek {
      position: absolute;
      top: 94px;
      width: 18px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 142, 199, .78);
    }
    .bubble-cheek.left { left: 36px; }
    .bubble-cheek.right { right: 36px; }

    .bubble-ring {
      position: absolute;
      left: 50%;
      top: 278px;
      width: 332px;
      height: 74px;
      border: 2px solid rgba(182,255,77,.48);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      transform: translateX(-50%) rotate(-10deg);
      animation: bubbleRing 7s ease-in-out infinite alternate;
    }

    .bubble-note {
      position: absolute;
      right: 30px;
      top: 78px;
      width: min(265px, 48%);
      border: 1px solid rgba(0,229,255,.24);
      border-radius: 8px;
      background: rgba(4, 12, 28, .84);
      padding: 16px;
      box-shadow: 0 18px 38px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
    }
    .bubble-note strong { display: block; margin-bottom: 6px; color: var(--point); }
    .bubble-note span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes bubbleBob { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -14px); } }
    @keyframes bubbleDome { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.035); } }
    @keyframes bubbleRing { from { transform: translateX(-50%) rotate(-14deg) scale(.96); } to { transform: translateX(-50%) rotate(-6deg) scale(1.04); } }

    @media (max-width: 980px) { .bubble-layout { grid-template-columns: 1fr; } .bubble-visual { min-height: 520px; } }
    @media (max-width: 640px) { .bubble-layout { padding-inline: 0; } .bubble-login { grid-template-columns: 1fr; } .bubble-stage { inset: 18px 0; } .bubble-note { width: min(250px, 70%); } .bubble-dome { width: 240px; height: 240px; } .bubble-ring { width: 286px; } }
  </style>
</head>
<body class="sample-page bubble-page starfield">
  <div class="sample-shell bubble-shell">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Knowva samples"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Bubble Pod</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="bubble-layout">
      <section class="bubble-copy">
        <span class="eyebrow"><i class="dot"></i> 캐릭터가 안내하는 첫 미션</span>
        <h1 class="bubble-title">코딩 여정을<br>버블 포드로.</h1>
        <p>첨부 캐릭터의 둥근 몸체와 큰 눈을 반영한 pod형 버전입니다. E의 색과 구조를 유지하면서 학습 화면의 mascot과 자연스럽게 이어집니다.</p>
        <div class="btn-row"><a class="btn bubble-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="bubble-login" aria-label="social login options"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="bubble-visual" aria-label="Knowva bubble pod visual">
        <div class="bubble-stage"></div><div class="bubble-dome"></div><div class="bubble-ring"></div>
        <div class="bubble-mascot" aria-hidden="true">
          <div class="bubble-ear left"></div><div class="bubble-ear right"></div><div class="bubble-body"></div><div class="bubble-eye left"></div><div class="bubble-eye right"></div><div class="bubble-cheek left"></div><div class="bubble-cheek right"></div><div class="bubble-mouth"></div>
        </div>
        <aside class="bubble-note"><strong>Nova Pod</strong><span>튜토리얼은 가볍게 체험하고, 실제 기록은 로그인 후 저장됩니다.</span></aside>
      </section>
    </main>
  </div>
</body>
</html>
