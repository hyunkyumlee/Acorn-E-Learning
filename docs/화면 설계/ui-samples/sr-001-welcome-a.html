<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 A - Nova Launch</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="sample-page space-bg">
  <div class="sample-shell">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Knowva samples">
        <span class="brand-mark"></span>
        <span class="brand-title"><strong>Knowva</strong><span>Know + Nova</span></span>
      </a>
      <nav class="nav" aria-label="welcome navigation">
        <a class="active" href="#">웰컴</a>
        <a href="#">튜토리얼</a>
        <a href="#">로그인</a>
      </nav>
    </header>

    <main class="welcome-grid">
      <section class="welcome-copy">
        <span class="eyebrow"><i class="dot"></i> 지식을 얻으며 빛나는 학습자</span>
        <h1 class="hero-title">코딩 여정을<br>하나의 우주 미션처럼.</h1>
        <p class="hero-copy">Knowva는 Java, CSS, 알고리즘 학습을 짧은 mission과 roadmap으로 나누어 오늘 할 일을 바로 보여줍니다. 가입 전에는 튜토리얼로 흐름만 확인하고, 학습 기록은 로그인 후 저장됩니다.</p>
        <div class="btn-row">
          <a class="btn primary" href="#">튜토리얼 시작</a>
          <a class="btn" href="#">바로 로그인하기</a>
        </div>
        <div class="login-stack" aria-label="social login options">
          <a class="btn ghost" href="#">Google로 계속</a>
          <a class="btn ghost" href="#">Kakao로 계속</a>
        </div>
      </section>

      <section class="welcome-visual" aria-label="Knowva launch visual">
        <div class="orbit-card"></div>
        <div class="orbit-line"></div>
        <div class="planet main"></div>
        <div class="planet small-a"></div>
        <div class="planet small-b"></div>
        <aside class="guide-bubble">
          <strong>Nova Guide</strong>
          <span>오늘의 mission, 복습 필요 node, test gate unlock 상태를 짧게 안내합니다.</span>
        </aside>
      </section>
    </main>
  </div>
