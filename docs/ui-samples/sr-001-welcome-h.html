<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 H - Mint Nebula</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.mint-page {
      --point: #73f7b1;
      --point-2: #35d0ff;
      --point-3: #e8ff8f;
      --paper: #f8fff9;
      --muted-space: rgba(248,255,249,.7);
      background:
        radial-gradient(circle at 18% 24%, rgba(115,247,177,.18), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(53,208,255,.17), transparent 26%),
        radial-gradient(circle at 54% 68%, rgba(232,255,143,.11), transparent 32%),
        linear-gradient(140deg, #07140f 0%, #11233a 52%, #071121 100%);
      color: var(--paper);
    }

    .mint-shell { position: relative; z-index: 1; }
    .mint-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(390px, .98fr); gap: 46px; align-items: center; min-height: calc(100vh - 124px); padding: 34px 4vw 46px; }
    .mint-copy { display: grid; gap: 24px; max-width: 760px; }
    .mint-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: .98; letter-spacing: 0; }
    .mint-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .mint-primary { border-color: rgba(115,247,177,.72); background: var(--point); color: #04180d; box-shadow: 0 16px 30px rgba(115,247,177,.18); }
    .mint-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .mint-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .mint-visual { position: relative; min-height: 560px; }
    .mint-stage {
      position: absolute;
      inset: 30px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 42%, rgba(115,247,177,.14), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .mint-planet {
      position: absolute;
      left: 50%;
      top: 152px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 35% 30%, #fff 0 9%, transparent 10%),
        linear-gradient(135deg, var(--point-3), var(--point), var(--point-2));
      box-shadow: inset -24px -30px 42px rgba(0,0,0,.2), 0 0 46px rgba(115,247,177,.24);
      animation: mintFloat 5.6s ease-in-out infinite;
    }

    .mint-ring {
      position: absolute;
      top: 224px;
      left: 50%;
      width: 440px;
      height: 104px;
      border: 2px solid rgba(115,247,177,.34);
      border-left-color: transparent;
      border-right-color: rgba(53,208,255,.5);
      border-radius: 50%;
      transform: translateX(-50%) rotate(-15deg);
      animation: mintBreath 7s ease-in-out infinite alternate;
    }

    .mint-petal {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 18px 50% 18px 50%;
      background: linear-gradient(135deg, rgba(115,247,177,.88), rgba(53,208,255,.55));
      box-shadow: 0 0 24px rgba(115,247,177,.18);
      animation: mintPetal 6s ease-in-out infinite;
    }
    .mint-petal.p1 { left: 84px; top: 88px; }
    .mint-petal.p2 { right: 86px; bottom: 104px; animation-delay: 1.3s; }
    .mint-petal.p3 { left: 140px; bottom: 80px; animation-delay: 2.1s; }

    .mint-guide {
      position: absolute;
      right: 28px;
      top: 74px;
      width: min(270px, 48%);
      border: 1px solid rgba(115,247,177,.24);
      border-radius: 8px;
      background: rgba(5,18,22,.84);
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .mint-guide strong { display: block; margin-bottom: 6px; color: var(--point); }
    .mint-guide span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes mintFloat { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -18px); } }
    @keyframes mintBreath { from { transform: translateX(-50%) rotate(-18deg) scale(.96); } to { transform: translateX(-50%) rotate(-10deg) scale(1.04); } }
    @keyframes mintPetal { 0%, 100% { transform: translateY(0) rotate(0deg); opacity: .86; } 50% { transform: translateY(18px) rotate(18deg); opacity: 1; } }

    @media (max-width: 980px) { .mint-layout { grid-template-columns: 1fr; } .mint-visual { min-height: 520px; } }
    @media (max-width: 640px) { .mint-layout { padding-inline: 0; } .mint-login { grid-template-columns: 1fr; } .mint-stage { inset: 18px 0; } .mint-ring { width: 320px; } .mint-guide { width: min(250px, 70%); } }
  </style>
</head>
<body class="sample-page mint-page starfield">
  <div class="sample-shell mint-shell">
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Mint Nebula</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="mint-layout">
      <section class="mint-copy">
        <span class="eyebrow"><i class="dot"></i> 부드러운 성장 궤도</span>
        <h1 class="mint-title">지식이 자라는<br>성운 안으로<br>들어오세요.</h1>
        <p>H의 격자 없는 배경 감각은 유지하되 rose 포인트를 mint와 cyan으로 교체했습니다. 학습 서비스답게 밝고 가벼운 성장감을 줍니다.</p>
        <div class="btn-row"><a class="btn mint-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="mint-login"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="mint-visual" aria-label="Knowva mint nebula visual">
        <div class="mint-stage"></div><div class="mint-ring"></div><div class="mint-planet"></div><div class="mint-petal p1"></div><div class="mint-petal p2"></div><div class="mint-petal p3"></div>
        <aside class="mint-guide"><strong>Nova Guide</strong><span>mission, 복습 node, gate unlock을 부드럽게 안내합니다.</span></aside>
      </section>
    </main>
  </div>
</body>
</html>
