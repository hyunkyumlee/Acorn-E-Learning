<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SR-001 I - Cobalt Pulse</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <style>
    body.cobalt-page {
      --point: #4d8dff;
      --point-2: #f3f7ff;
      --point-3: #a7c7ff;
      --paper: #f8fbff;
      --muted-space: rgba(248,251,255,.7);
      background:
        radial-gradient(circle at 78% 18%, rgba(77,141,255,.22), transparent 30%),
        radial-gradient(circle at 22% 78%, rgba(167,199,255,.14), transparent 26%),
        radial-gradient(circle at 50% 58%, rgba(243,247,255,.09), transparent 34%),
        linear-gradient(135deg, #060b17 0%, #101a34 54%, #070b18 100%);
      color: var(--paper);
    }

    .cobalt-shell { position: relative; z-index: 1; }
    .cobalt-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(390px, .98fr); gap: 46px; align-items: center; min-height: calc(100vh - 124px); padding: 34px 4vw 46px; }
    .cobalt-copy { display: grid; gap: 24px; max-width: 760px; }
    .cobalt-title { margin: 0; font-size: clamp(46px, 6vw, 86px); line-height: .98; letter-spacing: 0; }
    .cobalt-copy p { margin: 0; color: var(--muted-space); font-size: clamp(17px, 2vw, 22px); line-height: 1.6; word-break: keep-all; }
    .cobalt-primary { border-color: rgba(77,141,255,.75); background: var(--point); color: #f8fbff; box-shadow: 0 16px 30px rgba(77,141,255,.2); }
    .cobalt-login { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; max-width: 420px; }
    .cobalt-login .btn { border-color: rgba(255,255,255,.24); color: var(--muted-space); box-shadow: none; }

    .cobalt-visual { position: relative; min-height: 560px; }
    .cobalt-stage {
      position: absolute;
      inset: 30px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 42%, rgba(77,141,255,.16), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .cobalt-pulse {
      position: absolute;
      left: 50%;
      top: 142px;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 35% 30%, #fff 0 10%, transparent 11%),
        linear-gradient(135deg, var(--point-2), var(--point-3), var(--point));
      box-shadow: inset -24px -30px 42px rgba(0,0,0,.2), 0 0 52px rgba(77,141,255,.26);
      animation: cobaltFloat 5.2s ease-in-out infinite;
    }

    .cobalt-wave {
      position: absolute;
      left: 50%;
      top: 226px;
      width: 450px;
      height: 112px;
      border: 2px solid rgba(77,141,255,.35);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      transform: translateX(-50%) rotate(-14deg);
      animation: cobaltWave 6.8s ease-in-out infinite alternate;
    }

    .cobalt-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--point-2);
      box-shadow: 0 0 24px rgba(243,247,255,.36);
      animation: cobaltDot 4.6s ease-in-out infinite;
    }
    .cobalt-dot.d1 { left: 80px; top: 110px; }
    .cobalt-dot.d2 { right: 96px; top: 172px; animation-delay: 1s; }
    .cobalt-dot.d3 { right: 126px; bottom: 98px; animation-delay: 2s; }
    .cobalt-dot.d4 { left: 128px; bottom: 112px; animation-delay: 3s; }

    .cobalt-guide {
      position: absolute;
      right: 28px;
      top: 72px;
      width: min(270px, 48%);
      border: 1px solid rgba(77,141,255,.24);
      border-radius: 8px;
      background: rgba(5,11,24,.84);
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .cobalt-guide strong { display: block; margin-bottom: 6px; color: var(--point-3); }
    .cobalt-guide span { color: var(--muted-space); font-size: 14px; line-height: 1.5; }

    @keyframes cobaltFloat { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -16px); } }
    @keyframes cobaltWave { from { transform: translateX(-50%) rotate(-16deg) scale(.96); } to { transform: translateX(-50%) rotate(-8deg) scale(1.05); } }
    @keyframes cobaltDot { 0%, 100% { opacity: .4; transform: scale(.9); } 50% { opacity: 1; transform: scale(1.25); } }

    @media (max-width: 980px) { .cobalt-layout { grid-template-columns: 1fr; } .cobalt-visual { min-height: 520px; } }
    @media (max-width: 640px) { .cobalt-layout { padding-inline: 0; } .cobalt-login { grid-template-columns: 1fr; } .cobalt-stage { inset: 18px 0; } .cobalt-wave { width: 320px; } .cobalt-guide { width: min(250px, 70%); } }
  </style>
</head>
<body class="sample-page cobalt-page starfield">
  <div class="sample-shell cobalt-shell">
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark"></span><span class="brand-title"><strong>Knowva</strong><span>Cobalt Pulse</span></span></a>
      <nav class="nav" aria-label="welcome navigation"><a class="active" href="#">웰컴</a><a href="#">튜토리얼</a><a href="#">로그인</a></nav>
    </header>
    <main class="cobalt-layout">
      <section class="cobalt-copy">
        <span class="eyebrow"><i class="dot"></i> 집중형 시작 화면</span>
        <h1 class="cobalt-title">오늘의 미션을<br>한 번의 펄스로<br>시작하세요.</h1>
        <p>가장 차분한 cobalt 계열입니다. H의 어두운 성운 배경을 유지하되 포인트를 차갑고 선명하게 바꿔, 서비스가 더 학습 도구처럼 보이게 했습니다.</p>
        <div class="btn-row"><a class="btn cobalt-primary" href="#">튜토리얼 시작</a><a class="btn dark" href="#">바로 로그인하기</a></div>
        <div class="cobalt-login"><a class="btn ghost" href="#">Google로 계속</a><a class="btn ghost" href="#">Kakao로 계속</a></div>
      </section>
      <section class="cobalt-visual" aria-label="Knowva cobalt pulse visual">
        <div class="cobalt-stage"></div><div class="cobalt-wave"></div><div class="cobalt-pulse"></div><div class="cobalt-dot d1"></div><div class="cobalt-dot d2"></div><div class="cobalt-dot d3"></div><div class="cobalt-dot d4"></div>
        <aside class="cobalt-guide"><strong>Nova Guide</strong><span>다음 mission만 짧게 띄우고 바로 튜토리얼 시작으로 연결합니다.</span></aside>
      </section>
    </main>
  </div>
</body>
</html>
